<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きぬさや パッキングAI ver1.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f4f8f0;color:#1a1a1a;min-height:100vh;padding:16px;}
.app{max-width:560px;margin:0 auto;}
.header{margin-bottom:16px;padding:16px 20px;background:#558B2F;border-radius:12px;}
.header h1{font-size:20px;font-weight:600;margin-bottom:2px;color:#fff;}
.header p{font-size:12px;color:#D4E8B0;}
.card{background:#fff;border:1px solid #d4e8b0;border-radius:12px;padding:16px 20px;margin-bottom:10px;}
label{font-size:12px;color:#666;display:block;margin-bottom:5px;}
select,input[type=number]{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none;}
select:focus,input:focus{border-color:#558B2F;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.spec-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px;}
.sb{border:1px solid #ddd;border-radius:8px;padding:8px 3px;text-align:center;cursor:pointer;font-size:12px;background:#f4f8f0;color:#333;}
.sb.on{background:#F1F8E9;border-color:#558B2F;color:#33691E;font-weight:600;}
.qty-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.qb{border:1px solid #ddd;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;font-size:12px;background:#f4f8f0;color:#555;}
.qb.on{background:#558B2F;border-color:#558B2F;color:#fff;font-weight:600;}
.mode-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:12px;}
.mb{border:1px solid #ddd;border-radius:8px;padding:7px 3px;text-align:center;cursor:pointer;font-size:11px;background:#f4f8f0;color:#333;}
.mb .pct{font-size:15px;font-weight:600;display:block;}
.mb .mnm{font-size:10px;color:#999;display:block;margin-top:1px;}
.mb.on10{background:#E6F1FB;border-color:#378ADD;color:#042C53;}
.mb.on20{background:#EAF3DE;border-color:#639922;color:#173404;}
.mb.on30{background:#F1F8E9;border-color:#558B2F;color:#33691E;}
.mb.on40{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;}
.mb.on50{background:#FCEBEB;border-color:#E24B4A;color:#501313;}
.result-box{border-radius:12px;padding:16px 20px;margin-bottom:10px;}
.price-big{font-size:40px;font-weight:700;text-align:center;margin:10px 0;letter-spacing:-1px;}
.mg4{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;}
.metric{background:#fff;border-radius:8px;padding:10px 12px;}
.metric-l{font-size:11px;color:#888;margin-bottom:3px;}
.metric-v{font-size:22px;font-weight:600;}
.metric-u{font-size:12px;color:#888;font-weight:400;}
.cost-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
.cost-table td{padding:4px 8px;}
.cost-table tr:last-child td{border-top:1px solid rgba(0,0,0,0.1);font-weight:600;}
.cost-table .lbl{color:#888;}
.cost-table .val{text-align:right;font-weight:500;}
.act-btn{border:none;border-radius:8px;padding:13px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;background:#558B2F;color:#fff;line-height:1.5;width:100%;margin-top:10px;}
.act-btn:active{transform:scale(0.98);}
.tab-bar{display:grid;grid-template-columns:1fr 1fr;border:1px solid #d4e8b0;border-radius:10px;overflow:hidden;margin-bottom:12px;background:#f4f8f0;}
.tab{padding:10px;text-align:center;cursor:pointer;font-size:13px;color:#888;font-weight:500;}
.tab.on{background:#fff;color:#1a1a1a;}
.hidden{display:none;}
.divider{border:none;border-top:1px solid rgba(0,0,0,0.07);margin:10px 0;}
.toast{background:#558B2F;color:#fff;border-radius:8px;padding:11px 16px;font-size:13px;margin-bottom:10px;font-weight:500;animation:fadein 0.3s;}
@keyframes fadein{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.empty{font-size:13px;color:#aaa;text-align:center;padding:20px 0;}
.log-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #eef5ee;}
.log-item:last-child{border-bottom:none;}
.log-date{font-size:11px;color:#aaa;margin-top:3px;}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;}
.del-btn{font-size:11px;color:#aaa;cursor:pointer;padding:3px 8px;border:1px solid #d4e8b0;border-radius:6px;white-space:nowrap;margin-left:8px;flex-shrink:0;}
.type-btn{border:1px solid #ddd;border-radius:8px;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;background:#f4f8f0;color:#888;}
.type-btn.on{background:#F1F8E9;border-color:#558B2F;color:#33691E;}
.info-box{background:#F1F8E9;border:1px solid #558B2F;border-radius:8px;padding:8px 12px;font-size:11px;color:#33691E;margin-bottom:10px;}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1>🌿 きぬさや パッキングAI</h1>
  <p>まるたかフルーツ × 味采市場｜ver 1.0</p>
</div>
<div class="tab-bar">
  <div class="tab on" id="tab-main" onclick="showTab('main')">計算・作成</div>
  <div class="tab" id="tab-log" onclick="showTab('log')">作成記録</div>
</div>

<div id="view-main">
  <div class="card">

    <div class="row2">
      <div>
        <label>仕入れ原価（円/kg）</label>
        <input type="number" id="cost" value="600" min="1" oninput="calc()"/>
      </div>
      <div>
        <label>仕入れ単位</label>
        <select id="qty_unit" onchange="onQtyChange()">
          <option value="1">1kg</option>
          <option value="2" selected>2kg</option>
          <option value="5">5kg</option>
          <option value="custom">イレギュラー入力</option>
        </select>
      </div>
    </div>

    <div id="qty-custom-row" class="hidden" style="margin-bottom:12px;">
      <label>仕入れ量（kg）</label>
      <input type="number" id="qty_custom" value="2" min="0.1" step="0.1" oninput="calc()"/>
    </div>

    <div class="row2">
      <div>
        <label>等級</label>
        <select id="grade" onchange="calc()">
          <option value="A">A品（正品）</option>
          <option value="B" selected>B品</option>
        </select>
      </div>
      <div>
        <label>1莢重量（g）</label>
        <input type="number" id="unit_w" value="3" min="1" step="0.5" oninput="calc()"/>
      </div>
    </div>

    <div class="info-box">1莢（さや）≒ 約2〜3g　100gあたり約40〜50莢が目安</div>

    <div class="divider"></div>

    <label>容器</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
      <div class="type-btn on" id="btn-bag" onclick="setContainer('bag')">袋詰め</div>
      <div class="type-btn" id="btn-cup" onclick="setContainer('cup')">クリアカップ</div>
    </div>
    <div id="cup-info" class="hidden" style="background:#E3F2FD;border:1px solid #1565C0;border-radius:8px;padding:8px 12px;font-size:11px;color:#0D47A1;margin-bottom:10px;">
      カップ10円＋ラップ1円＋シール1円＝12円／個　さやを立てて見栄え良く！
    </div>
    <label>重量規格</label>
    <div class="spec-grid4">
      <div class="sb on" id="w50" onclick="setSpec(50)"><span>50g</span></div>
      <div class="sb" id="w100" onclick="setSpec(100)"><span>100g</span></div>
      <div class="sb" id="w150" onclick="setSpec(150)"><span>150g</span></div>
      <div class="sb" id="w200" onclick="setSpec(200)"><span>200g</span></div>
    </div>

    <div class="divider"></div>
    <label>利益モード</label>
    <div class="mode-grid">
      <div class="mb" id="m10" onclick="setMode(10)"><span class="pct">10%</span><span class="mnm">超特価</span></div>
      <div class="mb" id="m20" onclick="setMode(20)"><span class="pct">20%</span><span class="mnm">安く売る</span></div>
      <div class="mb on30" id="m30" onclick="setMode(30)"><span class="pct">30%</span><span class="mnm">標準</span></div>
      <div class="mb" id="m40" onclick="setMode(40)"><span class="pct">40%</span><span class="mnm">しっかり</span></div>
      <div class="mb" id="m50" onclick="setMode(50)"><span class="pct">50%</span><span class="mnm">高利益</span></div>
    </div>
  </div>

  <div id="result-area"></div>
</div>

<div id="view-log" class="hidden">
  <div class="card">
    <p style="font-size:15px;font-weight:600;margin-bottom:14px;">作成記録（過去7日間）</p>
    <div id="log-list"></div>
  </div>
</div>
</div>

<script>
const PRICES=[49,69,79,89,99,100,129,139,149,159,179,199,200,239,249,259,279,299,300,339,359,379,399,499,599,699,799,899,979,1000];
const BAG=4,LABEL=2;
const SPECS_W=[50,100,150,200];

function laborCost(sec){return Math.round(1303*sec/3600/0.75);}
function nearestPrice(raw){return PRICES.reduce((p,c)=>Math.abs(c-raw)<Math.abs(p-raw)?c:p);}

const MS={
  10:{bg:'#E6F1FB',bd:'#378ADD',tx:'#042C53',nm:'超特価'},
  20:{bg:'#EAF3DE',bd:'#639922',tx:'#173404',nm:'安く売る'},
  30:{bg:'#F1F8E9',bd:'#558B2F',tx:'#33691E',nm:'標準'},
  40:{bg:'#FAECE7',bd:'#D85A30',tx:'#4A1B0C',nm:'しっかり'},
  50:{bg:'#FCEBEB',bd:'#E24B4A',tx:'#501313',nm:'高利益'}
};
const GC={
  A:{bg:'#EAF3DE',bd:'#639922',tx:'#173404',lb:'A品'},
  B:{bg:'#F1F8E9',bd:'#558B2F',tx:'#33691E',lb:'B品'}
};

let specW=50,mode=30,container='bag';

function getQty(){
  const u=document.getElementById('qty_unit').value;
  if(u==='custom') return parseFloat(document.getElementById('qty_custom').value)||0;
  return parseFloat(u)||0;
}
function onQtyChange(){
  const u=document.getElementById('qty_unit').value;
  document.getElementById('qty-custom-row').className=u==='custom'?'':'hidden';
  calc();
}
function setContainer(c){
  container=c;
  document.getElementById('btn-bag').className='type-btn'+(c==='bag'?' on':'');
  document.getElementById('btn-cup').className='type-btn'+(c==='cup'?' on':'');
  document.getElementById('cup-info').className=c==='cup'?'':'hidden';
  calc();
}
function setSpec(v){
  specW=v;
  SPECS_W.forEach(x=>document.getElementById('w'+x).className='sb'+(x===v?' on':''));
  calc();
}
function setMode(m){
  mode=m;
  [10,20,30,40,50].forEach(v=>document.getElementById('m'+v).className='mb'+(v===m?' on'+v:''));
  calc();
}

function getLog(){try{const r=localStorage.getItem('kinusaya_v1');if(!r)return[];return JSON.parse(r).filter(x=>x.ts>Date.now()-7*24*60*60*1000);}catch(e){return[];}}
function saveLog(e){try{const l=getLog();l.unshift({...e,ts:Date.now(),id:Date.now()});localStorage.setItem('kinusaya_v1',JSON.stringify(l));}catch(e){}}
function deleteLog(id){try{localStorage.setItem('kinusaya_v1',JSON.stringify(JSON.parse(localStorage.getItem('kinusaya_v1')||'[]').filter(x=>x.id!==id)));renderLog();}catch(e){}}
function fmtDate(d){return`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}

function calc(){
  const cpk=parseFloat(document.getElementById('cost').value)||0;
  const qty=getQty();
  const unitW=parseFloat(document.getElementById('unit_w').value)||6;
  const grade=document.getElementById('grade').value;
  if(cpk<=0||qty<=0||unitW<=0){document.getElementById('result-area').innerHTML='';return;}

  const packW=specW/1000;
  const packN=Math.round(specW/unitW);
  const bags=Math.floor(qty/packW);
  const cpb=Math.round(cpk*packW);
  const sec=15;
  const labor=laborCost(sec);
  const matCost=container==='cup'?12:(BAG+LABEL);
  const matDesc=container==='cup'?'カップ10円＋ラップ1円＋シール1円':'袋4円＋ラベル2円';
  const fc=matCost+labor;
  const tc=cpb+fc;
  const price=nearestPrice(tc/(1-mode/100));
  const margin=Math.round((1-tc/price)*100);
  const pb=Math.round(price-tc);
  const pt=Math.round(pb*bags);
  const ms=MS[mode];
  const gc=GC[grade]||GC['A'];
  const specLabel=specW+'g（約'+packN+'莢入り）';
  const qtyLabel=qty+'kg';

  document.getElementById('result-area').innerHTML=`
  <div class="result-box" style="background:${ms.bg};border:1px solid ${ms.bd};">
    <p style="font-size:13px;color:${ms.tx};font-weight:600;margin-bottom:10px;">
      🫛 ${specLabel}　${ms.nm}（${mode}%）
    </p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      <span class="badge" style="background:${gc.bg};border:1px solid ${gc.bd};color:${gc.tx};">${gc.lb}</span>
      <span class="badge" style="background:#f4f8f0;color:#558B2F;">仕入れ ${qtyLabel}</span>
      <span class="badge" style="background:#f4f8f0;color:#558B2F;">${container==='cup'?'クリアカップ':'袋詰め'}</span>
    </div>
    <div class="price-big" style="color:${ms.tx};">${price.toLocaleString()}円</div>
    <div class="mg4">
      <div class="metric"><p class="metric-l">値入率</p><p class="metric-v">${margin}<span class="metric-u">%</span></p></div>
      <div class="metric"><p class="metric-l">粗利／袋</p><p class="metric-v">${pb.toLocaleString()}<span class="metric-u">円</span></p></div>
      <div class="metric"><p class="metric-l">袋数</p><p class="metric-v">${bags}<span class="metric-u">袋</span></p></div>
      <div class="metric"><p class="metric-l">粗利合計</p><p class="metric-v">${pt.toLocaleString()}<span class="metric-u">円</span></p></div>
    </div>
    <div style="border-top:1px solid rgba(0,0,0,0.07);margin:10px 0;"></div>
    <p style="font-size:12px;color:${ms.tx};font-weight:600;margin-bottom:6px;">原価内訳</p>
    <table class="cost-table">
      <tr><td class="lbl">青果原価</td><td class="val" style="color:${ms.tx};">${cpb}円／袋</td></tr>
      <tr><td class="lbl">資材費（${matDesc}）</td><td class="val">${matCost}円／袋</td></tr>
      <tr><td class="lbl">人件費（${sec}秒／袋）</td><td class="val">${labor}円／袋</td></tr>
      <tr><td class="lbl" style="color:${ms.tx};font-weight:600;">原価合計</td><td class="val" style="color:${ms.tx};font-weight:600;">${tc}円／袋</td></tr>
    </table>
    <button class="act-btn" onclick="record(${price},${bags},'${specLabel}','${grade}',${unitW},${qty})">
      ✓ ${specLabel}・${price}円・${bags}袋 を記録する
    </button>
  </div>`;
}

function record(price,bags,specLabel,grade,unitW,qty){
  const cpk=parseFloat(document.getElementById('cost').value)||0;
  saveLog({price,bags,specLabel,grade,unitW,qty,cpk,mode,specW,container});
  const area=document.getElementById('result-area');
  const t=document.createElement('div');
  t.className='toast';
  t.textContent=`✓ ${specLabel}・${price}円・${bags}袋 を記録しました`;
  area.prepend(t);
  setTimeout(()=>t.remove(),3000);
  calc();
}

function showTab(t){
  document.getElementById('view-main').className=t==='main'?'':'hidden';
  document.getElementById('view-log').className=t==='log'?'':'hidden';
  document.getElementById('tab-main').className='tab'+(t==='main'?' on':'');
  document.getElementById('tab-log').className='tab'+(t==='log'?' on':'');
  if(t==='log')renderLog();
}

function renderLog(){
  const log=getLog();
  const el=document.getElementById('log-list');
  if(!log.length){el.innerHTML='<p class="empty">記録がありません</p>';return;}
  el.innerHTML=log.map(r=>{
    const d=new Date(r.ts);
    return`<div class="log-item">
      <div style="flex:1;">
        <span class="badge" style="background:#F1F8E9;color:#33691E;">${r.specLabel}</span>
        <span style="font-size:14px;margin-left:8px;font-weight:600;">${r.price}円</span>
        <span style="font-size:12px;color:#aaa;margin-left:6px;">${r.bags}袋</span>
        <p class="log-date">${fmtDate(d)}｜${r.unitW}g/莢・仕入${r.cpk}円/kg・${r.qty}kg</p>
      </div>
      <span class="del-btn" onclick="deleteLog(${r.id})">削除</span>
    </div>`;
  }).join('');
}

calc();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きゅうり パッキングAI ver1.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f0f7f2;color:#1a1a1a;min-height:100vh;padding:16px;}
.app{max-width:560px;margin:0 auto;}
.header{margin-bottom:16px;padding:16px 20px;background:#2E8B57;border-radius:12px;}
.header h1{font-size:20px;font-weight:600;margin-bottom:2px;color:#fff;}
.header p{font-size:12px;color:#9FD4B5;}
.card{background:#fff;border:1px solid #dce8e0;border-radius:12px;padding:16px 20px;margin-bottom:10px;}
label{font-size:12px;color:#666;display:block;margin-bottom:5px;}
select,input[type=number]{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none;}
select:focus,input:focus{border-color:#2E8B57;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.type-toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.type-btn{border:1px solid #ddd;border-radius:8px;padding:9px 6px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;background:#f5faf7;color:#888;}
.type-btn.on{background:#E1F5E9;border-color:#2E8B57;color:#0A3D1F;}
.mode-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:12px;}
.mb{border:1px solid #ddd;border-radius:8px;padding:7px 3px;text-align:center;cursor:pointer;font-size:11px;background:#f5faf7;color:#333;}
.mb .pct{font-size:15px;font-weight:600;display:block;}
.mb .mnm{font-size:10px;color:#999;display:block;margin-top:1px;}
.mb.on10{background:#E6F1FB;border-color:#378ADD;color:#042C53;}
.mb.on20{background:#EAF3DE;border-color:#639922;color:#173404;}
.mb.on30{background:#FAEEDA;border-color:#BA7517;color:#412402;}
.mb.on40{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;}
.mb.on50{background:#FCEBEB;border-color:#E24B4A;color:#501313;}
.alert{border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;line-height:1.5;}
.alert-warn{background:#FAEEDA;border:1px solid #BA7517;color:#412402;}
.alert-danger{background:#FCEBEB;border:1px solid #E24B4A;color:#501313;}
.result-teiban{background:#E1F5E9;border:1px solid #2E8B57;border-radius:12px;padding:16px 20px;margin-bottom:10px;}
.result-bara{background:#FCEBEB;border:1px solid #E24B4A;border-radius:12px;padding:16px 20px;margin-bottom:10px;}
.price-big{font-size:40px;font-weight:700;text-align:center;margin:10px 0;letter-spacing:-1px;}
.mg4{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;}
.mg4sm{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.metric{background:#fff;border-radius:8px;padding:10px 12px;}
.metric-l{font-size:11px;color:#888;margin-bottom:3px;}
.metric-v{font-size:22px;font-weight:600;}
.metric-u{font-size:12px;color:#888;font-weight:400;}
.cost-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
.cost-table td{padding:4px 8px;}
.cost-table tr:last-child td{border-top:1px solid rgba(0,0,0,0.1);font-weight:600;}
.cost-table .lbl{color:#888;}
.cost-table .val{text-align:right;font-weight:500;}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.rec-card{border-radius:8px;padding:10px 14px;border:1px solid #dce8e0;}
.rec-rank{font-size:11px;color:#888;margin-bottom:3px;}
.rec-sz{font-size:20px;font-weight:600;}
.rec-why{font-size:11px;color:#888;margin-top:4px;line-height:1.4;}
.act-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.act-btn{border:1px solid #ddd;border-radius:8px;padding:13px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;background:#f5faf7;color:#333;line-height:1.5;}
.act-btn.primary{background:#2E8B57;border-color:#2E8B57;color:#fff;}
.act-btn.bara{background:#E24B4A;border-color:#E24B4A;color:#fff;}
.act-btn1{border:1px solid #2E8B57;border-radius:8px;padding:13px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;background:#2E8B57;color:#fff;line-height:1.5;margin-top:10px;width:100%;}
.other-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.other-btn{border:1px solid #ddd;border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;background:#f5faf7;color:#333;line-height:1.5;}
.log-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #edf5f0;}
.log-item:last-child{border-bottom:none;}
.log-date{font-size:11px;color:#aaa;margin-top:3px;}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;}
.badge-teiban{background:#E1F5E9;color:#0A3D1F;}
.badge-toku{background:#FAEEDA;color:#412402;}
.badge-bara{background:#FCEBEB;color:#501313;}
.del-btn{font-size:11px;color:#aaa;cursor:pointer;padding:3px 8px;border:1px solid #dce8e0;border-radius:6px;white-space:nowrap;margin-left:8px;flex-shrink:0;}
.tab-bar{display:grid;grid-template-columns:1fr 1fr;border:1px solid #dce8e0;border-radius:10px;overflow:hidden;margin-bottom:12px;background:#f5faf7;}
.tab{padding:10px;text-align:center;cursor:pointer;font-size:13px;color:#888;font-weight:500;}
.tab.on{background:#fff;color:#1a1a1a;}
.hidden{display:none;}
.divider{border:none;border-top:1px solid rgba(0,0,0,0.07);margin:10px 0;}
.toast{background:#2E8B57;color:#fff;border-radius:8px;padding:11px 16px;font-size:13px;margin-bottom:10px;font-weight:500;animation:fadein 0.3s;}
@keyframes fadein{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.section-sub{font-size:12px;color:#888;margin:12px 0 6px;}
.empty{font-size:13px;color:#aaa;text-align:center;padding:20px 0;}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <h1>🥒 きゅうり パッキングAI</h1>
  <p>まるたかフルーツ × 味采市場｜ver 1.0</p>
</div>

<div class="tab-bar">
  <div class="tab on" id="tab-main" onclick="showTab('main')">計算・作成</div>
  <div class="tab" id="tab-log" onclick="showTab('log')">作成記録</div>
</div>

<div id="view-main">
  <div class="card">
    <label>販売区分</label>
    <div class="type-toggle">
      <div class="type-btn on" id="btn-teiban" onclick="setType('teiban')">定番</div>
      <div class="type-btn" id="btn-matome" onclick="setType('matome')">まとめ売り</div>
      <div class="type-btn" id="btn-bara" onclick="setType('bara')">バラ売り</div>
    </div>

    <div class="row2">
      <div><label>仕入れ原価（円/kg）</label><input type="number" id="cost" value="120" min="1" oninput="calc()"/></div>
      <div><label>仕入れ量（kg）</label><input type="number" id="qty" value="10" min="1" step="0.5" oninput="calc()"/></div>
    </div>

    <!-- 定番 -->
    <div id="teiban-inputs">
      <div class="row2" style="margin-bottom:0;">
        <div><label>定番サイズ</label>
          <select id="teiban-size" onchange="calc()">
            <option value="M">M（約125g・3本袋）</option>
            <option value="L">L（約145g・3本袋）</option>
          </select>
        </div>
        <div><label>品質区分</label>
          <select id="t-quality" onchange="calc()">
            <option value="A">A品（秀品）</option>
            <option value="B">B品</option>
          </select>
        </div>
      </div>
    </div>

    <!-- まとめ売り -->
    <div id="matome-inputs" class="hidden">
      <div class="row2">
        <div><label>サイズ</label>
          <select id="size" onchange="calc()">
            <option value="S">S（約105g）</option>
            <option value="M" selected>M（約125g）</option>
            <option value="L">L（約145g）</option>
            <option value="2L">2L（約165g）</option>
            <option value="3L">3L（約185g）</option>
            <option value="混在">混在（約130g）</option>
          </select>
        </div>
        <div><label>品質区分</label>
          <select id="quality" onchange="calc()">
            <option value="A">A品（秀品）</option>
            <option value="B">B品</option>
            <option value="C">C品（訳あり）</option>
          </select>
        </div>
      </div>
      <label>利益モード</label>
      <div class="mode-grid">
        <div class="mb" id="m10" onclick="setMode(10)"><span class="pct">10%</span><span class="mnm">超特価</span></div>
        <div class="mb" id="m20" onclick="setMode(20)"><span class="pct">20%</span><span class="mnm">安く売る</span></div>
        <div class="mb on30" id="m30" onclick="setMode(30)"><span class="pct">30%</span><span class="mnm">標準</span></div>
        <div class="mb" id="m40" onclick="setMode(40)"><span class="pct">40%</span><span class="mnm">しっかり</span></div>
        <div class="mb" id="m50" onclick="setMode(50)"><span class="pct">50%</span><span class="mnm">高利益</span></div>
      </div>
    </div>

    <!-- バラ売り -->
    <div id="bara-inputs" class="hidden">
      <div class="row2">
        <div><label>サイズ（L以上推奨）</label>
          <select id="bara-size" onchange="calc()">
            <option value="L">L（約145g）</option>
            <option value="2L">2L（約165g）</option>
            <option value="3L">3L（約185g）</option>
          </select>
        </div>
        <div><label>品質区分</label>
          <select id="bara-quality" onchange="calc()">
            <option value="A">A品（秀品）</option>
            <option value="B">B品</option>
          </select>
        </div>
      </div>
      <label>利益モード</label>
      <div class="mode-grid">
        <div class="mb" id="bm10" onclick="setBaraMode(10)"><span class="pct">10%</span><span class="mnm">超特価</span></div>
        <div class="mb" id="bm20" onclick="setBaraMode(20)"><span class="pct">20%</span><span class="mnm">安く売る</span></div>
        <div class="mb on30" id="bm30" onclick="setBaraMode(30)"><span class="pct">30%</span><span class="mnm">標準</span></div>
        <div class="mb" id="bm40" onclick="setBaraMode(40)"><span class="pct">40%</span><span class="mnm">しっかり</span></div>
        <div class="mb" id="bm50" onclick="setBaraMode(50)"><span class="pct">50%</span><span class="mnm">高利益</span></div>
      </div>
    </div>
  </div>

  <div id="alert-area"></div>
  <div id="result-area"></div>
</div>

<div id="view-log" class="hidden">
  <div class="card">
    <p style="font-size:15px;font-weight:600;margin-bottom:14px;">作成記録（過去7日間）</p>
    <div id="log-list"></div>
  </div>
</div>

</div>
<script>
const PRICES=[49,69,79,89,99,100,129,139,149,159,179,199,200,239,249,259,279,299,300,339,359,379,399,499,599,699,799,899,979,1000];
// サイズ別平均重量 (g) ※JA規格参考
const AVG={S:105,M:125,L:145,'2L':165,'3L':185,'混在':130};
const BAG=5,LABEL=2;
const BASE_SEC=20; // 袋詰め基本秒数（向き揃え込み）
const BARA_SEC=5;  // バラ1本 シール貼り

function laborCost(sec){return Math.round(1200*sec/3600/0.75);}
// まとめ: 1本追加ごとに約4秒増
function matomeSec(n){return BASE_SEC+n*4;}
function matomeFixed(n){return BAG+LABEL+laborCost(matomeSec(n));}
// バラ: シール+ラベルのみ（袋なし）
function baraFixed(){return LABEL+laborCost(BARA_SEC);}

// 本数推奨テーブル
const SIZE_REC={
  'S':   {r1:5, r2:10, reason1:'小玉→5本袋・家庭用手頃', reason2:'量重視なら10本袋'},
  'M':   {r1:3, r2:5,  reason1:'定番M玉→3本袋スタンダード', reason2:'お得感なら5本袋'},
  'L':   {r1:3, r2:5,  reason1:'大玉L→3本袋・高単価訴求', reason2:'まとめ感なら5本袋'},
  '2L':  {r1:3, r2:5,  reason1:'特大2L→3本袋プレミアム', reason2:'まとめ売りなら5本袋'},
  '3L':  {r1:3, r2:5,  reason1:'超大玉→3本袋・希少感訴求', reason2:'多め入れるなら5本袋'},
  '混在':{r1:5, r2:10, reason1:'混在→5本袋・量感で訴求', reason2:'大袋なら10本袋'}
};

const MS={10:{bg:'#E6F1FB',bd:'#378ADD',tx:'#042C53',nm:'超特価'},20:{bg:'#EAF3DE',bd:'#639922',tx:'#173404',nm:'安く売る'},30:{bg:'#FAEEDA',bd:'#BA7517',tx:'#412402',nm:'標準'},40:{bg:'#FAECE7',bd:'#D85A30',tx:'#4A1B0C',nm:'しっかり'},50:{bg:'#FCEBEB',bd:'#E24B4A',tx:'#501313',nm:'高利益'}};
const QC={A:{bg:'#EAF3DE',bd:'#639922',tx:'#173404',lb:'A品（秀品）'},B:{bg:'#FAEEDA',bd:'#BA7517',tx:'#412402',lb:'B品'},C:{bg:'#FAECE7',bd:'#D85A30',tx:'#4A1B0C',lb:'C品（訳あり）'}};

function nearestPrice(raw){return PRICES.reduce((p,c)=>Math.abs(c-raw)<Math.abs(p-raw)?c:p);}

// まとめ売り 1規格計算
function calcMatome(cpk,qty,n,sz,mv){
  const packG=AVG[sz]*n;
  const bags=Math.floor(qty*1000/packG);
  const cpb=Math.round(cpk*packG/1000);
  const fc=matomeFixed(n);
  const tc=cpb+fc;
  const price=nearestPrice(tc/(1-mv/100));
  const margin=Math.round((1-tc/price)*100);
  const pb=Math.round(price-tc);
  return{n,bags,cpb,fc,tc,price,margin,pb,pt:Math.round(pb*bags),
         secLabel:matomeSec(n)+'秒/袋',labor:laborCost(matomeSec(n))};
}

function costTable(cpb,fc,labor,secLabel,color,unit){
  const bagLine=(unit==='本')?'':
    `<tr><td class="lbl">袋代</td><td class="val">${BAG}円／${unit}</td></tr>`;
  return`<table class="cost-table">
    <tr><td class="lbl">青果原価</td><td class="val" style="color:${color}">${cpb}円／${unit}</td></tr>
    ${bagLine}
    <tr><td class="lbl">ラベル代</td><td class="val">${LABEL}円／${unit}</td></tr>
    <tr><td class="lbl">人件費（${secLabel}）</td><td class="val">${labor}円／${unit}</td></tr>
    <tr><td class="lbl" style="color:${color};font-weight:600;">原価合計</td>
        <td class="val" style="color:${color};font-weight:600;">${cpb+fc}円／${unit}</td></tr>
  </table>`;
}

function getLog(){try{const r=localStorage.getItem('kyuuri_v1');if(!r)return[];return JSON.parse(r).filter(x=>x.ts>Date.now()-7*24*60*60*1000);}catch(e){return[];}}
function saveLog(e){try{const l=getLog();l.unshift({...e,ts:Date.now(),id:Date.now()});localStorage.setItem('kyuuri_v1',JSON.stringify(l));}catch(e){}}
function deleteLog(id){try{const r=localStorage.getItem('kyuuri_v1');if(!r)return;localStorage.setItem('kyuuri_v1',JSON.stringify(JSON.parse(r).filter(x=>x.id!==id)));renderLog();}catch(e){}}
function fmtDate(d){return`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}

function checkAlerts(n,logType,sz){
  const log=getLog();const alerts=[];
  if(logType==='teiban'){
    const same=log.filter(r=>r.type==='teiban'&&r.sz===sz);
    if(same.length)alerts.push({level:'warn',msg:`⚠ 定番 ${sz}サイズ は ${fmtDate(new Date(same[0].ts))} に作成済みです。在庫を確認してください。`});
  }else if(logType==='matome'){
    const same=log.filter(r=>r.type==='matome'&&r.n===n);
    if(same.length)alerts.push({level:'warn',msg:`⚠ ${n}本袋 は ${fmtDate(new Date(same[0].ts))} に作成済みです。在庫を確認してください。`});
    const others=log.filter(r=>r.type==='matome'&&r.n!==n);
    if(others.length)alerts.push({level:'warn',msg:`⚠ ${[...new Set(others.map(r=>r.n+'本袋'))].join('・')} が作成済みです。規格乱立に注意。`});
  }else if(logType==='bara'){
    const same=log.filter(r=>r.type==='bara'&&r.sz===sz);
    if(same.length)alerts.push({level:'warn',msg:`⚠ バラ ${sz}サイズ は ${fmtDate(new Date(same[0].ts))} に作成済みです。`});
  }
  return alerts;
}
function renderAlerts(a){document.getElementById('alert-area').innerHTML=a.map(x=>`<div class="alert alert-${x.level}">${x.msg}</div>`).join('');}

function recordAction(n,price,bags,logType,sz,quality){
  const cpk=parseFloat(document.getElementById('cost').value)||0;
  const qty=parseFloat(document.getElementById('qty').value)||0;
  saveLog({n,price,bags,type:logType,sz,quality,cpk,qty});
  const area=document.getElementById('result-area');
  const t=document.createElement('div');t.className='toast';
  const label=logType==='teiban'?`定番 ${sz}・3本袋`:logType==='bara'?`バラ ${sz}・1本売り`:`${n}本袋 (${sz})`;
  t.textContent=`✓ ${label}・${price}円・${logType==='bara'?bags+'本':bags+'袋'} を記録しました`;
  area.prepend(t);setTimeout(()=>t.remove(),3000);calc();
}

function showTab(t){
  document.getElementById('view-main').className=t==='main'?'':'hidden';
  document.getElementById('view-log').className=t==='log'?'':'hidden';
  document.getElementById('tab-main').className='tab'+(t==='main'?' on':'');
  document.getElementById('tab-log').className='tab'+(t==='log'?' on':'');
  if(t==='log')renderLog();
}
function setType(t){
  type=t;
  ['teiban','matome','bara'].forEach(x=>{
    document.getElementById('btn-'+x).className='type-btn'+(x===t?' on':'');
    document.getElementById(x+'-inputs').className=x===t?'':'hidden';
  });
  calc();
}
function setMode(m){mode=m;[10,20,30,40,50].forEach(v=>document.getElementById('m'+v).className='mb'+(v===m?' on'+v:''));calc();}
function setBaraMode(m){baraMode=m;[10,20,30,40,50].forEach(v=>document.getElementById('bm'+v).className='mb'+(v===m?' on'+v:''));calc();}

let type='teiban',mode=30,baraMode=30;

function calc(){
  const cpk=parseFloat(document.getElementById('cost').value)||0;
  const qty=parseFloat(document.getElementById('qty').value)||0;
  const area=document.getElementById('result-area');
  if(cpk<=0||qty<=0){area.innerHTML='';document.getElementById('alert-area').innerHTML='';return;}
  if(type==='teiban')renderTeiban(cpk,qty,area);
  else if(type==='matome')renderMatome(cpk,qty,area);
  else renderBara(cpk,qty,area);
}

function renderTeiban(cpk,qty,area){
  const sz=document.getElementById('teiban-size').value;
  const quality=document.getElementById('t-quality').value;
  const n=3;
  const packG=AVG[sz]*n;
  const bags=Math.floor(qty*1000/packG);
  const cpb=Math.round(cpk*packG/1000);
  const fc=matomeFixed(n);
  const tc=cpb+fc;
  const price=nearestPrice(tc/0.70);
  const margin=Math.round((1-tc/price)*100);
  const pb=Math.round(price-tc);
  const pt=Math.round(pb*bags);
  const lab=laborCost(matomeSec(n));
  const qc=QC[quality];
  renderAlerts(checkAlerts(n,'teiban',sz));
  area.innerHTML=`<div class="result-teiban">
    <p style="font-size:13px;color:#0A3D1F;font-weight:600;margin-bottom:10px;">🥒 定番　${sz}サイズ　3本袋（約${packG}g）　値入率30%固定</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      <span class="badge" style="background:${qc.bg};border:1px solid ${qc.bd};color:${qc.tx};">${qc.lb}</span>
      <span class="badge" style="background:#E1F5E9;color:#0A3D1F;">3本袋・約${packG}g</span>
    </div>
    <div class="price-big" style="color:#0A3D1F;">${price.toLocaleString()}円</div>
    <div class="mg4">
      <div class="metric"><p class="metric-l">値入率</p><p class="metric-v">${margin}<span class="metric-u">%</span></p></div>
      <div class="metric"><p class="metric-l">粗利／袋</p><p class="metric-v">${pb.toLocaleString()}<span class="metric-u">円</span></p></div>
      <div class="metric"><p class="metric-l">袋数</p><p class="metric-v">${bags}<span class="metric-u">袋</span></p></div>
      <div class="metric"><p class="metric-l">粗利合計</p><p class="metric-v">${pt.toLocaleString()}<span class="metric-u">円</span></p></div>
    </div>
    <div class="divider"></div>
    <p style="font-size:12px;color:#0A3D1F;font-weight:600;margin-bottom:4px;">原価内訳</p>
    ${costTable(cpb,fc,lab,matomeSec(n)+'秒/袋','#0A3D1F','袋')}
    <div class="act-btn1" onclick="recordAction(${n},${price},${bags},'teiban','${sz}','${quality}')">
      ✓ 定番 ${sz}・3本袋・${price}円・${bags}袋 を記録する
    </div>
  </div>`;
}

function renderMatome(cpk,qty,area){
  const sz=document.getElementById('size').value;
  const quality=document.getElementById('quality').value;
  const rec=SIZE_REC[sz];
  const d1=calcMatome(cpk,qty,rec.r1,sz,mode);
  const d2=calcMatome(cpk,qty,rec.r2,sz,mode);
  const ms=MS[mode],qc=QC[quality];
  renderAlerts(checkAlerts(rec.r1,'matome',sz));
  const allN=[3,5,10];
  const otherBtns=allN.filter(n=>n!==d1.n&&n!==d2.n).map(n=>{
    const d=calcMatome(cpk,qty,n,sz,mode);
    return`<div class="other-btn" onclick="recordAction(${n},${d.price},${d.bags},'matome','${sz}','${quality}')">${n}本袋<br><span style="font-size:10px;color:#aaa;">${d.price}円・${d.secLabel}</span></div>`;
  }).join('');
  area.innerHTML=`<div class="card">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
      <span class="badge" style="background:${qc.bg};border:1px solid ${qc.bd};color:${qc.tx};">${qc.lb}</span>
      <span class="badge" style="background:${ms.bg};border:1px solid ${ms.bd};color:${ms.tx};">${ms.nm}（${mode}%）</span>
      <span class="badge" style="background:#f1f1ed;color:#888;">${sz}サイズ・約${AVG[sz]}g/本</span>
    </div>
    <p class="section-sub">推奨規格</p>
    <div class="rec-grid">
      <div class="rec-card" style="background:#E1F5E9;border-color:#2E8B57;">
        <p class="rec-rank">第1候補</p>
        <p class="rec-sz" style="color:#0A3D1F;">${d1.n}本袋</p>
        <p style="font-size:11px;color:#0A3D1F;margin-top:3px;">${d1.secLabel}</p>
        <p class="rec-why">${rec.reason1}</p>
      </div>
      <div class="rec-card">
        <p class="rec-rank">第2候補</p>
        <p class="rec-sz">${d2.n}本袋</p>
        <p style="font-size:11px;color:#888;margin-top:3px;">${d2.secLabel}</p>
        <p class="rec-why">${rec.reason2}</p>
      </div>
    </div>
    <p class="section-sub">第1候補　${d1.n}本袋（約${AVG[sz]*d1.n}g）</p>
    <div style="background:${ms.bg};border:1px solid ${ms.bd};border-radius:10px;padding:14px;margin-bottom:10px;">
      <div class="price-big" style="color:${ms.tx};">${d1.price.toLocaleString()}円</div>
      <div class="mg4">
        <div class="metric"><p class="metric-l">値入率</p><p class="metric-v">${d1.margin}<span class="metric-u">%</span></p></div>
        <div class="metric"><p class="metric-l">粗利／袋</p><p class="metric-v">${d1.pb.toLocaleString()}<span class="metric-u">円</span></p></div>
        <div class="metric"><p class="metric-l">袋数</p><p class="metric-v">${d1.bags}<span class="metric-u">袋</span></p></div>
        <div class="metric"><p class="metric-l">粗利合計</p><p class="metric-v">${d1.pt.toLocaleString()}<span class="metric-u">円</span></p></div>
      </div>
      <div class="divider"></div>
      <p style="font-size:12px;color:${ms.tx};font-weight:600;margin-bottom:4px;">原価内訳</p>
      ${costTable(d1.cpb,d1.fc,d1.labor,d1.secLabel,ms.tx,'袋')}
    </div>
    <p class="section-sub">第2候補　${d2.n}本袋（約${AVG[sz]*d2.n}g）</p>
    <div style="background:#f5faf7;border-radius:10px;padding:12px;margin-bottom:12px;">
      <div class="price-big" style="font-size:28px;">${d2.price.toLocaleString()}円</div>
      <div class="mg4sm">
        <div><p class="metric-l">値入率</p><p style="font-size:15px;font-weight:600;">${d2.margin}%</p></div>
        <div><p class="metric-l">粗利/袋</p><p style="font-size:15px;font-weight:600;">${d2.pb}円</p></div>
        <div><p class="metric-l">袋数</p><p style="font-size:15px;font-weight:600;">${d2.bags}袋</p></div>
        <div><p class="metric-l">粗利合計</p><p style="font-size:15px;font-weight:600;">${d2.pt.toLocaleString()}円</p></div>
      </div>
    </div>
    <p class="section-sub">作成する規格を選んで記録</p>
    <div class="act-btns">
      <div class="act-btn primary" onclick="recordAction(${d1.n},${d1.price},${d1.bags},'matome','${sz}','${quality}')">第1候補　${d1.n}本袋<br><span style="font-size:12px;opacity:0.85;">${d1.price}円 × ${d1.bags}袋</span></div>
      <div class="act-btn" onclick="recordAction(${d2.n},${d2.price},${d2.bags},'matome','${sz}','${quality}')" style="background:#E1F5E9;border-color:#2E8B57;color:#0A3D1F;">第2候補　${d2.n}本袋<br><span style="font-size:12px;">${d2.price}円 × ${d2.bags}袋</span></div>
    </div>
    ${otherBtns?`<p class="section-sub">その他の規格</p><div class="other-btns">${otherBtns}</div>`:''}
  </div>`;
}

function renderBara(cpk,qty,area){
  const sz=document.getElementById('bara-size').value;
  const quality=document.getElementById('bara-quality').value;
  const avgG=AVG[sz];
  const kosu=Math.floor(qty*1000/avgG);
  const cpb=Math.round(cpk*avgG/1000);
  const fc=baraFixed();
  const tc=cpb+fc;
  const price=nearestPrice(tc/(1-baraMode/100));
  const margin=Math.round((1-tc/price)*100);
  const pb=Math.round(price-tc);
  const pt=Math.round(pb*kosu);
  const ms=MS[baraMode];
  const qc=QC[quality];
  const lab=laborCost(BARA_SEC);
  renderAlerts(checkAlerts(0,'bara',sz));
  area.innerHTML=`<div class="result-bara">
    <p style="font-size:13px;color:#501313;font-weight:600;margin-bottom:10px;">🥒 バラ売り　${sz}サイズ　1本売り（約${avgG}g）</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      <span class="badge" style="background:${qc.bg};border:1px solid ${qc.bd};color:${qc.tx};">${qc.lb}</span>
      <span class="badge" style="background:${ms.bg};border:1px solid ${ms.bd};color:${ms.tx};">${ms.nm}（${baraMode}%）</span>
    </div>
    <div class="price-big" style="color:#501313;">${price.toLocaleString()}円</div>
    <div class="mg4">
      <div class="metric"><p class="metric-l">値入率</p><p class="metric-v">${margin}<span class="metric-u">%</span></p></div>
      <div class="metric"><p class="metric-l">粗利／本</p><p class="metric-v">${pb.toLocaleString()}<span class="metric-u">円</span></p></div>
      <div class="metric"><p class="metric-l">本数</p><p class="metric-v">${kosu}<span class="metric-u">本</span></p></div>
      <div class="metric"><p class="metric-l">粗利合計</p><p class="metric-v">${pt.toLocaleString()}<span class="metric-u">円</span></p></div>
    </div>
    <div class="divider"></div>
    <p style="font-size:12px;color:#501313;font-weight:600;margin-bottom:4px;">原価内訳</p>
    ${costTable(cpb,fc,lab,BARA_SEC+'秒/本','#501313','本')}
    <div class="act-btn bara" style="margin-top:10px;" onclick="recordAction(1,${price},${kosu},'bara','${sz}','${quality}')">
      ✓ バラ ${sz}・1本売り・${price}円・${kosu}本 を記録する
    </div>
  </div>`;
}

function renderLog(){
  const log=getLog();const el=document.getElementById('log-list');
  if(!log.length){el.innerHTML='<p class="empty">記録がありません</p>';return;}
  el.innerHTML=log.map(r=>{
    const d=new Date(r.ts);
    let label,badge;
    if(r.type==='teiban'){label=`定番 ${r.sz}・3本袋`;badge='badge-teiban';}
    else if(r.type==='bara'){label=`バラ ${r.sz}・1本売り`;badge='badge-bara';}
    else{label=`まとめ ${r.n}本袋・${r.sz}`;badge='badge-toku';}
    return`<div class="log-item">
      <div style="flex:1;">
        <span class="badge ${badge}">${label}</span>
        <span style="font-size:14px;margin-left:8px;font-weight:600;">${r.price}円</span>
        <span style="font-size:12px;color:#aaa;margin-left:6px;">${r.type==='bara'?r.bags+'本':r.bags+'袋'}</span>
        <p class="log-date">${fmtDate(d)}｜仕入 ${r.cpk}円/kg・${r.qty}kg</p>
      </div>
      <span class="del-btn" onclick="deleteLog(${r.id})">削除</span>
    </div>`;
  }).join('');
}
calc();
</script>

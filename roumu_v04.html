// ===========================================
// 全員シフト一覧（当日/週/月/指定日）
// ===========================================

function getDayPlan(empId, dateObj) {
  const y = dateObj.getFullYear();
  const m = dateObj.getMonth() + 1;
  const d = dateObj.getDate();
  const dp = state.daily_plans.find(p => p.employee_id === empId && p.year === y && p.month === m);
  if (!dp || !dp.days) return undefined;
  return dp.days[d];  // undefined=未設定 / null=休 / {start,end}=出勤
}

function formatYMD(d) {
  const wd = WEEKDAYS[d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
}
function isoDateOnly(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseISODate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function addDays(d, n) {
  const nd = new Date(d);
  nd.setDate(nd.getDate() + n);
  return nd;
}

function renderShiftOverview() {
  if (!state._shiftMode) state._shiftMode = 'day';
  if (!state._shiftDate) state._shiftDate = new Date();
  const mode = state._shiftMode;
  const baseDate = state._shiftDate;
  // モード切替タブ
  const tabs = [
    { key: 'day', label: '当日' },
    { key: 'week', label: '1週間' },
    { key: 'month', label: '1か月' },
    { key: 'custom', label: '日付指定' },
  ];
  let tabsHtml = `<div class="shift-tabs">`;
  for (const t of tabs) {
    const active = (t.key === mode) ? ' active' : '';
    tabsHtml += `<button class="shift-tab${active}" data-action="shift-mode" data-mode="${t.key}">${t.label}</button>`;
  }
  tabsHtml += `</div>`;
  let html = `
    <div class="nav-row">
      <button class="nav-btn" data-action="back-admin">← 管理画面へ戻る</button>
    </div>
    <div class="card admin-section">
      <h2>📊 全員シフト一覧</h2>
      ${tabsHtml}
  `;
  if (mode === 'day') {
    html += renderShiftDay(baseDate);
  } else if (mode === 'week') {
    html += renderShiftWeek(baseDate);
  } else if (mode === 'month') {
    html += renderShiftMonth(baseDate);
  } else if (mode === 'custom') {
    html += renderShiftCustom(baseDate);
  }
  html += `</div>`;
  return html;
}

function renderShiftDay(baseDate) {
  const dateStr = isoDateOnly(baseDate);
  const activeEmps = state.employees.filter(e => (e.status || 'active') === 'active');
  // 出勤者のみフィルタ
  const attending = [];
  for (const emp of activeEmps) {
    const day = getDayPlan(emp.id, baseDate);
    if (day && day.start && day.end) {
      const calc = calcLaborMinutes(day.start, day.end);
      attending.push({ emp, day, calc });
    }
  }
  let html = `
    <div class="shift-navbar">
      <button class="nav-btn" data-action="shift-day-prev">← 前日</button>
      <input type="date" id="shift-date-input" value="${dateStr}" data-action="shift-date-change" />
      <div class="shift-date-label">${formatYMD(baseDate)}</div>
      <button class="nav-btn" data-action="shift-day-today">今日</button>
      <button class="nav-btn" data-action="shift-day-next">翌日 →</button>
    </div>
    <div class="shift-summary">
      <span>出勤予定 <strong>${attending.length}名</strong></span>
      <span>合計実労働 <strong>${formatHMin(attending.reduce((s,a)=>s+a.calc.netMin,0))}</strong></span>
    </div>
  `;
  if (attending.length === 0) {
    html += `<div class="empty-message">この日に出勤予定の従業員はいません</div>`;
    return html;
  }
  // 始業時刻順にソート
  attending.sort((a, b) => parseTimeStr(a.day.start) - parseTimeStr(b.day.start));
  html += `<table class="shift-day-table">
    <thead><tr><th>NO</th><th>顔</th><th>名前</th><th>始業</th><th>終業</th><th>拘束</th><th>休憩</th><th>実労働</th></tr></thead><tbody>`;
  for (const { emp, day, calc } of attending) {
    const faceCell = emp.photo 
      ? `<img src="${emp.photo}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" alt=""/>`
      : `<span style="font-size:1.4rem;">${emp.emoji}</span>`;
    html += `<tr>
      <td>${emp.id}</td>
      <td style="text-align:center;">${faceCell}</td>
      <td>${emp.name}</td>
      <td style="font-variant-numeric:tabular-nums;">${day.start}</td>
      <td style="font-variant-numeric:tabular-nums;">${day.end}</td>
      <td>${formatHMin(calc.grossMin)}</td>
      <td>${calc.breakMin > 0 ? calc.breakMin + 'm' : '-'}</td>
      <td style="font-weight:bold; color:var(--green);">${formatHMin(calc.netMin)}</td>
    </tr>`;
  }
  html += `</tbody></table>`;
  return html;
}

function renderShiftWeek(baseDate) {
  // 週の開始（日曜）を計算
  const dow = baseDate.getDay();
  const weekStart = addDays(baseDate, -dow);
  const days = [];
  for (let i = 0; i < 7; i++) days.push(addDays(weekStart, i));
  const activeEmps = state.employees.filter(e => (e.status || 'active') === 'active');
  // 行ごとに各日のプランを集める
  let html = `
    <div class="shift-navbar">
      <button class="nav-btn" data-action="shift-week-prev">← 前週</button>
      <div class="shift-date-label">${weekStart.getFullYear()}年${weekStart.getMonth()+1}月${weekStart.getDate()}日 〜 ${days[6].getMonth()+1}月${days[6].getDate()}日</div>
      <button class="nav-btn" data-action="shift-week-today">今週</button>
      <button class="nav-btn" data-action="shift-week-next">翌週 →</button>
    </div>
    <div class="shift-table-wrap">
    <table class="shift-grid-table">
      <thead>
        <tr>
          <th class="sticky-col">名前</th>
  `;
  for (const d of days) {
    const dow2 = d.getDay();
    const cls = (dow2 === 0) ? 'wd-sun' : (dow2 === 6 ? 'wd-sat' : '');
    html += `<th class="${cls}">${d.getMonth()+1}/${d.getDate()}<br>(${WEEKDAYS[dow2]})</th>`;
  }
  html += `<th>個人合計</th></tr></thead><tbody>`;
  let dayTotals = days.map(() => ({ count: 0, netMin: 0 }));
  for (const emp of activeEmps) {
    const faceCell = emp.photo 
      ? `<img src="${emp.photo}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;" alt=""/>`
      : `${emp.emoji} `;
    let rowNet = 0, rowCount = 0;
    let cells = '';
    days.forEach((d, idx) => {
      const day = getDayPlan(emp.id, d);
      if (day === undefined) {
        cells += `<td class="cell-blank">-</td>`;
      } else if (day === null) {
        cells += `<td class="cell-off">休</td>`;
      } else if (day.start && day.end) {
        const c = calcLaborMinutes(day.start, day.end);
        rowNet += c.netMin; rowCount++;
        dayTotals[idx].netMin += c.netMin; dayTotals[idx].count++;
        cells += `<td class="cell-work"><div class="cw-time">${day.start}<br>〜${day.end}</div><div class="cw-hours">${formatHMin(c.netMin)}</div></td>`;
      } else {
        cells += `<td class="cell-blank">-</td>`;
      }
    });
    html += `<tr><td class="sticky-col">${faceCell}${emp.name}</td>${cells}<td class="row-total">${formatHMin(rowNet)}<br><span style="font-size:0.75rem;color:#888;">(${rowCount}日)</span></td></tr>`;
  }
  // 合計行
  html += `<tr class="totals-row"><td class="sticky-col"><strong>日別合計</strong></td>`;
  let weekTotal = 0;
  for (const t of dayTotals) {
    weekTotal += t.netMin;
    html += `<td><strong>${t.count}名</strong><br><span style="font-size:0.8rem;">${formatHMin(t.netMin)}</span></td>`;
  }
  html += `<td><strong>${formatHMin(weekTotal)}</strong></td></tr>`;
  html += `</tbody></table></div>`;
  return html;
}

function renderShiftMonth(baseDate) {
  const year = baseDate.getFullYear();
  const month = baseDate.getMonth() + 1;
  const lastDay = new Date(year, month, 0).getDate();
  const activeEmps = state.employees.filter(e => (e.status || 'active') === 'active');
  let html = `
    <div class="shift-navbar">
      <button class="nav-btn" data-action="shift-month-prev">← 前月</button>
      <div class="shift-date-label">${year}年${month}月</div>
      <button class="nav-btn" data-action="shift-month-today">今月</button>
      <button class="nav-btn" data-action="shift-month-next">翌月 →</button>
    </div>
    <div class="shift-table-wrap">
    <table class="shift-month-table">
      <thead>
        <tr>
          <th class="sticky-col">名前</th>
  `;
  for (let d = 1; d <= lastDay; d++) {
    const dateObj = new Date(year, month-1, d);
    const dow = dateObj.getDay();
    const cls = (dow === 0) ? 'wd-sun' : (dow === 6 ? 'wd-sat' : '');
    html += `<th class="month-day-th ${cls}">${d}<br><span style="font-size:0.7rem;">${WEEKDAYS[dow]}</span></th>`;
  }
  html += `<th class="month-total-th">合計</th></tr></thead><tbody>`;
  let dayTotals = new Array(lastDay + 1).fill(null).map(() => ({ count: 0, netMin: 0 }));
  for (const emp of activeEmps) {

        const c = calcLaborMinutes(day.start, day.end);
        rowNet += c.netMin; rowCount++;

        const hLabel = (c.netMin % 60 === 0) ? (c.netMin/60) + 'h' : formatHMin(c.netMin);

      : `${emp.emoji} `;
    html += `<tr><td class="sticky-col">${faceCell}${emp.name}</td>${cells}<td class="row-total">${formatHMin(rowNet)}<br><span style="font-size:0.7rem; color:#888;">(${rowCount}日)</span></td></tr>`;
  }
  // 合計行
  html += `<tr class="totals-row"><td class="sticky-col"><strong>日別出勤</strong></td>`;
  let monthTotal = 0;
  for (let d = 1; d <= lastDay; d++) {
    monthTotal += dayTotals[d].netMin;
    html += `<td class="month-cell"><strong>${dayTotals[d].count}</strong></td>`;
  }
  html += `<td><strong>${formatHMin(monthTotal)}</strong></td></tr>`;
  html += `</tbody></table></div>
    <div class="form-hint" style="margin-top:10px;">💡 横スクロールで全日確認可。セルにマウスを乗せると始業-終業時刻が表示されます。</div>`;
  return html;
}

      <div class="shift-date-label">${formatYMD(baseDate)}</div>
      <button class="nav-btn" data-action="shift-day-today">今日</button>
    </div>
    <div class="shift-summary">
      <span>出勤予定 <strong>${attending.length}名</strong></span>
      <span>合計実労働 <strong>${formatHMin(attending.reduce((s,a)=>s+a.calc.netMin,0))}</strong></span>
    </div>
  `;
  if (attending.length === 0) {
    html += `<div class="empty-message">この日に出勤予定の従業員はいません</div>`;
    return html;
  }
  attending.sort((a, b) => parseTimeStr(a.day.start) - parseTimeStr(b.day.start));
  html += `<table class="shift-day-table">
    <thead><tr><th>NO</th><th>顔</th><th>名前</th><th>始業</th><th>終業</th><th>拘束</th><th>休憩</th><th>実労働</th></tr></thead><tbody>`;
  for (const { emp, day, calc } of attending) {
    const faceCell = emp.photo 
      ? `<img src="${emp.photo}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" alt=""/>`
      : `<span style="font-size:1.4rem;">${emp.emoji}</span>`;
    html += `<tr>
      <td>${emp.id}</td><td style="text-align:center;">${faceCell}</td><td>${emp.name}</td>
      <td style="font-variant-numeric:tabular-nums;">${day.start}</td>
      <td style="font-variant-numeric:tabular-nums;">${day.end}</td>
      <td>${formatHMin(calc.grossMin)}</td>
      <td>${calc.breakMin > 0 ? calc.breakMin + 'm' : '-'}</td>
      <td style="font-weight:bold; color:var(--green);">${formatHMin(calc.netMin)}</td>
    </tr>`;
  }
  html += `</tbody></table>`;
  return html;
}

// セッションIDから安定した色を生成
function sessionColor(sessionId) {
  if (!sessionId) return null;
  let hash = 0;
  for (let i = 0; i < sessionId.length; i++) {
    hash = (hash * 31 + sessionId.charCodeAt(i)) | 0;
  }
  const palette = [
    { bg: '#fff3e0', border: '#d97847' },
    { bg: '#e8f4ee', border: '#1d9e75' },
    { bg: '#e3f2fd', border: '#2b7bbe' },
    { bg: '#f3e5f5', border: '#9c27b0' },
    { bg: '#fce4ec', border: '#e91e63' },
    { bg: '#fff9c4', border: '#d9b347' },
    { bg: '#e0f2f1', border: '#00897b' },
    { bg: '#efebe9', border: '#795548' },
  ];
  return palette[Math.abs(hash) % palette.length];
}

function renderPunchLogs() {
  if (!state._logsMode) state._logsMode = 'individual';
  if (!state._logsDate) state._logsDate = new Date();
  if (!state._logsFilter) state._logsFilter = { empIds: null, types: null };  // null=全員/全種別

  const dateStr = isoDateOnly(state._logsDate);
  // 当日打刻を取得（フィルタ適用前）
  const allPunches = state.punches
    .filter(p => p.timestamp.startsWith(dateStr))
    .sort((a, b) => a.timestamp.localeCompare(b.timestamp));
  // フィルタ
  const filter = state._logsFilter;
  const filteredPunches = allPunches.filter(p => {
    if (filter.empIds && filter.empIds.length > 0 && !filter.empIds.includes(p.employee_id)) return false;
    if (filter.types && filter.types.length > 0 && !filter.types.includes(p.type)) return false;
    return true;
  });

  const tabs = [
    { key: 'individual', label: '👥 個人別グループ' },
    { key: 'gantt', label: '📊 ガントチャート' },
    { key: 'timeline', label: '⏱️ 時系列リスト' },
  ];
  let tabsHtml = `<div class="shift-tabs">`;
  for (const t of tabs) {
    const active = (t.key === state._logsMode) ? ' active' : '';
    tabsHtml += `<button class="shift-tab${active}" data-action="logs-mode" data-mode="${t.key}">${t.label}</button>`;
  }
  tabsHtml += `</div>`;

  // 日付ナビ
  const navHtml = `
    <div class="shift-navbar">
      <button class="nav-btn" data-action="logs-day-prev">← 前日</button>
      <input type="date" id="logs-date-input" value="${dateStr}" data-action="logs-date-change" />
      <div class="shift-date-label">${formatYMD(state._logsDate)}</div>
      <button class="nav-btn" data-action="logs-day-today">今日</button>
      <button class="nav-btn" data-action="logs-day-next">翌日 →</button>
    </div>
  `;

  // フィルタUI
  const allEmps = state.employees.filter(e => (e.status || 'active') === 'active');
  const allTypes = ['START', 'WORK_START', 'WORK_END', 'BREAK', 'END'];
  let filterHtml = `<div class="logs-filter">
    <details>
      <summary>🔍 フィルタ（${filter.empIds ? filter.empIds.length + '名選択' : '全員'} / ${filter.types ? filter.types.length + '種別' : '全種別'}）</summary>
      <div class="filter-content">
        <div class="filter-group">
          <div class="filter-label">従業員：</div>
          <div class="filter-options">
            <button class="filter-chip${filter.empIds === null ? ' active' : ''}" data-action="logs-filter-emp-all">全員</button>
  `;
  for (const e of allEmps) {
    const checked = filter.empIds && filter.empIds.includes(e.id);
    filterHtml += `<button class="filter-chip${checked ? ' active' : ''}" data-action="logs-filter-emp-toggle" data-emp-id="${e.id}">${e.emoji} ${e.name}</button>`;
  }
  filterHtml += `</div></div><div class="filter-group">
          <div class="filter-label">種別：</div>
          <div class="filter-options">
            <button class="filter-chip${filter.types === null ? ' active' : ''}" data-action="logs-filter-type-all">全種別</button>
  `;
  for (const t of allTypes) {
    const checked = filter.types && filter.types.includes(t);
    const pt = PUNCH_TYPES[t];
    filterHtml += `<button class="filter-chip${checked ? ' active' : ''}" data-action="logs-filter-type-toggle" data-type="${t}">${pt.icon} ${pt.label}</button>`;
  }
  filterHtml += `</div></div></div></details></div>`;

  let html = `
    <div class="nav-row">
      <button class="nav-btn" data-action="back-admin">← 管理画面へ戻る</button>
    </div>
    <div class="card admin-section">
      <h2>📋 打刻ログ詳細</h2>
      ${tabsHtml}
      ${navHtml}
      ${filterHtml}
      <div class="shift-summary">
        <span>打刻件数 <strong>${filteredPunches.length}件</strong>${filteredPunches.length !== allPunches.length ? ` <span style="color:#888;">(全${allPunches.length}件中)</span>` : ''}</span>
      </div>
  `;

  if (state._logsMode === 'individual') {
    html += renderLogsIndividual(filteredPunches);
  } else if (state._logsMode === 'gantt') {
    html += renderLogsGantt(filteredPunches);
  } else if (state._logsMode === 'timeline') {
    html += renderLogsTimeline(filteredPunches);
  }

  return html;
}

function renderLogsIndividual(punches) {
  // 個人別にグループ化
  const byEmp = {};
  for (const p of punches) {
    if (!byEmp[p.employee_id]) byEmp[p.employee_id] = [];
    byEmp[p.employee_id].push(p);
  }
  const empIds = Object.keys(byEmp).sort();
  if (empIds.length === 0) return `<div class="empty-message">条件に該当する打刻がありません</div>`;
  let html = '<div class="logs-individual">';
  for (const empId of empIds) {
    const emp = state.employees.find(e => e.id === empId);
    if (!emp) continue;
    const list = byEmp[empId];
    const faceCell = emp.photo 
      ? `<img src="${emp.photo}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" alt=""/>`
      : `<span style="font-size:1.6rem;">${emp.emoji}</span>`;
    // 現在の状態
    const st = getEmployeeStatus(emp.id);
    html += `<div class="emp-group">
      <div class="emp-group-head">
        ${faceCell}
        <div>
          <div class="emp-group-name">${emp.name} <span style="font-size:0.85rem; color:#666;">(${emp.id})</span></div>
          <div class="emp-group-status status ${st.status}">${st.label}</div>
        </div>
        <div style="margin-left:auto; font-size:0.85rem; color:#888;">${list.length}件</div>
      </div>
      <div class="emp-group-body">
    `;
    for (const p of list) {
      const pt = PUNCH_TYPES[p.type];
      const work = p.work_item_id ? state.work_items.find(w => w.id === p.work_item_id) : null;
      const sCol = sessionColor(p.session_id);
      const sStyle = sCol 
        ? `background:${sCol.bg};border-left:4px solid ${sCol.border};` 
        : 'border-left:4px solid #e0e0e0;';
      html += `<div class="punch-row" style="${sStyle}">
        <div class="pr-time">${formatTime(p.timestamp)}</div>
        <div class="pr-badge"><span class="badge ${pt.badge}">${pt.icon} ${pt.label}</span></div>
        <div class="pr-work">${work ? work.emoji + ' ' + work.name : ''}</div>
        ${p.session_id ? `<div class="pr-session">🤝</div>` : '<div class="pr-session"></div>'}
      </div>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';
  return html;
}

function renderLogsGantt(punches) {
  // 個人別にイベントを並べる
  const byEmp = {};
  for (const p of punches) {
    if (!byEmp[p.employee_id]) byEmp[p.employee_id] = [];
    byEmp[p.employee_id].push(p);
  }
  const empIds = Object.keys(byEmp).sort();
  if (empIds.length === 0) return `<div class="empty-message">条件に該当する打刻がありません</div>`;
  // 表示時間範囲を計算（最早出勤から、最遅退勤 or 現在時刻）
  let minMin = 24 * 60, maxMin = 0;
  for (const empId of empIds) {
    for (const p of byEmp[empId]) {
      const d = new Date(p.timestamp);
      const m = d.getHours() * 60 + d.getMinutes();
      if (m < minMin) minMin = m;
      if (m > maxMin) maxMin = m;
    }
  }
  // 今日の場合、現在時刻まで含める
  const today = new Date();
  const isToday = isoDateOnly(today) === isoDateOnly(state._logsDate);
  if (isToday) {
    const nowMin = today.getHours() * 60 + today.getMinutes();
    if (nowMin > maxMin) maxMin = nowMin;
  }
  // 余白
  minMin = Math.max(0, Math.floor(minMin / 60) * 60);
  maxMin = Math.min(24 * 60, Math.ceil((maxMin + 30) / 60) * 60);
  const rangeMin = maxMin - minMin;
  if (rangeMin <= 0) return `<div class="empty-message">条件に該当する打刻がありません</div>`;
  // 時刻軸ラベル
  const hours = [];
  for (let m = minMin; m <= maxMin; m += 60) {
    hours.push(m);
  }
  let html = `<div class="gantt-wrap"><div class="gantt-container" style="grid-template-columns: 130px 1fr;">`;
  // ヘッダー
  html += `<div class="gantt-header sticky-col-g">名前</div>`;
  html += `<div class="gantt-header gantt-time-row">`;
  for (const hm of hours) {
    const pct = ((hm - minMin) / rangeMin) * 100;
    html += `<div class="gantt-tick" style="left:${pct}%;">${formatTimeStr(hm)}</div>`;
  }
  html += `</div>`;
  // 各従業員行
  for (const empId of empIds) {
    const emp = state.employees.find(e => e.id === empId);
    if (!emp) continue;
    const list = byEmp[empId].slice().sort((a, b) => a.timestamp.localeCompare(b.timestamp));
    const faceCell = emp.photo 
      ? `<img src="${emp.photo}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;" alt=""/>`
      : `${emp.emoji} `;
    html += `<div class="gantt-name sticky-col-g">${faceCell}${emp.name}</div>`;
    html += `<div class="gantt-row">`;
    // セグメント計算：状態遷移を時間範囲に変換
    let segs = [];
    let currentStart = null;
    let currentType = null;  // 'working' | 'break'
    let currentSession = null;
    let currentWork = null;
    for (const p of list) {
      const t = new Date(p.timestamp);
      const m = t.getHours() * 60 + t.getMinutes();
      if (p.type === 'WORK_START') {
        currentStart = m;
        currentType = 'working';
        currentSession = p.session_id;
        currentWork = p.work_item_id;
      } else if (p.type === 'WORK_END' && currentType === 'working') {
        segs.push({ start: currentStart, end: m, type: 'working', session: currentSession, work: currentWork });
        currentStart = null; currentType = null;
      } else if (p.type === 'BREAK') {
        if (currentType === 'working') {
          segs.push({ start: currentStart, end: m, type: 'working', session: currentSession, work: currentWork });
        }
        currentStart = m; currentType = 'break';
      } else if (p.type === 'END') {
        if (currentType === 'working') {
          segs.push({ start: currentStart, end: m, type: 'working', session: currentSession, work: currentWork });
        } else if (currentType === 'break') {
          segs.push({ start: currentStart, end: m, type: 'break' });
        }
        currentStart = null; currentType = null;
      }
    }
    // 進行中
    if (currentStart !== null && isToday) {
      const nowMin = today.getHours() * 60 + today.getMinutes();
      segs.push({ start: currentStart, end: nowMin, type: currentType, session: currentSession, work: currentWork, ongoing: true });
    }
    // 描画
    for (const seg of segs) {
      const leftPct = ((seg.start - minMin) / rangeMin) * 100;
      const widthPct = ((seg.end - seg.start) / rangeMin) * 100;
      const work = seg.work ? state.work_items.find(w => w.id === seg.work) : null;
      let cls = 'gantt-seg ';
      let bgStyle = '';
      if (seg.type === 'working') {
        const sCol = sessionColor(seg.session);
        if (sCol) {
          cls += 'gantt-work-session';
          bgStyle = `background:${sCol.bg};border-color:${sCol.border};`;
        } else {
          cls += 'gantt-work';
        }
      } else if (seg.type === 'break') {
        cls += 'gantt-break';
      }
      if (seg.ongoing) cls += ' gantt-ongoing';
      const title = `${formatTimeStr(seg.start)}-${formatTimeStr(seg.end)}${work ? ' ' + work.name : ''}${seg.session ? ' 🤝' : ''}`;
      html += `<div class="${cls}" style="left:${leftPct}%; width:${widthPct}%; ${bgStyle}" title="${title}">
        ${work ? work.emoji : (seg.type === 'break' ? '☕' : '')}
        ${seg.session ? '🤝' : ''}
      </div>`;
    }
    // 打刻マーカー
    for (const p of list) {
      if (p.type !== 'START' && p.type !== 'END') continue;
      const t = new Date(p.timestamp);
      const m = t.getHours() * 60 + t.getMinutes();
      const leftPct = ((m - minMin) / rangeMin) * 100;
      const pt = PUNCH_TYPES[p.type];
      const dotCol = p.type === 'START' ? 'var(--green)' : 'var(--red)';
      html += `<div class="gantt-marker" style="left:${leftPct}%; background:${dotCol};" title="${pt.label} ${formatTime(p.timestamp)}"></div>`;
    }
    // 「今」のライン
    if (isToday) {
      const nowMin = today.getHours() * 60 + today.getMinutes();
      if (nowMin >= minMin && nowMin <= maxMin) {
        const leftPct = ((nowMin - minMin) / rangeMin) * 100;
        html += `<div class="gantt-now-line" style="left:${leftPct}%;"></div>`;
      }
    }
    html += `</div>`;
  }
  html += `</div>
    <div class="gantt-legend" style="margin-top:14px; display:flex; gap:14px; flex-wrap:wrap; font-size:0.85rem;">
      <span><span class="legend-dot" style="background:var(--blue);"></span> 単独作業</span>
      <span><span class="legend-dot" style="background:var(--orange-light); border:1px solid var(--orange);"></span> ペア作業（同色＝同セッション）</span>
      <span><span class="legend-dot" style="background:#f0f0f0; border:1px solid #999;"></span> 休憩</span>
      <span><span class="legend-dot" style="background:var(--green); border-radius:50%;"></span> 出勤</span>
      <span><span class="legend-dot" style="background:var(--red); border-radius:50%;"></span> 退勤</span>
      ${isToday ? '<span><span class="legend-dot" style="background:var(--red); width:3px;"></span> 現在時刻</span>' : ''}
    </div></div>`;
  return html;
}

function renderLogsTimeline(punches) {
  if (punches.length === 0) return `<div class="empty-message">条件に該当する打刻がありません</div>`;
  // 降順
  const sorted = punches.slice().sort((a, b) => b.timestamp.localeCompare(a.timestamp));
  let html = `<table>
    <thead><tr><th>時刻</th><th>顔</th><th>名前</th><th>種別</th><th>作業</th><th>セッション</th></tr></thead><tbody>`;
  for (const log of sorted) {
    const emp = state.employees.find(e => e.id === log.employee_id);
    const work = log.work_item_id ? state.work_items.find(w => w.id === log.work_item_id) : null;
    const pt = PUNCH_TYPES[log.type];
    const sCol = sessionColor(log.session_id);
    const rowStyle = sCol ? `background:${sCol.bg};` : '';
    const sessTag = log.session_id 
      ? `<span style="display:inline-block; padding:2px 8px; border-radius:8px; background:${sCol.bg}; border:1px solid ${sCol.border}; font-size:0.78rem; font-weight:bold;">🤝 ${log.session_id.substring(0, 10)}</span>` 
      : '<span style="color:#aaa;">単独</span>';
    const faceMini = emp && emp.photo
      ? `<img src="${emp.photo}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;" alt=""/>`
      : (emp ? `<span style="font-size:1.2rem;">${emp.emoji}</span>` : '');
    html += `<tr style="${rowStyle}">
      <td style="font-variant-numeric:tabular-nums; font-weight:bold;">${formatTime(log.timestamp)}</td>
      <td style="text-align:center;">${faceMini}</td>
      <td>${emp ? emp.name : log.employee_id}</td>
      <td><span class="badge ${pt.badge}">${pt.icon} ${pt.label}</span></td>
      <td>${work ? `${work.emoji} ${work.name}` : '-'}</td>
      <td>${sessTag}</td>
    </tr>`;
  }
  html += `</tbody></table>`;
  return html;
}

    const faceCell = e.photo

  }
  html += `</tbody></table>

    <div class="card admin-section"><h2>📊 本日の個人別集計（${today}）</h2>
      <table><thead><tr><th>名前</th><th>労働時間</th><th>休憩時間</th><th>月契約</th></tr></thead><tbody>

      : `${s.emoji} `;

  // 進行中セッション
  html += `<div class="card admin-section"><h2>🤝 進行中セッション（${state.active_sessions.filter(s => !s.ended_at).length}件）</h2>`;

    html += `<div class="empty-message">進行中のセッションはありません</div>`;
  } else {
    html += `<table><thead><tr><th>ID</th><th>作業</th><th>開始</th><th>メンバー</th></tr></thead><tbody>`;
    for (const s of activeS) {
      const w = state.work_items.find(x => x.id === s.work_item_id);
      const names = s.members.map(mid => {
        const e = state.employees.find(x => x.id === mid);
        return e ? e.name : mid;
      }).join('・');
      html += `<tr><td>${s.id.substring(0, 10)}…</td><td>${w ? w.emoji + w.name : ''}</td><td>${formatTime(s.started_at)}</td><td>${names}</td></tr>`;
    }
    html += `</tbody></table>`;
  }
  html += `</div>`;
  // 打刻ログ
  html += `<div class="card admin-section"><h2>📋 本日の打刻ログ（${todayLogs.length}件）</h2>`;
  if (todayLogs.length === 0) {
    html += `<div class="empty-message">本日の打刻はまだありません</div>`;
  } else {
    html += `<table><thead><tr><th>時刻</th><th>氏名</th><th>種別</th><th>作業</th><th>セッション</th></tr></thead><tbody>`;
    for (const log of todayLogs) {
      const emp = state.employees.find(e => e.id === log.employee_id);
      const work = log.work_item_id ? state.work_items.find(w => w.id === log.work_item_id) : null;
      const pt = PUNCH_TYPES[log.type];
      html += `<tr>
        <td>${formatTime(log.timestamp)}</td>
        <td>${emp ? emp.name : log.employee_id}</td>
        <td><span class="badge ${pt.badge}">${pt.label}</span></td>
        <td>${work ? `${work.emoji} ${work.name}` : '-'}</td>
        <td>${log.session_id ? '🤝' + log.session_id.substring(0, 8) : '単独'}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }
  html += `</div>`;
  return html;
}

function attachHandlers() {
  document.querySelectorAll('[data-action]').forEach(el => {
    let evt = 'click';
    if (el.tagName === 'SELECT') evt = 'change';
    else if (el.tagName === 'INPUT' && (el.type === 'date' || el.type === 'number' || el.type === 'time')) evt = 'change';
    el.addEventListener(evt, handleClick);
  });
  // 写真アップロード input
  const photoInput = document.getElementById('ef-photo-file');
  if (photoInput) {
    photoInput.addEventListener('change', handlePhotoUpload);
  }
  // 日別編集のプレビュー
  const dayStart = document.getElementById('day-start');
  const dayEnd = document.getElementById('day-end');
  if (dayStart && dayEnd) {
    const updatePreview = () => {
      const s = dayStart.value, e = dayEnd.value;
      const preview = document.getElementById('day-calc-preview');
      if (!preview) return;
      if (!s || !e) { preview.textContent = '時刻を入力すると拘束・休憩・実労働が表示されます'; return; }
      if (parseTimeStr(s) >= parseTimeStr(e)) { preview.innerHTML = '<span style="color:var(--red);">終業は始業より後の時刻にしてください</span>'; return; }
      const c = calcLaborMinutes(s, e);
      preview.innerHTML = `拘束 <strong>${formatHMin(c.grossMin)}</strong> ／ 休憩 <strong>${c.breakMin > 0 ? c.breakMin + '分' : 'なし'}</strong> ／ 実労働 <strong style="color:var(--green);">${formatHMin(c.netMin)}</strong>`;
    };
    dayStart.addEventListener('input', updatePreview);
    dayEnd.addEventListener('input', updatePreview);
    updatePreview();  // 初期表示
  }
}

function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    alert('画像ファイルを選択してください');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // 短辺で正方形にクロップ → 256×256に縮小 → JPEG圧縮
      const canvas = document.createElement('canvas');
      const maxSize = 256;
      const minSide = Math.min(img.width, img.height);
      const sx = (img.width - minSide) / 2;
      const sy = (img.height - minSide) / 2;
      canvas.width = maxSize;
      canvas.height = maxSize;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, maxSize, maxSize);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      // 保存
      document.getElementById('ef-photo').value = dataUrl;
      // プレビュー更新
      const preview = document.getElementById('photo-preview');
      if (preview) preview.innerHTML = `<img src="${dataUrl}" alt="顔写真" />`;
      // 削除ボタンを動的に追加（再renderはしない、入力中の他フィールドを保持するため）
      const controls = document.querySelector('.photo-controls');
      if (controls && !controls.querySelector('[data-action="remove-photo"]')) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'nav-btn';
        btn.dataset.action = 'remove-photo';
        btn.textContent = '写真を削除';
        btn.addEventListener('click', handleClick);
        controls.insertBefore(btn, controls.querySelector('.form-hint'));
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function handleClick(e) {
  const a = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;
  const type = e.currentTarget.dataset.type;
  const pendingId = e.currentTarget.dataset.pendingId;

  if (a === 'select-employee') {
    state.current_employee_id = id;
    state.screen = 'personal';
    render();
  } else if (a === 'back-home') {
    state.screen = 'home';
    state.current_employee_id = null;
    state._selectedMembers = [];
    render();
  } else if (a === 'back-personal') {
    state.screen = 'personal';
    state._selectedMembers = [];
    render();
  } else if (a === 'back-work-select') {
    state.screen = 'work_select';
    state._selectedMembers = [];
    render();
  } else if (a === 'go-admin') {
    state.screen = 'admin';
    render();
  } else if (a === 'punch') {
    // セッションメンバーの場合、session_id付き打刻
    const st = getEmployeeStatus(state.current_employee_id);
    const sessionId = st.session_id || null;
    if (type === 'WORK_END' || type === 'BREAK' || type === 'END') {
      await punch(type, null, sessionId);
      await checkSessionEnding();
    } else {
      await punch(type, null, null);
    }
    render();
  } else if (a === 'goto-work-select') {
    state.screen = 'work_select';
    state._selectedMembers = [];
    render();
  } else if (a === 'start-solo') {
    await startSoloWork(id);
  } else if (a === 'goto-pair-select') {
    state.current_work_item_id = id;
    state._selectedMembers = [];
    state.screen = 'pair_select';
    render();
  } else if (a === 'toggle-pair-member') {
    state._selectedMembers = state._selectedMembers || [];
    if (state._selectedMembers.includes(id)) {
      state._selectedMembers = state._selectedMembers.filter(x => x !== id);
    } else {
      state._selectedMembers.push(id);
    }
    render();
  } else if (a === 'submit-pair-proposal') {
    if (state._selectedMembers.length === 0) { alert('1人以上選んでください'); return; }
    if (state.current_pending_session_id) {
      // 応答モード（既存提案への応答 or 不一致からの再選択）
      await respondToPairProposal(state.current_pending_session_id, state._selectedMembers);
      state.current_pending_session_id = null;
    } else {
      // 新規提案
      await startPairProposal(state.current_work_item_id, state._selectedMembers);
    }
    state._selectedMembers = [];
  } else if (a === 'cancel-pending') {
    if (confirm('提案をキャンセルしますか？')) {
      await cancelPairProposal(pendingId);
      state.screen = 'personal';
      render();
    }
  } else if (a === 'goto-pending-wait') {
    state.current_pending_session_id = pendingId;
    state.screen = 'pending_wait';
    render();
  } else if (a === 'goto-pair-respond') {
    const pending = state.pending_sessions.find(p => p.id === pendingId);
    if (pending) {
      state.current_pending_session_id = pending.id;
      state.screen = 'pair_respond';
      render();
    }
  } else if (a === 'accept-pair') {
    await respondToPairProposal(pendingId, 'accept');
    state.current_pending_session_id = null;
    state.screen = 'personal';
    render();
  } else if (a === 'reject-pair') {
    await respondToPairProposal(pendingId, 'reject');
    state.current_pending_session_id = null;
    // 不参加 → 作業選択画面へ戻る（社長指示）
    state.screen = 'work_select';
    state._selectedMembers = [];
    render();
  } else if (a === 'restart-pair-select') {
    state.current_pending_session_id = pendingId;
    const pending = state.pending_sessions.find(p => p.id === pendingId);
    if (pending) {
      state.current_work_item_id = pending.work_item_id;
      state._selectedMembers = [];
      state.screen = 'pair_select';
      render();
    }
  } else if (a === 'new-employee') {
    state._editingEmpId = null;
    state.screen = 'employee_edit';
    render();
  } else if (a === 'edit-employee') {
    state._editingEmpId = id;
    state.screen = 'employee_edit';
    render();
  } else if (a === 'back-admin') {
    state._editingEmpId = null;
    state.screen = 'admin';
    render();

    state._showRetired = !state._showRetired;
    render();

    e.currentTarget.classList.add('selected');
  } else if (a === 'remove-photo') {
    document.getElementById('ef-photo').value = '';

    render();
  } else if (a === 'save-employee') {

    const name = document.getElementById('ef-name').value.trim();
    const emoji = document.getElementById('ef-emoji').value.trim() || '👤';

    if (contractHours <= 0) { alert('月間契約労働時間は1時間以上を入力してください'); return; }
    const isNew = state._editingEmpId === null;
    if (isNew) {
      if (state.employees.find(emp2 => emp2.id === empId)) { alert('その従業員NOは既に存在します'); return; }
      state.employees.push({ 
        id: empId, name, emoji, photo,
        monthly_contract_hours: contractHours,
        location, status,

      const val = parseFloat(el.value);
      if (val && val > 0) {
        const task = state.work_tasks.find(t => t.id === taskId);
        newMaterials.push({
          task_id: taskId,
          product_id: productId,
          material_cost: val,
          unit: task ? task.unit : '',
          updated_at: new Date().toISOString(),
        });
      }
    });
    state.work_materials = newMaterials;
    await saveData(STORAGE_KEYS.WORK_MATERIALS, newMaterials);
    state._materialsBuf = null;
    alert(`包材費を保存しました（${newMaterials.length}件）`);
    render();
  } else if (a === 'load-sample-materials') {
    if (!confirm(`包材費のたたき台 ${DEFAULT_WORK_MATERIALS.length} 件を読み込みます。\n（現在の包材費は上書きされます）\nよろしいですか？`)) return;
    const buf = {};
    for (const m of DEFAULT_WORK_MATERIALS) {
      const key = `${m.task_id}__${m.product_id}`;
      buf[key] = m.material_cost;
    }
    state._materialsBuf = buf;
    state.work_materials = JSON.parse(JSON.stringify(DEFAULT_WORK_MATERIALS));
    await saveData(STORAGE_KEYS.WORK_MATERIALS, state.work_materials);
    alert(`たたき台を読み込みました（${DEFAULT_WORK_MATERIALS.length}件）`);
    render();
  } else if (a === 'back-tasks-master') {
    state._pricesBuf = null;
    state.screen = 'tasks_master';
    render();
  } else if (a === 'load-sample-prices') {
    if (!confirm(`単価のたたき台 ${SAMPLE_WORK_PRICES.length} 件を読み込みます。\n（現在入力中の単価は上書きされます）\nよろしいですか？`)) return;
    // バッファを上書き
    const buf = {};
    for (const p of SAMPLE_WORK_PRICES) {
      const key = `${p.task_id}__${p.product_id}`;
      buf[key] = p.unit_price;
    }
    state._pricesBuf = buf;
    render();
    // 一気に保存もする
    state.work_prices = JSON.parse(JSON.stringify(SAMPLE_WORK_PRICES));
    await saveData(STORAGE_KEYS.WORK_PRICES, state.work_prices);
    alert(`たたき台を読み込みました（${SAMPLE_WORK_PRICES.length}件）。\n画面上の値を確認・編集してから「変更を保存」を押すと反映されます。`);
  } else if (a === 'save-prices') {
    // 全 input から値を収集
    const newPrices = [];
    document.querySelectorAll('.price-input').forEach(el => {
      const taskId = el.dataset.taskId;
      const productId = el.dataset.productId;
      const val = parseFloat(el.value);
      if (val && val > 0) {
        const task = state.work_tasks.find(t => t.id === taskId);
        newPrices.push({
          task_id: taskId,
          product_id: productId,
          unit_price: val,
          unit: task ? task.unit : '',
          updated_at: new Date().toISOString(),
        });
      }
    });
    state.work_prices = newPrices;
    await saveData(STORAGE_KEYS.WORK_PRICES, newPrices);
    state._pricesBuf = null;
    alert(`単価を保存しました（${newPrices.length}件）`);
    render();
  } else if (a === 'go-app-settings') {
    state.screen = 'app_settings';
    render();
  } else if (a === 'clear-today-punches') {
    const today = todayStr();
    const before = state.punches.length;
    state.punches = state.punches.filter(p => !p.timestamp.startsWith(today));
    const removed = before - state.punches.length;
    if (!confirm(`本日の打刻 ${removed} 件を削除します。\nよろしいですか？`)) { 
      state.punches = await loadData(STORAGE_KEYS.PUNCHES, []);
      return; 
    }
    await saveData(STORAGE_KEYS.PUNCHES, state.punches);
    // 作業記録の本日分も削除
    state.work_records = state.work_records.filter(r => !r.work_started_at || !r.work_started_at.startsWith(today));
    await saveData(STORAGE_KEYS.WORK_RECORDS, state.work_records);
    // セッションもクリア
    state.pending_sessions = [];
    state.active_sessions = [];
    await saveData(STORAGE_KEYS.PENDING_SESSIONS, []);
    await saveData(STORAGE_KEYS.ACTIVE_SESSIONS, []);
    alert(`本日の打刻 ${removed} 件と関連データを削除しました。`);
    render();
  } else if (a === 'clear-all-punches') {
    if (!confirm(`⚠️ 全ての打刻データと作業記録を削除します。\nこの操作は取り消せません。本当によろしいですか？`)) return;
    if (!confirm(`本当に全ての打刻履歴を削除しますか？（最終確認）`)) return;
    state.punches = [];
    state.work_records = [];
    state.pending_sessions = [];
    state.active_sessions = [];
    await saveData(STORAGE_KEYS.PUNCHES, []);
    await saveData(STORAGE_KEYS.WORK_RECORDS, []);
    await saveData(STORAGE_KEYS.PENDING_SESSIONS, []);
    await saveData(STORAGE_KEYS.ACTIVE_SESSIONS, []);
    alert(`全ての打刻・記録を削除しました。`);
    render();
  } else if (a === 'reset-masters') {
    if (!confirm(`作業マスタと品目マスタを初期値で上書きします。\n（単価マスタ・打刻・記録には影響しません）\nよろしいですか？`)) return;
    state.work_tasks = JSON.parse(JSON.stringify(DEFAULT_WORK_TASKS));
    state.work_products = JSON.parse(JSON.stringify(DEFAULT_WORK_PRODUCTS));
    await saveData(STORAGE_KEYS.WORK_TASKS, state.work_tasks);
    await saveData(STORAGE_KEYS.WORK_PRODUCTS, state.work_products);
    alert(`マスタを初期化しました（作業${state.work_tasks.length}個・品目${state.work_products.length}個）。`);
    render();
  } else if (a === 'save-settings') {
    const ratePct = parseFloat(document.getElementById('setting-rate').value || '10');
    if (ratePct < 0 || ratePct > 100) { alert('配賦率は0〜100%の範囲で入力してください'); return; }
    state.app_settings = {
      ...state.app_settings,
      global_allocation_rate: ratePct / 100,
      global_allocation_rate_updated_at: new Date().toISOString(),
    };
    await saveData(STORAGE_KEYS.APP_SETTINGS, state.app_settings);
    alert(`設定を保存しました（配賦率：${ratePct.toFixed(1)}%）`);
    state.screen = 'admin';
    render();
  } else if (a === 'punch-solo-start') {
    // 単独で作業開始：作業内容を指定せず即座にWORK_START打刻
    await punch('WORK_START', null, null);
    render();
  } else if (a === 'goto-work-register') {
    // 作業終了：登録画面に遷移
    state._registerBuf = null;
    state._registerEnteredAt = null;
    state.screen = 'work_register';
    render();
  } else if (a === 'back-personal') {
    state.screen = 'personal';
    render();
  } else if (a === 'cancel-work-register') {
    state._registerBuf = null;
    state._registerEnteredAt = null;
    state.screen = 'personal';
    render();
  } else if (a === 'register-task-change') {
    state._registerBuf.main_task_id = e.currentTarget.value;
    render();
  } else if (a === 'register-product-change') {
    state._registerBuf.main_product_id = e.currentTarget.value;
    render();
  } else if (a === 'register-quantity-change') {
    state._registerBuf.quantity = e.currentTarget.value;
    render();
  } else if (a === 'register-sub-toggle') {
    const taskId = e.currentTarget.dataset.taskId;
    if (e.currentTarget.checked) {
      state._registerBuf.sub_tasks[taskId] = state._registerBuf.sub_tasks[taskId] || '';
    } else {
      delete state._registerBuf.sub_tasks[taskId];
    }
    render();
  } else if (a === 'register-sub-duration') {
    const taskId = e.currentTarget.dataset.taskId;
    state._registerBuf.sub_tasks[taskId] = e.currentTarget.value;
    // input イベントなので再renderしない（フォーカス維持）
  } else if (a === 'save-work-register') {
    // 入力中の sub_tasks 値を収集
    document.querySelectorAll('input[data-action="register-sub-duration"]').forEach(el => {
      const taskId = el.dataset.taskId;
      state._registerBuf.sub_tasks[taskId] = el.value;
    });
    const buf = state._registerBuf;
    if (!buf.main_task_id || !buf.main_product_id || !buf.quantity) { alert('主作業・品目・数量は必須です'); return; }
    const emp = state.employees.find(em => em.id === state.current_employee_id);
    const today = todayStr();
    // 最後のWORK_STARTを取得
    const todayPunches = state.punches
      .filter(p => p.employee_id === emp.id && p.timestamp.startsWith(today))
      .sort((a2, b2) => a2.timestamp.localeCompare(b2.timestamp));
    let workStartPunch = null;
    for (let i = todayPunches.length - 1; i >= 0; i--) {
      if (todayPunches[i].type === 'WORK_START') { workStartPunch = todayPunches[i]; break; }
      if (['WORK_END', 'BREAK', 'END'].includes(todayPunches[i].type)) break;
    }
    if (!workStartPunch) { alert('作業開始の打刻がありません'); return; }
    // WORK_END打刻
    const now = new Date().toISOString();
    await punch('WORK_END', null, null);
    // 単価取得
    const price = state.work_prices.find(p => p.task_id === buf.main_task_id && p.product_id === buf.main_product_id);
    const unitPrice = price ? price.unit_price : 0;
    const task = state.work_tasks.find(t => t.id === buf.main_task_id);
    // sub_tasks 整形
    const subTasksArr = [];
    for (const tid of Object.keys(buf.sub_tasks)) {
      const min = parseInt(buf.sub_tasks[tid], 10);
      if (min && min > 0) subTasksArr.push({ task_id: tid, duration_min: min });
    }
    // work_records に追加
    const record = {
      id: 'WR-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8),
      employee_id: emp.id,
      work_started_at: workStartPunch.timestamp,
      work_ended_at: now,
      log_completed_at: new Date().toISOString(),
      register_entered_at: state._registerEnteredAt,
      main_task_id: buf.main_task_id,
      main_product_id: buf.main_product_id,
      quantity: parseFloat(buf.quantity),
      unit: task ? task.unit : '',
      unit_price: unitPrice,
      sub_tasks: subTasksArr,
      session_id: null,
      location: emp.location,
    };
    state.work_records.push(record);
    await saveData(STORAGE_KEYS.WORK_RECORDS, state.work_records);
    state._registerBuf = null;
    state._registerEnteredAt = null;
    state.screen = 'personal';
    render();
  } else if (a === 'go-reports') {
    state._reportTab = 'wage';
    state._reportDate = new Date();
    state._reportYM = currentYM();
    state.screen = 'reports';
    render();
  } else if (a === 'report-tab') {
    state._reportTab = e.currentTarget.dataset.tab;
    render();
  } else if (a === 'volume-view') {
    state._volumeView = e.currentTarget.dataset.view;
    render();
  } else if (a === 'monthly-view') {
    state._monthlyView = e.currentTarget.dataset.view;
    render();
  } else if (a === 'ship-task-change') {
    if (!state._shipBuf) state._shipBuf = {};
    state._shipBuf.task_id = e.currentTarget.value;
    render();
  } else if (a === 'ship-product-change') {
    if (!state._shipBuf) state._shipBuf = {};
    state._shipBuf.product_id = e.currentTarget.value;
    render();
  } else if (a === 'ship-input') {
    if (!state._shipBuf) state._shipBuf = {};
    const field = e.currentTarget.dataset.field;
    state._shipBuf[field] = e.currentTarget.value;
    render();
  } else if (a === 'report-month-prev') {
    const ym = state._reportYM;
    let m = ym.month - 1, y = ym.year;
    if (m < 1) { m = 12; y--; }
    state._reportYM = { year: y, month: m };
    render();
  } else if (a === 'report-month-next') {
    const ym = state._reportYM;
    let m = ym.month + 1, y = ym.year;
    if (m > 12) { m = 1; y++; }
    state._reportYM = { year: y, month: m };
    render();
  } else if (a === 'report-month-current') {
    state._reportYM = currentYM();
    render();
  } else if (a === 'report-month-change') {
    const v = e.currentTarget.value;
    if (v) {
      const [y, m] = v.split('-').map(Number);
      state._reportYM = { year: y, month: m };
      render();
    }
  } else if (a === 'print-monthly') {
    window.print();
  } else if (a === 'export-monthly-csv') {
    exportMonthlyCSV();
  } else if (a === 'report-day-prev') {
    state._reportDate = addDays(state._reportDate, -1);
    render();
  } else if (a === 'report-day-next') {
    state._reportDate = addDays(state._reportDate, 1);
    render();
  } else if (a === 'report-day-today') {
    state._reportDate = new Date();
    render();
  } else if (a === 'report-date-change') {
    const v = e.currentTarget.value;
    if (v) { state._reportDate = parseISODate(v); render(); }
  } else if (a === 'go-shift-overview') {
    state._shiftMode = 'day';
    state._shiftDate = new Date();
    state.screen = 'shift_overview';
    render();
  } else if (a === 'shift-mode') {
    state._shiftMode = e.currentTarget.dataset.mode;
    render();
  } else if (a === 'shift-day-prev') {
    state._shiftDate = addDays(state._shiftDate, -1);
    render();
  } else if (a === 'shift-day-next') {
    state._shiftDate = addDays(state._shiftDate, 1);
    render();
  } else if (a === 'shift-day-today') {
    state._shiftDate = new Date();
    render();
  } else if (a === 'shift-week-prev') {
    state._shiftDate = addDays(state._shiftDate, -7);
    render();
  } else if (a === 'shift-week-next') {
    state._shiftDate = addDays(state._shiftDate, 7);
    render();
  } else if (a === 'shift-week-today') {
    state._shiftDate = new Date();
    render();
  } else if (a === 'shift-month-prev') {
    const d = new Date(state._shiftDate);
    d.setDate(1);
    d.setMonth(d.getMonth() - 1);
    state._shiftDate = d;
    render();
  } else if (a === 'shift-month-next') {
    const d = new Date(state._shiftDate);
    d.setDate(1);
    d.setMonth(d.getMonth() + 1);
    state._shiftDate = d;
    render();
  } else if (a === 'shift-month-today') {
    state._shiftDate = new Date();
    render();
  } else if (a === 'shift-date-change') {
    const val = e.currentTarget.value;
    if (val) {
      state._shiftDate = parseISODate(val);
      render();
    }
  } else if (a === 'go-daily-plan') {
    state.screen = 'daily_plan_list';
    render();
  } else if (a === 'back-daily-plan-list') {
    state._patternBuf = null;
    state._patternBufEmpId = null;
    state._editingPatternEmpId = null;
    state._dailyPlanEmpId = null;
    state.screen = 'daily_plan_list';
    render();
  } else if (a === 'edit-pattern') {
    state._editingPatternEmpId = e.currentTarget.dataset.empId;
    state._patternBuf = null;  // 再ロード
    state.screen = 'pattern_edit';
    render();
  } else if (a === 'pattern-set-off') {
    const day = e.currentTarget.dataset.day;
    state._patternBuf[day] = null;
    render();
  } else if (a === 'pattern-set-work') {
    const day = e.currentTarget.dataset.day;
    state._patternBuf[day] = { start: '09:00', end: '17:00' };
    render();
  } else if (a === 'save-pattern') {
    // 入力中の時刻も収集
    document.querySelectorAll('.pattern-time').forEach(el => {
      const day = el.dataset.day;
      const field = el.dataset.field;
      if (state._patternBuf[day]) state._patternBuf[day][field] = el.value;
    });
    const empId = state._editingPatternEmpId;
    const existing = getPattern(empId);
    const now = new Date().toISOString();
    if (existing) {
      existing.pattern = state._patternBuf;
      existing.updated_at = now;
    } else {
      state.work_patterns.push({
        id: 'PT-' + empId,
        employee_id: empId,
        pattern: state._patternBuf,
        updated_at: now,
      });
    }
    await saveData(STORAGE_KEYS.WORK_PATTERNS, state.work_patterns);
    state._patternBuf = null;
    state._patternBufEmpId = null;
    state._editingPatternEmpId = null;
    state.screen = 'daily_plan_list';
    render();
  } else if (a === 'delete-pattern') {
    if (!confirm('標準パターンを削除しますか？月別計画は影響を受けません。')) return;
    const empId = state._editingPatternEmpId;
    state.work_patterns = state.work_patterns.filter(p => p.employee_id !== empId);
    await saveData(STORAGE_KEYS.WORK_PATTERNS, state.work_patterns);
    state._patternBuf = null;
    state._editingPatternEmpId = null;
    state.screen = 'daily_plan_list';
    render();
  } else if (a === 'open-daily-plan') {
    state._dailyPlanEmpId = e.currentTarget.dataset.empId;
    state._dailyPlanYM = currentYM();
    state.screen = 'daily_plan_month';
    render();
  } else if (a === 'change-dpm-ym') {
    const val = e.currentTarget.value;
    const [y, m] = val.split('-').map(Number);
    state._dailyPlanYM = { year: y, month: m };
    render();
  } else if (a === 'apply-pattern') {
    const empId = state._dailyPlanEmpId;
    const { year, month } = state._dailyPlanYM;
    const pattern = getPattern(empId);
    if (!pattern) { alert('標準パターンが未登録です'); return; }
    const lastDay = new Date(year, month, 0).getDate();
    const days = {};
    for (let d = 1; d <= lastDay; d++) {
      const dow = new Date(year, month - 1, d).getDay();
      const key = WEEKDAY_KEYS[dow];
      const dayPattern = pattern.pattern[key];
      if (dayPattern && dayPattern.start && dayPattern.end) {
        days[d] = { start: dayPattern.start, end: dayPattern.end };
      } else {
        days[d] = null;  // 休
      }
    }
    const existing = getDailyPlan(empId, year, month);
    const now = new Date().toISOString();
    if (existing) {
      if (!confirm('既存の月別計画にパターンを再適用します。個別修正は上書きされます。よろしいですか？')) return;
      existing.days = days;
      existing.pattern_applied_at = now;
      existing.updated_at = now;
    } else {
      state.daily_plans.push({
        id: `DP-${year}-${month}-${empId}`,
        employee_id: empId, year, month,
        days,
        pattern_applied_at: now,
        updated_at: now,
      });
    }
    await saveData(STORAGE_KEYS.DAILY_PLANS, state.daily_plans);
    render();
  } else if (a === 'clear-all-days') {
    if (!confirm('この月の計画を全てクリアしますか？')) return;
    const empId = state._dailyPlanEmpId;
    const { year, month } = state._dailyPlanYM;
    state.daily_plans = state.daily_plans.filter(dp => 
      !(dp.employee_id === empId && dp.year === year && dp.month === month)
    );
    await saveData(STORAGE_KEYS.DAILY_PLANS, state.daily_plans);
    render();
  } else if (a === 'edit-day') {
    state._editingDay = parseInt(e.currentTarget.dataset.day, 10);
    state.screen = 'day_edit';
    render();
  } else if (a === 'back-to-month-plan') {
    state._editingDay = null;
    state.screen = 'daily_plan_month';
    render();
  } else if (a === 'save-day') {
    const empId = state._dailyPlanEmpId;
    const { year, month } = state._dailyPlanYM;
    const dayNum = state._editingDay;
    const start = document.getElementById('day-start').value;
    const endVal = document.getElementById('day-end').value;
    if (!start || !endVal) { alert('始業・終業の両方を入力してください'); return; }
    if (parseTimeStr(start) >= parseTimeStr(endVal)) { alert('終業は始業より後の時刻にしてください'); return; }
    let dp = getDailyPlan(empId, year, month);
    const now = new Date().toISOString();
    if (!dp) {
      dp = { id: `DP-${year}-${month}-${empId}`, employee_id: empId, year, month, days: {}, updated_at: now };
      state.daily_plans.push(dp);
    }
    dp.days[dayNum] = { start, end: endVal };
    dp.updated_at = now;
    await saveData(STORAGE_KEYS.DAILY_PLANS, state.daily_plans);
    state._editingDay = null;
    state.screen = 'daily_plan_month';
    render();
  } else if (a === 'set-day-off') {
    const empId = state._dailyPlanEmpId;
    const { year, month } = state._dailyPlanYM;
    const dayNum = state._editingDay;
    let dp = getDailyPlan(empId, year, month);
    const now = new Date().toISOString();
    if (!dp) {
      dp = { id: `DP-${year}-${month}-${empId}`, employee_id: empId, year, month, days: {}, updated_at: now };
      state.daily_plans.push(dp);
    }
    dp.days[dayNum] = null;
    dp.updated_at = now;
    await saveData(STORAGE_KEYS.DAILY_PLANS, state.daily_plans);
    state._editingDay = null;
    state.screen = 'daily_plan_month';
    render();
  } else if (a === 'clear-day') {
    const empId = state._dailyPlanEmpId;
    const { year, month } = state._dailyPlanYM;
    const dayNum = state._editingDay;
    let dp = getDailyPlan(empId, year, month);
    if (dp && dp.days[dayNum] !== undefined) {
      delete dp.days[dayNum];
      dp.updated_at = new Date().toISOString();
      await saveData(STORAGE_KEYS.DAILY_PLANS, state.daily_plans);
    }
    state._editingDay = null;
    state.screen = 'daily_plan_month';
    render();
  } else if (a === 'delete-emp') {
    if (confirm(`従業員 ${id} を削除しますか？打刻履歴は保持されます。`)) {
      state.employees = state.employees.filter(emp => emp.id !== id);
      await saveData(STORAGE_KEYS.EMPLOYEES, state.employees);
      render();
    }
  } else if (a === 'add-emp') {
    const newId = document.getElementById('new-emp-id').value.trim();
    const newName = document.getElementById('new-emp-name').value.trim();
    const newEmoji = document.getElementById('new-emp-emoji').value.trim() || '👤';
    const newRate = parseInt(document.getElementById('new-emp-rate').value || '1000', 10);
    if (!newId || !newName) { alert('IDと氏名は必須です'); return; }
    if (state.employees.find(emp => emp.id === newId)) { alert('そのIDは既に存在します'); return; }
    state.employees.push({ id: newId, name: newName, emoji: newEmoji, hourly_rate: newRate, location: LOCATION });
    await saveData(STORAGE_KEYS.EMPLOYEES, state.employees);
    render();
  }
}

// ===========================================
// 時計
// ===========================================

function updateClock() {
  const d = new Date();
  const wd = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
  const str = `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')} (${wd}) ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  const clockEl = document.getElementById('clock');
  if (clockEl) clockEl.textContent = str;
}

// ===========================================
// 初期化
// ===========================================

async function bootstrap() {
  // URLハッシュ #reset でlocalStorageを完全リセット
  if (location.hash === '#reset') {
    localStorage.clear();
    location.hash = '';
    location.reload();
    return;
  }
  try {
    await initializeData();
    state.employees = await loadData(STORAGE_KEYS.EMPLOYEES, []);
    state.work_items = await loadData(STORAGE_KEYS.WORK_ITEMS, []);
    state.punches = await loadData(STORAGE_KEYS.PUNCHES, []);
    state.pending_sessions = await loadData(STORAGE_KEYS.PENDING_SESSIONS, []);
    state.active_sessions = await loadData(STORAGE_KEYS.ACTIVE_SESSIONS, []);
    state.work_plans = await loadData(STORAGE_KEYS.WORK_PLANS, []);
    state.work_patterns = await loadData(STORAGE_KEYS.WORK_PATTERNS, []);
    state.daily_plans = await loadData(STORAGE_KEYS.DAILY_PLANS, []);
    // v0.6 マスタ
    state.work_tasks = await loadData(STORAGE_KEYS.WORK_TASKS, []);
    state.work_products = await loadData(STORAGE_KEYS.WORK_PRODUCTS, []);
    state.work_prices = await loadData(STORAGE_KEYS.WORK_PRICES, []);
    state.work_materials = await loadData(STORAGE_KEYS.WORK_MATERIALS, []);
    state.work_records = await loadData(STORAGE_KEYS.WORK_RECORDS, []);
    state.app_settings = await loadData(STORAGE_KEYS.APP_SETTINGS, DEFAULT_APP_SETTINGS);
    // データ整合性チェック：マスタが空または不正なら DEFAULT で再初期化
    if (!Array.isArray(state.employees) || state.employees.length === 0) {
      state.employees = JSON.parse(JSON.stringify(DEFAULT_EMPLOYEES));
      await saveData(STORAGE_KEYS.EMPLOYEES, state.employees);
    }
    if (!Array.isArray(state.work_tasks) || state.work_tasks.length === 0) {
      state.work_tasks = JSON.parse(JSON.stringify(DEFAULT_WORK_TASKS));
      await saveData(STORAGE_KEYS.WORK_TASKS, state.work_tasks);
    }
    if (!Array.isArray(state.work_products) || state.work_products.length === 0) {
      state.work_products = JSON.parse(JSON.stringify(DEFAULT_WORK_PRODUCTS));
      await saveData(STORAGE_KEYS.WORK_PRODUCTS, state.work_products);
    }
    render();
  } catch (e) {
    console.error('Bootstrap error:', e);
    // エラー画面を表示してリセット案内
    document.body.innerHTML = `
      <div style="padding:40px; max-width:600px; margin:0 auto; font-family:sans-serif;">
        <h2 style="color:#c62828;">⚠️ データ読み込みエラー</h2>
        <p>保存データに問題があります。エラー内容：</p>
        <pre style="background:#ffebee; padding:14px; border-radius:6px; overflow:auto;">${(e && e.message) || e}</pre>
        <p>下のボタンで全データをリセットして再起動できます。<br>
        <strong>※ 従業員マスタや単価マスタなど全てのデータが初期値に戻ります。</strong></p>
        <button onclick="localStorage.clear(); location.hash=''; location.reload();" 
          style="padding:14px 28px; background:#c62828; color:white; border:none; border-radius:8px; font-size:1.1rem; cursor:pointer; font-weight:bold;">
          🔄 リセットして再起動
        </button>
      </div>
    `;
    return;
  }
  updateClock();
  setInterval(updateClock, 1000);
  // pending タイムアウト＆ペンディング画面の自動更新
  setInterval(async () => {
    await checkTimeouts();
    // pending_wait画面の場合、毎秒タイマー更新
    if (state.screen === 'pending_wait') render();
  }, 1000);
  // 全体定期更新
  setInterval(() => {
    if (state.screen === 'personal' || state.screen === 'admin' || state.screen === 'home') {
      render();
    }
  }, 60000);
}

bootstrap();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>味采市場 川口センター 打刻システム v0.4</title>
<style>
  :root {
    --green: #1d9e75;
    --green-light: #d0e8dd;
    --green-bg: #e8f4ee;
    --blue: #2b7bbe;
    --blue-light: #cbe3f3;
    --orange: #d97847;
    --orange-light: #f4dccb;
    --yellow: #d9b347;
    --red: #c24e4e;
    --gray: #888;
    --bg: #f7f9f8;
    --card: #ffffff;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; }
  body {
    font-family: "メイリオ", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0;
    color: #222;
  }
  header {
    background: var(--green);
    color: white;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow);
  }
  header h1 { margin: 0; font-size: 1.3rem; font-weight: bold; }
  .clock {
    background: rgba(255,255,255,0.2);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
  }
  main { max-width: 1100px; margin: 0 auto; padding: 24px; }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .card h2 {
    margin: 0 0 16px 0;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--green-light);
    font-size: 1.15rem;
    color: var(--green);
  }
  .card.pending-card h2 { color: var(--orange); border-bottom-color: var(--orange-light); }
  .card.alert-card h2 { color: var(--red); border-bottom-color: #f1cccc; }
  .card.team-card h2 { color: var(--blue); border-bottom-color: var(--blue-light); }
  .card.history-card h2 { color: var(--blue); border-bottom-color: var(--blue-light); }

  .greeting { font-size: 1rem; color: #555; margin-bottom: 18px; }

  /* 画面①：従業員ボタングリッド */
  .employee-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }
  .emp-btn {
    background: var(--card);
    border: 2px solid var(--green-light);
    border-radius: 12px;
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
    position: relative;
  }
  .emp-btn:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: var(--shadow); }
  .emp-btn.selectable { border-color: var(--blue); background: var(--blue-light); }
  .emp-btn.selected { border-color: var(--blue); background: var(--blue); color: white; }
  .emp-btn.pending { border-color: var(--orange); background: var(--orange-light); }
  .emp-btn .face { font-size: 3.2rem; line-height: 1; margin-bottom: 6px; }
  .emp-btn .face-img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    margin: 0 auto 6px;
  }
  .emp-btn .name { font-weight: bold; font-size: 1rem; }
  .emp-btn .status { font-size: 0.75rem; color: var(--gray); margin-top: 4px; }
  .emp-btn .status.working { color: var(--blue); }
  .emp-btn .status.break { color: var(--yellow); }
  .emp-btn .status.off { color: var(--gray); }
  .emp-btn .status.pending { color: var(--orange); font-weight: bold; }
  .emp-btn .wait-info { font-size: 0.7rem; color: var(--orange); margin-top: 2px; }

  /* 打刻ボタン */
  .punch-area {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-top: 12px;
  }
  .punch-btn {
    border: none;
    border-radius: 14px;
    padding: 22px;
    font-size: 1.15rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .punch-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow); }
  .punch-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .punch-btn .icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }
  .btn-start { background: var(--green); }
  .btn-work-start { background: var(--blue); }
  .btn-work-end { background: var(--orange); }
  .btn-break { background: var(--yellow); }
  .btn-end { background: var(--red); }

  .summary-box {
    background: var(--green-bg);
    border-radius: 8px;
    padding: 14px;
    margin-top: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .summary-item .label { font-size: 0.8rem; color: var(--gray); }
  .summary-item .value { font-size: 1.4rem; font-weight: bold; color: var(--green); font-variant-numeric: tabular-nums; }

  /* 作業選択画面 */
  .work-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .work-tile {
    background: var(--card);
    border: 2px solid var(--blue);
    border-radius: 12px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .work-tile .work-label {
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--blue);
    text-align: center;
  }
  .work-tile .work-emoji { font-size: 2.2rem; text-align: center; line-height: 1; }
  .work-tile .work-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .work-tile button {
    border: none;
    border-radius: 6px;
    padding: 10px;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
    font-size: 0.85rem;
  }
  .work-tile .btn-solo { background: var(--blue); color: white; }
  .work-tile .btn-pair { background: white; color: var(--blue); border: 1.5px solid var(--blue); }
  .work-tile button:hover { transform: translateY(-1px); box-shadow: var(--shadow); }

  /* ナビゲーション */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .nav-btn {
    background: white;
    border: 1.5px solid #ccc;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
  }
  .nav-btn:hover { border-color: var(--green); color: var(--green); }
  .admin-btn { border-color: var(--gray); color: #555; }
  .primary-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
    font-family: inherit;
  }
  .primary-btn:hover { box-shadow: var(--shadow); }
  .primary-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* 管理画面 */
  .admin-section { margin-bottom: 28px; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 0.92rem;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 8px 10px;
    text-align: left;
  }
  th { background: var(--green-bg); font-weight: bold; }
  tr:nth-child(even) { background: #fafafa; }

  .add-form {
    background: var(--green-bg);
    padding: 14px;
    border-radius: 8px;
    margin-top: 10px;
    display: grid;
    grid-template-columns: 80px 1fr 100px 100px 80px;
    gap: 8px;
    align-items: center;
  }
  .add-form input {
    padding: 6px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.9rem;
  }
  .add-form button {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 8px;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
  }
  .delete-btn {
    background: var(--red);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
  }

  .empty-message {
    text-align: center;
    color: var(--gray);
    padding: 40px 20px;
    font-size: 0.95rem;
  }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 0.78rem;
    color: white;
    font-weight: bold;
  }
  .badge-start { background: var(--green); }
  .badge-work-start { background: var(--blue); }
  .badge-work-end { background: var(--orange); }
  .badge-break { background: var(--yellow); }
  .badge-end { background: var(--red); }
  .badge-pair { background: var(--orange); }

  /* 打刻履歴一覧 */
  .history-list {
    border: 1px solid var(--green-light);
    border-radius: 8px;
    overflow: hidden;
  }
  .history-row {
    display: grid;
    grid-template-columns: 90px 130px 1fr;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid #eee;
    align-items: center;
    font-size: 0.95rem;
  }
  .history-row:last-child { border-bottom: none; }
  .history-row:nth-child(odd) { background: #fafafa; }
  .history-time {
    font-weight: bold;
    font-variant-numeric: tabular-nums;
    font-size: 1.05rem;
    color: #333;
  }
  .history-work { color: #555; }

  /* 進行中チーム一覧 */
  .team-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
  }
  .team-tile {
    background: var(--blue-light);
    border-radius: 10px;
    padding: 12px 14px;
    border-left: 5px solid var(--blue);
  }
  .team-tile .team-work {
    font-size: 1.05rem;
    font-weight: bold;
    color: var(--blue);
    margin-bottom: 4px;
  }
  .team-tile .team-info {
    font-size: 0.88rem;
    color: #444;
  }

  /* ペア選択画面 */
  .pair-instructions {
    background: var(--orange-light);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 16px;
    font-size: 0.95rem;
    color: #5a3000;
  }
  .selected-count {
    margin-top: 12px;
    padding: 10px;
    background: var(--green-bg);
    border-radius: 6px;
    font-weight: bold;
    text-align: center;
  }

  /* 不一致アラート */
  .mismatch-info {
    background: #fff5f5;
    border: 1.5px solid var(--red);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .mismatch-info .head { font-weight: bold; color: var(--red); margin-bottom: 8px; }
  .mismatch-row {
    padding: 6px 0;
    border-bottom: 1px dashed #eee;
    font-size: 0.95rem;
  }
  .mismatch-row:last-child { border-bottom: none; }

  /* 確認待ち画面 */
  .pending-info {
    background: var(--orange-light);
    border-radius: 8px;
    padding: 18px;
    margin-bottom: 16px;
    text-align: center;
  }
  .pending-info .work-label { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
  .pending-info .timer { font-size: 2rem; font-weight: bold; color: var(--orange); font-variant-numeric: tabular-nums; margin: 10px 0; }
  .pending-info .waiting-for {
    color: #5a3000;
    margin-top: 10px;
    font-size: 0.95rem;
  }

  /* 応答画面（招待者用） */
  .respond-info {
    background: var(--orange-light);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 18px;
  }
  .respond-work {
    font-size: 1.5rem;
    font-weight: bold;
    text-align: center;
    color: #5a3000;
    margin-bottom: 10px;
  }
  .respond-initiator {
    text-align: center;
    color: #5a3000;
    font-size: 1rem;
    margin-bottom: 14px;
  }
  .respond-members-label {
    font-weight: bold;
    color: #5a3000;
    font-size: 0.92rem;
    margin-bottom: 6px;
  }
  .respond-members {
    background: white;
    border-radius: 8px;
    padding: 8px;
  }
  .member-row {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #f0f0f0;
  }
  .member-row:last-child { border-bottom: none; }
  .member-row.me { background: var(--green-bg); font-weight: bold; }
  .member-row .m-emoji { font-size: 1.6rem; }
  .member-row .m-name { font-size: 1rem; }

  .respond-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .respond-btn {
    border: none;
    border-radius: 14px;
    padding: 24px;
    font-size: 1.2rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .respond-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .respond-btn .big { display: block; font-size: 2rem; line-height: 1; margin-bottom: 4px; }
  .btn-accept { background: var(--green); }
  .btn-reject { background: var(--gray); }

  /* 従業員登録/編集フォーム */
  .emp-form { display: flex; flex-direction: column; gap: 18px; }
  .form-row { display: flex; flex-direction: column; gap: 6px; }
  .form-label {
    font-weight: bold;
    color: #333;
    font-size: 0.95rem;
  }
  .form-label .required {
    color: var(--red);
    font-size: 0.75rem;
    margin-left: 6px;
    padding: 2px 6px;
    background: #fff5f5;
    border-radius: 3px;
    font-weight: normal;
  }
  .form-row input, .form-row select {
    padding: 10px 12px;
    border: 1.5px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
    font-family: inherit;
  }
  .form-row input:focus, .form-row select:focus {
    border-color: var(--green);
    outline: none;
  }
  .form-row input[readonly] { background: #f5f5f5; color: #777; }
  .form-hint { font-size: 0.8rem; color: var(--gray); }
  .emoji-picker {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
    gap: 6px;
    max-width: 600px;
  }
  .emoji-pick {
    background: white;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    padding: 8px;
    font-size: 1.6rem;
    cursor: pointer;
    transition: all 0.1s;
    font-family: inherit;
  }
  .emoji-pick:hover { border-color: var(--green); transform: scale(1.05); }
  .emoji-pick.selected { border-color: var(--green); background: var(--green-bg); box-shadow: 0 0 0 2px var(--green); }
  .form-actions {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 8px;
  }

  /* 顔写真UI */
  .photo-area {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .photo-preview {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--green-bg);
    border: 2px solid var(--green-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-placeholder { font-size: 4rem; }
  .photo-controls {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .photo-upload-btn {
    display: inline-block;
    background: var(--blue);
    color: white;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.95rem;
    text-align: center;
    width: fit-content;
    transition: all 0.15s;
  }
  .photo-upload-btn:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

  /* 標準パターン編集テーブル */
  .pattern-table { font-size: 0.95rem; }
  .pattern-table input[type="time"] {
    width: 110px;
    padding: 6px 8px;
    border: 1.5px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
  }
  .pattern-table tr.is-off { background: #f5f5f5; opacity: 0.8; }
  .wd-sun, .wd-sun-cell { color: #c24e4e; }
  .wd-sat, .wd-sat-cell { color: #2b7bbe; }

  /* カレンダー表示 */
  .calendar-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 4px;
  }
  .calendar-table th {
    background: var(--green-bg);
    text-align: center;
    padding: 8px;
    font-weight: bold;
  }
  .cal-cell {
    border: 1px solid #ddd;
    border-radius: 6px;
    height: 90px;
    vertical-align: top;
    padding: 6px;
    background: white;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cal-cell:hover { box-shadow: var(--shadow); border-color: var(--green); }
  .cal-cell.cal-work { background: #e8f4ee; border-color: var(--green-light); }
  .cal-cell.cal-off-cell { background: #f5f5f5; }
  .cal-cell.cal-blank { background: white; }
  .cal-empty { border: none; background: transparent; }
  .cal-day-num { font-size: 0.85rem; font-weight: bold; color: #555; }
  .cal-time { font-size: 0.78rem; color: #333; margin-top: 4px; text-align: center; line-height: 1.2; }
  .cal-hours { font-size: 0.95rem; font-weight: bold; color: var(--green); text-align: center; margin-top: 2px; }
  .cal-off {
    font-size: 1.1rem;
    color: #999;
    font-weight: bold;
    text-align: center;
    margin-top: 14px;
  }

  /* シフト一覧画面 */
  .shift-tabs {
    display: flex;
    gap: 4px;
    border-bottom: 2px solid #e0e0e0;
    margin-bottom: 16px;
  }
  .shift-tab {
    background: white;
    border: 1.5px solid #ddd;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 10px 18px;
    cursor: pointer;
    font-weight: bold;
    color: #666;
    font-family: inherit;
    font-size: 0.95rem;
    margin-bottom: -2px;
  }
  .shift-tab:hover { background: var(--green-bg); }
  .shift-tab.active {
    background: var(--green-bg);
    color: var(--green);
    border-color: var(--green);
    border-bottom: 2px solid var(--green-bg);
  }
  .shift-navbar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
    background: #fafafa;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .shift-date-label {
    font-size: 1.1rem;
    font-weight: bold;
    color: #333;
    margin: 0 auto;
  }
  .shift-summary {
    display: flex;
    gap: 24px;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: var(--green-bg);
    border-radius: 6px;
  }
  .shift-summary span strong { font-size: 1.15rem; color: var(--green); }
  .shift-day-table { width: 100%; }
  .shift-table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
  }
  .shift-grid-table, .shift-month-table {
    border-collapse: collapse;
    font-size: 0.85rem;
    min-width: 100%;
  }
  .shift-grid-table th, .shift-grid-table td,
  .shift-month-table th, .shift-month-table td {
    border: 1px solid #e0e0e0;
    padding: 6px 4px;
    text-align: center;
    background: white;
  }
  .shift-grid-table thead th, .shift-month-table thead th {
    background: var(--green-bg);
    position: sticky;
    top: 0;
    font-weight: bold;
  }
  .sticky-col {
    position: sticky;
    left: 0;
    background: white !important;
    text-align: left !important;
    min-width: 140px;
    font-weight: 500;
    z-index: 1;
  }
  .totals-row td { background: #fff8e0 !important; font-size: 0.85rem; }
  .totals-row .sticky-col { background: #fff8e0 !important; }
  .cell-work { background: #e8f4ee !important; }
  .cell-work .cw-time { font-size: 0.75rem; color: #333; line-height: 1.2; }
  .cell-work .cw-hours { font-weight: bold; color: var(--green); font-size: 0.9rem; }
  .cell-off { background: #f0f0f0 !important; color: #999; }
  .cell-blank { color: #ccc; }
  .row-total { background: #fafafa !important; font-weight: bold; }
  .month-day-th { min-width: 38px; font-size: 0.8rem; }
  .month-cell { min-width: 38px; padding: 4px 2px !important; font-size: 0.85rem; }
  .month-cell.cell-work { font-weight: bold; color: var(--green); }
  .month-total-th { min-width: 80px; background: #fff8e0 !important; }

  /* 打刻ログ詳細画面 */
  .logs-filter {
    margin-bottom: 14px;
    background: #fafafa;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .logs-filter summary {
    cursor: pointer;
    font-weight: bold;
    color: #555;
    font-size: 0.9rem;
  }
  .filter-content {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .filter-group { display: flex; align-items: flex-start; gap: 10px; }

async function loadData(key, defaultValue) {
  try {
    if (HAS_WINDOW_STORAGE) {
      const r = await window.storage.get(key);
      if (r && r.value) return JSON.parse(r.value);
    } else {
      const v = localStorage.getItem(key);
      if (v) return JSON.parse(v);
    }
  } catch (e) {}
  return defaultValue;
}
async function saveData(key, value) {
  try {
    if (HAS_WINDOW_STORAGE) {
      await window.storage.set(key, JSON.stringify(value));
    } else {
      localStorage.setItem(key, JSON.stringify(value));
    }
  } catch (e) {
    console.error('保存エラー:', e);
    alert('データ保存に失敗しました：' + e.message);
  }

const PUNCH_TYPES = {

  WORK_START: { label: '作業開始', icon: '🔵', badge: 'badge-work-start' },
  WORK_END: { label: '作業終了', icon: '🟠', badge: 'badge-work-end' },
  BREAK: { label: '休憩', icon: '🟡', badge: 'badge-break' },

};

const LOCATION = '川口';  // フェーズ1は川口固定

// ===========================================
// 共通ユーティリティ
// ===========================================

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function formatMinutes(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h}:${String(m).padStart(2, '0')}`;
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}
function generateSessionId() {
  return 'S' + Date.now() + '-' + Math.floor(Math.random() * 1000);
}
function generatePendingId() {
  return 'P' + Date.now() + '-' + Math.floor(Math.random() * 1000);
}

// ===========================================
// 状態判定
// ===========================================

function getEmployeeStatus(empId) {
  // 招待されているが未応答（ペア提案受信中）
  const incomingPending = state.pending_sessions.find(ps => 
    ps.invited_members && ps.invited_members.includes(empId) && 
    ps.initiator !== empId && 
    (ps.proposed_members[empId] === undefined || ps.proposed_members[empId] === null)
  );
  if (incomingPending) {
    const initiator = state.employees.find(e => e.id === incomingPending.initiator);
    return { status: 'invited', label: '⏳提案受信中', pending_id: incomingPending.id, initiator_name: initiator ? initiator.name : '' };
  }
  // ペア確認中チェック（提案者か、受諾済みの招待者）
  const pending = state.pending_sessions.find(ps => 
    ps.proposed_members && ps.proposed_members[empId] !== undefined
  );
  if (pending) {
    const waitingFor = pending.invited_members.filter(id => 
      pending.proposed_members[id] === undefined || pending.proposed_members[id] === null
    );
    return { status: 'pending', label: '⏳ペア確認中', pending_id: pending.id, waiting_for: waitingFor };
  }
  // 進行中セッションメンバー
  const activeSession = state.active_sessions.find(s => 
    s.ended_at === null && s.members.includes(empId)
  );
  if (activeSession) {
    return { status: 'working', label: '作業中', session_id: activeSession.id, work_item_id: activeSession.work_item_id };
  }
  // 今日の打刻ログから判定
  const today = todayStr();
  const todayPunches = state.punches
    .filter(p => p.employee_id === empId && p.timestamp.startsWith(today))
    .sort((a, b) => a.timestamp.localeCompare(b.timestamp));
  if (todayPunches.length === 0) return { status: 'off', label: '未出勤' };
  const last = todayPunches[todayPunches.length - 1];
  switch (last.type) {
    case 'START': return { status: 'idle', label: '出勤済' };
    case 'WORK_START': return { status: 'working', label: '作業中（単独）', work_item_id: last.work_item_id };
    case 'WORK_END': return { status: 'idle', label: '作業終了' };
    case 'BREAK': return { status: 'break', label: '休憩中' };
    case 'END': return { status: 'off', label: '退勤済' };
    default: return { status: 'off', label: '不明' };
  }
}

function getTodayTotals(empId) {
  const today = todayStr();
  const todayPunches = state.punches
    .filter(p => p.employee_id === empId && p.timestamp.startsWith(today))
    .sort((a, b) => a.timestamp.localeCompare(b.timestamp));
  let workMinutes = 0, breakMinutes = 0, lastStart = null, lastBreak = null;
  for (const p of todayPunches) {
    const t = new Date(p.timestamp);
    if (p.type === 'WORK_START') lastStart = t;
    if (p.type === 'WORK_END' && lastStart) { workMinutes += Math.round((t - lastStart) / 60000); lastStart = null; }
    if (p.type === 'BREAK') {
      lastBreak = t;
      if (lastStart) { workMinutes += Math.round((t - lastStart) / 60000); lastStart = null; }
    }
    if (p.type === 'END') {
      if (lastBreak) { breakMinutes += Math.round((t - lastBreak) / 60000); lastBreak = null; }
      if (lastStart) { workMinutes += Math.round((t - lastStart) / 60000); lastStart = null; }
    }
  }
  // 進行中
  if (lastStart) workMinutes += Math.round((new Date() - lastStart) / 60000);
  if (lastBreak && !lastStart) breakMinutes += Math.round((new Date() - lastBreak) / 60000);
  return { workMinutes, breakMinutes };
}

// 全員一致判定：全員 'accept' なら matched、誰か 'reject' なら rejected、未応答ありなら waiting
function checkPairAgreement(pendingSession) {
  const invited = pendingSession.invited_members;
  let hasReject = false;
  let allAccepted = true;
  for (const memberId of invited) {
    const v = pendingSession.proposed_members[memberId];
    if (v === undefined || v === null) { allAccepted = false; }
    else if (v === 'reject') { hasReject = true; break; }
    else if (v !== 'accept') {
      // 旧形式（配列）が来た場合は accept とみなす（後方互換）
      // 何もしない
    }
  }
  if (hasReject) return { status: 'rejected' };
  if (allAccepted) return { status: 'matched' };
  return { status: 'waiting' };
}

// 打刻アクション
// ===========================================

async function punch(type, workItemId = null, sessionId = null) {
  const punch = {
    timestamp: new Date().toISOString(),
    employee_id: state.current_employee_id,
    type: type,
    work_item_id: workItemId,
    session_id: sessionId,
    location: LOCATION,
  };
  state.punches.push(punch);
  await saveData(STORAGE_KEYS.PUNCHES, state.punches);
}

// 単独作業開始
async function startSoloWork(workItemId) {
  await punch('WORK_START', workItemId, null);
  state.screen = 'personal';
  state.current_work_item_id = null;
  render();
}

// ペア提案開始（提案者がメンバーを選んで作成）
async function startPairProposal(workItemId, selectedMemberIds) {
  const pendingId = generatePendingId();
  const invitedMembers = [state.current_employee_id, ...selectedMemberIds];
  const pending = {
    id: pendingId,
    initiator: state.current_employee_id,
    work_item_id: workItemId,
    invited_members: invitedMembers,
    proposed_members: { [state.current_employee_id]: 'accept' },
    location: LOCATION,
    created_at: new Date().toISOString(),
    timeout_at: new Date(Date.now() + TIMEOUT_MS).toISOString(),
  };
  state.pending_sessions.push(pending);
  await saveData(STORAGE_KEYS.PENDING_SESSIONS, state.pending_sessions);
  state.current_pending_session_id = pendingId;
  state.screen = 'pending_wait';
  render();
}

// 既存ペア提案への応答（accept/reject）
async function respondToPairProposal(pendingId, response) {
  // response: 'accept' or 'reject'
  const pending = state.pending_sessions.find(p => p.id === pendingId);
  if (!pending) { alert('提案が見つかりません'); return; }
  pending.proposed_members[state.current_employee_id] = response;
  await saveData(STORAGE_KEYS.PENDING_SESSIONS, state.pending_sessions);
  // 拒否 → 即時不成立
  if (response === 'reject') {
    // 提案者を単独作業として確定（提案された作業内容で）
    const now = new Date().toISOString();
    state.punches.push({
      timestamp: now,
      employee_id: pending.initiator,
      type: 'WORK_START',
      work_item_id: pending.work_item_id,
      session_id: null,
      location: pending.location,
    });
    await saveData(STORAGE_KEYS.PUNCHES, state.punches);
    // pending 削除
    state.pending_sessions = state.pending_sessions.filter(p => p.id !== pending.id);
    await saveData(STORAGE_KEYS.PENDING_SESSIONS, state.pending_sessions);
    return;
  }
  // 受諾 → 一致判定
  const result = checkPairAgreement(pending);
  if (result.status === 'matched') {
    await confirmPairSession(pending);
  }
}

// ペアセッション確定
async function confirmPairSession(pending) {
  const sessionId = generateSessionId();
  const now = new Date().toISOString();
  const session = {
    id: sessionId,
    work_item_id: pending.work_item_id,
    members: pending.invited_members.slice(),
    initial_members: pending.invited_members.slice(),
    joined_later: [],
    on_break: [],
    location: pending.location,
    started_at: now,
    ended_at: null,
  };
  state.active_sessions.push(session);
  await saveData(STORAGE_KEYS.ACTIVE_SESSIONS, state.active_sessions);
  // 全メンバーの WORK_START 打刻
  for (const memberId of pending.invited_members) {
    state.punches.push({
      timestamp: now,
      employee_id: memberId,
      type: 'WORK_START',
      work_item_id: pending.work_item_id,
      session_id: sessionId,
      location: pending.location,
    });
  }
  await saveData(STORAGE_KEYS.PUNCHES, state.punches);
  // pending_sessions から削除
  state.pending_sessions = state.pending_sessions.filter(p => p.id !== pending.id);
  await saveData(STORAGE_KEYS.PENDING_SESSIONS, state.pending_sessions);
}

// 提案のキャンセル
async function cancelPairProposal(pendingId) {
  state.pending_sessions = state.pending_sessions.filter(p => p.id !== pendingId);
  await saveData(STORAGE_KEYS.PENDING_SESSIONS, state.pending_sessions);
}

// タイムアウトチェック
async function checkTimeouts() {
  const now = Date.now();
  let changed = false;
  for (const pending of state.pending_sessions.slice()) {
    if (new Date(pending.timeout_at).getTime() < now) {
      // タイムアウト → 提案者を単独作業として確定
      const initiatorId = pending.initiator;
      const wasCurrentEmp = (state.current_employee_id === initiatorId);
      // 提案者だけ単独打刻
      state.punches.push({
        timestamp: new Date().toISOString(),
        employee_id: initiatorId,
        type: 'WORK_START',
        work_item_id: pending.work_item_id,
        session_id: null,
        location: pending.location,
      });
      // 削除
      state.pending_sessions = state.pending_sessions.filter(p => p.id !== pending.id);
      changed = true;
    }
  }
  if (changed) {
    await saveData(STORAGE_KEYS.PUNCHES, state.punches);
    await saveData(STORAGE_KEYS.PENDING_SESSIONS, state.pending_sessions);
    render();
  }
}

// セッション終了判定（全員離脱で）
async function checkSessionEnding() {
  let changed = false;
  for (const session of state.active_sessions) {
    if (session.ended_at) continue;
    // 各メンバーの現在の状態を確認
    const activeMembers = [];
    for (const memberId of session.members) {
      const today = todayStr();
      const memberPunches = state.punches
        .filter(p => p.employee_id === memberId && p.timestamp.startsWith(today))
        .filter(p => p.session_id === session.id || (new Date(p.timestamp) > new Date(session.started_at) && ['WORK_END', 'BREAK', 'END'].includes(p.type)))
        .sort((a, b) => a.timestamp.localeCompare(b.timestamp));
      const lastPunch = memberPunches[memberPunches.length - 1];
      if (lastPunch && lastPunch.type === 'WORK_START' && lastPunch.session_id === session.id) {
        activeMembers.push(memberId);
      }
    }
    if (activeMembers.length === 0) {
      session.ended_at = new Date().toISOString();
      changed = true;
    } else {
      session.members = activeMembers;
    }
  }
  if (changed) {
    await saveData(STORAGE_KEYS.ACTIVE_SESSIONS, state.active_sessions);
  }
}

function renderPairSelect() {
  const empId = state.current_employee_id;
  const work = state.work_items.find(w => w.id === state.current_work_item_id);
  if (!work) return '';
  // 選択中メンバー（state にバッファ）
  state._selectedMembers = state._selectedMembers || [];
  // 他の同拠点のメンバー（出勤済以上で、退勤・休憩・ペア確認中・進行中の人は除外）

  const candidates = state.employees.filter(e => {
    if (e.id === empId) return false;
    if ((e.status || 'active') !== 'active') return false;  // 退職者除外

    // 応答モード：招待メンバーは候補に必ず入れる（提案者など）
    if (state.current_pending_session_id) {
      const pending = state.pending_sessions.find(p => p.id === state.current_pending_session_id);
      if (pending && pending.invited_members.includes(e.id)) return true;
    }
    const st = getEmployeeStatus(e.id);
    return st.status === 'idle' || st.status === 'off';  // 出勤待機中・未出勤も含める（柔軟）
  });
  let html = `
    <div class="nav-row">
      <button class="nav-btn" data-action="back-work-select">← 戻る</button>
    </div>

  `;
  for (const e of candidates) {

    const faceHtml = e.photo 
      ? `<img class="face-img" src="${e.photo}" alt="" />`

    state.screen = 'personal';

  const waitingFor = pending.invited_members.filter(id => !pending.proposed_members[id]);
  const waitingNames = waitingFor.map(id => {
    const e = state.employees.find(x => x.id === id);
    return e ? e.name : id;
  }).join('・');

  if (result.status === 'mismatch') {

  const remainingMs = new Date(pending.timeout_at).getTime() - Date.now();
  const remainingSec = Math.max(0, Math.floor(remainingMs / 1000));

  const ss = String(remainingSec % 60).padStart(2, '0');
  let html = `
    <div class="nav-row">

function renderMismatchAlert() {
  const pending = state.pending_sessions.find(p => p.id === state.current_pending_session_id);
  if (!pending) {
    state.screen = 'personal';
    return renderPersonal();
  }
  const work = state.work_items.find(w => w.id === pending.work_item_id);
  const empId = state.current_employee_id;
  // 自分の選択 vs 期待
  const myChoice = (pending.proposed_members[empId] || []).slice().sort();
  const expected = pending.invited_members.filter(id => id !== empId).sort();
  const isMisaligned = myChoice.length !== expected.length || myChoice.some((v, i) => v !== expected[i]);
  let html = `
    <div class="card alert-card">
      <h2>⚠️ メンバー指定が一致しません</h2>
      <div class="mismatch-info">
        <div class="head">${work ? work.emoji + ' ' + work.name : ''} のペア提案：各メンバーの指定が一致していません</div>
        ${pending.invited_members.map(id => {
          const e = state.employees.find(x => x.id === id);
          const choice = pending.proposed_members[id];
          const choiceNames = choice ? choice.map(cid => {
            const c = state.employees.find(x => x.id === cid);
            return c ? c.name : cid;
          }).join('・') : '未選択';
          const expected2 = pending.invited_members.filter(x => x !== id).sort();
          const choice2 = (choice || []).slice().sort();
          const ok = choice && choice2.length === expected2.length && choice2.every((v, i) => v === expected2[i]);
          return `<div class="mismatch-row">${ok ? '✓' : '✗'} ${e ? e.name : id}：${choiceNames}</div>`;
        }).join('')}
      </div>
      <div style="text-align:center;">
        ${isMisaligned ? '<button class="primary-btn" data-action="restart-pair-select" data-pending-id="' + pending.id + '">メンバーを選び直す</button>' : '<div style="color:#888;">あなたの指定は問題ありません。他の方の指定を待ってください。</div>'}
        <div style="margin-top:10px;"><button class="nav-btn" data-action="cancel-pending" data-pending-id="${pending.id}">提案をキャンセル</button></div>
      </div>
    </div>
  `;
  return html;
}

// 個人の指定日の労働サマリーを計算
function calcDayLaborSummary(employeeId, dateObj) {
  const dateStr = isoDateOnly(dateObj);
  const punches = state.punches
    .filter(p => p.employee_id === employeeId && p.timestamp.startsWith(dateStr))
    .sort((a, b) => a.timestamp.localeCompare(b.timestamp));
  if (punches.length === 0) return null;
  const start = punches.find(p => p.type === 'START');
  const end = [...punches].reverse().find(p => p.type === 'END');
  if (!start) return null;
  // 休憩時間集計
  let breakMin = 0;
  let lastBreakStart = null;
  for (const p of punches) {
    if (p.type === 'BREAK') {
      if (!lastBreakStart) lastBreakStart = new Date(p.timestamp);
    } else if (lastBreakStart && (p.type === 'WORK_START' || p.type === 'END')) {
      breakMin += Math.floor((new Date(p.timestamp) - lastBreakStart) / 60000);
      lastBreakStart = null;
    }
  }
  // 進行中の休憩（最後のBREAKが終わっていない・今日の場合）
  if (lastBreakStart) {
    const today = new Date();
    const isToday = isoDateOnly(today) === dateStr;
    if (isToday) {
      breakMin += Math.floor((today - lastBreakStart) / 60000);
    }
  }
  // 拘束時間
  const startTime = new Date(start.timestamp);
  let endTime;
  if (end) {
    endTime = new Date(end.timestamp);
  } else {
    // 退勤未打刻：今日なら現在時刻、過去日なら最後の打刻時刻
    const today = new Date();
    const isToday = isoDateOnly(today) === dateStr;
    endTime = isToday ? today : new Date(punches[punches.length - 1].timestamp);
  }
  const grossMin = Math.max(0, Math.floor((endTime - startTime) / 60000));
  const netMin = Math.max(0, grossMin - breakMin);
  // 時給取得
  const year = dateObj.getFullYear();
  const month = dateObj.getMonth() + 1;
  const plan = state.work_plans.find(wp => wp.employee_id === employeeId && wp.year === year && wp.month === month);
  const hourlyRate = plan ? (plan.hourly_rate || 0) : 0;
  const netHours = netMin / 60;
  const dailyWage = Math.round(netHours * hourlyRate);
  return {
    start_time: start.timestamp,
    end_time: end ? end.timestamp : null,
    is_ongoing: !end,
    grossMin, netMin, breakMin,
    hourlyRate, dailyWage,
  };
}

  return html;
}

// 出荷単価計算：仕入れ＋作業賃＋包材費＋値入率 → 出荷単価
function renderReportShip() {
  // 状態初期化
  if (!state._shipBuf) {
    state._shipBuf = {
      task_id: '',
      product_id: '',
      purchase_qty: '',     // 仕入れ量
      purchase_unit: 'kg',  // 仕入れ単位
      purchase_amount: '',  // 仕入れ額
      output_qty: '',       // 出来上がり数
      remain_qty: '',       // 残り量
      markup_rate: '30',    // 値入率（対原価マークアップ、初期30%）
    };
  }
  const buf = state._shipBuf;
  const parentTasks = state.work_tasks.filter(t => t.type === 'parent');
  const products = state.work_products;
  
  // 選択された作業・品目
  const task = buf.task_id ? state.work_tasks.find(t => t.id === buf.task_id) : null;
  const product = buf.product_id ? state.work_products.find(p => p.id === buf.product_id) : null;
  
  // 単位作業賃・単位包材費（マスタから）
  const price = (buf.task_id && buf.product_id) 
    ? state.work_prices.find(p => p.task_id === buf.task_id && p.product_id === buf.product_id) 
    : null;
  const material = (buf.task_id && buf.product_id) 
    ? state.work_materials.find(m => m.task_id === buf.task_id && m.product_id === buf.product_id) 
    : null;
  const unitLaborCharge = price ? price.unit_price : 0;
  const unitMaterialCost = material ? material.material_cost : 0;
  
  // 入力値を数値化
  const purchaseQty = parseFloat(buf.purchase_qty) || 0;
  const purchaseAmount = parseFloat(buf.purchase_amount) || 0;
  const outputQty = parseFloat(buf.output_qty) || 0;
  const remainQty = parseFloat(buf.remain_qty) || 0;
  const markupRate = parseFloat(buf.markup_rate) || 0;
  
  // 計算
  const purchasePerUnit = purchaseQty > 0 ? purchaseAmount / purchaseQty : 0;     // 仕入れ単価（円/kg等）
  const usedQty = purchaseQty - remainQty;                                         // 使用量
  const yieldRate = purchaseQty > 0 ? (usedQty / purchaseQty * 100) : 0;            // 歩留まり
  const qtyPerOutput = outputQty > 0 ? (usedQty / outputQty * 1000) : 0;            // 1個あたり使用量（g）
  const materialCostPerOutput = outputQty > 0 ? (purchaseAmount / outputQty) : 0;   // 1個あたり原料費
  const subtotal = materialCostPerOutput + unitLaborCharge + unitMaterialCost;     // 1個あたり原価合計
  const profit = subtotal * (markupRate / 100);                                    // 1個あたり利益
  const shipPrice = subtotal + profit;                                             // 1個あたり出荷単価
  
  // 全体集計
  const totalLabor = unitLaborCharge * outputQty;
  const totalMaterial = unitMaterialCost * outputQty;
  const totalCost = purchaseAmount + totalLabor + totalMaterial;
  const totalRevenue = shipPrice * outputQty;
  const totalProfit = totalRevenue - totalCost;
  
  let html = `<div style="margin-bottom:14px; padding:10px 14px; background:#e8f4ee; border-radius:8px; font-size:0.9rem;">

  // 入力フォーム
  html += `<div class="card" style="padding:16px;">

// 本日の課金：商品（作業×品目）別の作業賃＋包材費の集計
function renderReportCharge() {
  const baseDate = state._reportDate;
  const dateStr = isoDateOnly(baseDate);
  const records = state.work_records
    .filter(r => r.work_started_at && r.work_started_at.startsWith(dateStr))
    .sort((a, b) => a.work_started_at.localeCompare(b.work_started_at));
  
  // 日付ナビ
  let html = `
    <div class="shift-navbar">
      <button class="nav-btn" data-action="report-day-prev">← 前日</button>
      <input type="date" id="report-date-input" value="${dateStr}" data-action="report-date-change" />
      <div class="shift-date-label">${formatYMD(baseDate)}</div>
      <button class="nav-btn" data-action="report-day-today">今日</button>
      <button class="nav-btn" data-action="report-day-next">翌日 →</button>
    </div>
  `;
  
  if (records.length === 0) {
    html += `<div class="empty-message" style="padding:30px;">この日の作業記録はありません</div>`;
    return html;
  }
  
  // 商品（作業×品目）別に集計
  const byKey = {};
  for (const r of records) {
    const key = `${r.main_task_id}__${r.main_product_id}`;
    if (!byKey[key]) {
      byKey[key] = {
        task_id: r.main_task_id, product_id: r.main_product_id,
        unit: r.unit,
        quantity: 0,
        totalLaborCost: 0,
        records: [],
      };
    }
    const cost = calcRecordCost(r);
    byKey[key].quantity += r.quantity || 0;
    byKey[key].totalLaborCost += cost.laborCost;
    byKey[key].records.push(r);
  }
  // 各商品の課金計算
  const items = Object.values(byKey).map(a => {
    const mat = state.work_materials.find(m => m.task_id === a.task_id && m.product_id === a.product_id);
    const materialUnit = mat ? (mat.material_cost || 0) : 0;
    const totalMaterialCost = materialUnit * a.quantity;
    const totalCharge = a.totalLaborCost + totalMaterialCost;
    const laborUnit = a.quantity > 0 ? Math.round(a.totalLaborCost / a.quantity * 10) / 10 : 0;
    const chargeUnit = a.quantity > 0 ? Math.round(totalCharge / a.quantity * 10) / 10 : 0;
    return { ...a, materialUnit, totalMaterialCost, totalCharge, laborUnit, chargeUnit };
  }).sort((a, b) => b.totalCharge - a.totalCharge);
  
  // 統計サマリー
  const totalLabor = items.reduce((s, x) => s + x.totalLaborCost, 0);
  const totalMaterial = items.reduce((s, x) => s + x.totalMaterialCost, 0);
  const totalCharge = totalLabor + totalMaterial;
  const totalQty = items.reduce((s, x) => s + x.quantity, 0);
  
  html += `
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:10px; margin-bottom:14px;">
      <div style="background:#fafafa; border-radius:8px; padding:10px;">
        <div style="font-size:0.8rem; color:#888;">商品種類</div>
        <div style="font-size:1.3rem; font-weight:bold; color:var(--blue);">${items.length}種</div>
      </div>
      <div style="background:#fafafa; border-radius:8px; padding:10px;">
        <div style="font-size:0.8rem; color:#888;">総生産数量</div>
        <div style="font-size:1.3rem; font-weight:bold;">${totalQty.toLocaleString()}</div>
      </div>
      <div style="background:#fff3e0; border-radius:8px; padding:10px;">
        <div style="font-size:0.8rem; color:#888;">💰 作業賃合計</div>
        <div style="font-size:1.3rem; font-weight:bold; color:var(--orange);">${totalLabor.toLocaleString()}円</div>
      </div>
      <div style="background:#e3f2fd; border-radius:8px; padding:10px;">
        <div style="font-size:0.8rem; color:#888;">📦 包材費合計</div>
        <div style="font-size:1.3rem; font-weight:bold; color:var(--blue);">${totalMaterial.toLocaleString()}円</div>
      </div>
      <div style="background:#fff8e1; border-radius:8px; padding:10px; border:2px solid #d9b347;">
        <div style="font-size:0.8rem; color:#888;">💴 本日の課金合計</div>
        <div style="font-size:1.4rem; font-weight:bold; color:#d9b347;">${totalCharge.toLocaleString()}円</div>
      </div>
    </div>
  `;
  
  // 商品別の課金一覧
  html += `<table class="shift-day-table" style="font-size:0.9rem;">
    <thead><tr>
      <th>作業</th><th>品目</th>
      <th style="text-align:right;">数量</th>
      <th style="text-align:right; background:#fff3e0;">💰単位作業賃</th>
      <th style="text-align:right; background:#e3f2fd;">📦単位包材費</th>
      <th style="text-align:right; background:#fff8e1;">💴単位課金<br><span style="font-size:0.75rem; font-weight:normal;">(作業賃+包材)</span></th>
      <th style="text-align:right; background:#fff3e0;">作業賃合計</th>
      <th style="text-align:right; background:#e3f2fd;">包材費合計</th>
      <th style="text-align:right; background:#fff8e1;">課金合計</th>
    </tr></thead><tbody>`;
  for (const a of items) {
    const task = state.work_tasks.find(t => t.id === a.task_id);
    const product = state.work_products.find(p => p.id === a.product_id);
    const matLabel = a.materialUnit > 0 ? `${a.materialUnit}円` : '<span style="color:var(--orange);">未設定</span>';
    html += `<tr>
      <td><strong>${task ? `${task.icon} ${task.name}` : a.task_id}</strong></td>
      <td>${product ? `${product.emoji} ${product.name}` : a.product_id}</td>
      <td style="text-align:right; font-weight:bold;">${a.quantity.toLocaleString()}${a.unit||''}</td>
      <td style="text-align:right; color:var(--orange);">${a.laborUnit}円</td>
      <td style="text-align:right; color:var(--blue);">${matLabel}</td>
      <td style="text-align:right; font-weight:bold; color:#d9b347; font-size:1.05rem;">${a.chargeUnit}円</td>

// 個人の指定月の労働サマリーを計算（日次集計の積み上げ）
function calcMonthlyLaborSummary(employeeId, year, month) {
  const lastDay = new Date(year, month, 0).getDate();
  let workDays = 0;
  let totalNetMin = 0;
  let totalBreakMin = 0;
  let totalGrossMin = 0;
  let totalWage = 0;
  let hourlyRate = 0;
  const dailyDetails = [];
  for (let day = 1; day <= lastDay; day++) {
    const date = new Date(year, month - 1, day);
    const sum = calcDayLaborSummary(employeeId, date);
    if (sum) {
      workDays++;
      totalNetMin += sum.netMin;
      totalGrossMin += sum.grossMin;
      totalBreakMin += sum.breakMin;
      totalWage += sum.dailyWage;
      hourlyRate = sum.hourlyRate;
      dailyDetails.push({ day, date, ...sum });
    }
  }
  return { workDays, totalNetMin, totalBreakMin, totalGrossMin, totalWage, hourlyRate, dailyDetails };
}

// 個人の指定月の出来高サマリーを計算（work_records から集計）
function calcMonthlyVolumeSum(employeeId, year, month) {
  const lastDay = new Date(year, month, 0).getDate();
  const startStr = `${year}-${String(month).padStart(2,'0')}-01`;
  const endStr = `${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const records = state.work_records.filter(r => 
    r.employee_id === employeeId && 
    r.work_started_at && 
    r.work_started_at >= startStr && 
    r.work_started_at <= endStr + 'T23:59:59'
  );
  let totalRevenue = 0;
  let totalQuantity = 0;
  let recordCount = records.length;
  let unpricedCount = 0;
  for (const r of records) {
    const rev = (r.unit_price || 0) * (r.quantity || 0);
    totalRevenue += rev;
    if (!r.unit_price || r.unit_price === 0) unpricedCount++;
  }
  return { totalRevenue, recordCount, unpricedCount };
}

// 作業記録ごとの作業時間（分）と按分人件費を計算
function calcRecordCost(record) {
  if (!record.work_started_at || !record.work_ended_at) return { minutes: 0, laborCost: 0, hourlyRate: 0 };
  const startT = new Date(record.work_started_at);
  const endT = new Date(record.work_ended_at);
  const minutes = Math.max(0, Math.floor((endT - startT) / 60000));
  const plan = state.work_plans.find(wp => 
    wp.employee_id === record.employee_id && 
    wp.year === startT.getFullYear() && 
    wp.month === startT.getMonth() + 1
  );
  const hourlyRate = plan ? (plan.hourly_rate || 0) : 0;
  const laborCost = Math.round(minutes / 60 * hourlyRate);
  return { minutes, laborCost, hourlyRate };
}

  const endStr = `${ym.year}-${String(ym.month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const records = state.work_records.filter(r => 
    r.work_started_at && r.work_started_at >= startStr && r.work_started_at <= endStr + 'T23:59:59'
  );
  if (records.length === 0) {
    return `<div class="empty-message" style="padding:30px;">この月の作業記録はありません</div>`;
  }
  // 作業×品目別に集計
  const byKey = {};
  for (const r of records) {
    const key = `${r.main_task_id}__${r.main_product_id}`;
    if (!byKey[key]) {
      byKey[key] = {
        task_id: r.main_task_id, product_id: r.main_product_id,
        unit: r.unit, unit_price: r.unit_price,
        quantity: 0, count: 0, totalMinutes: 0, totalLaborCost: 0,
        emp_ids: new Set(),
      };
    }
    const cost = calcRecordCost(r);
    byKey[key].quantity += r.quantity || 0;
    byKey[key].count += 1;
    byKey[key].totalMinutes += cost.minutes;
    byKey[key].totalLaborCost += cost.laborCost;
    byKey[key].emp_ids.add(r.employee_id);
  }
  const aggs = Object.values(byKey).map(a => {
    const revenue = (a.unit_price || 0) * a.quantity;
    const profit = revenue - a.totalLaborCost;
    const breakEvenPrice = a.quantity > 0 ? Math.ceil(a.totalLaborCost / a.quantity) : 0;
    const perHour = a.totalMinutes > 0 ? Math.round(a.quantity / (a.totalMinutes / 60) * 10) / 10 : 0;
    const profitRate = revenue > 0 ? (profit / revenue * 100) : (a.totalLaborCost > 0 ? -100 : 0);
    let verdict, verdictBg;
    if (a.unit_price === 0) { verdict = '⚠️ 単価未設定'; verdictBg = '#fff3e0'; }
    else if (profitRate >= 30) { verdict = '🚀 高利益'; verdictBg = '#c8e6c9'; }
    else if (profitRate >= 10) { verdict = '👍 良好'; verdictBg = '#e8f5e9'; }
    else if (profitRate >= 0) { verdict = '➖ トントン'; verdictBg = '#fffde7'; }
    else if (profitRate >= -30) { verdict = '⚠️ 要改善'; verdictBg = '#fff3e0'; }
    else { verdict = '🔴 赤字'; verdictBg = '#ffebee'; }
    return { ...a, revenue, emp_count: a.emp_ids.size, profit, profitRate, breakEvenPrice, perHour, verdict, verdictBg };
  }).sort((a, b) => b.profit - a.profit);
  
  // 月間合計
  const totalRevenue = aggs.reduce((s, a) => s + a.revenue, 0);
  const totalLaborCost = aggs.reduce((s, a) => s + a.totalLaborCost, 0);
  const totalProfit = totalRevenue - totalLaborCost;
  const profitColor = totalProfit >= 0 ? 'var(--green)' : 'var(--red)';
  const profitSign = totalProfit >= 0 ? '+' : '';
  
  let html = `<div style="margin-bottom:12px; padding:10px 14px; background:#e8f4ee; border-radius:8px; font-size:0.9rem;">
    🌳 ${ym.year}年${ym.month}月の作業×品目別 単価診断（${aggs.length}組合せ）<br>
    <span style="font-size:0.85rem; color:#555;">どの作業の単価が儲かっていて、どこが赤字か。月間データなのでより信頼性の高い判断ができます。</span>
  </div>`;
  html += `<table class="shift-day-table" style="font-size:0.88rem;">
    <thead><tr>
      <th>作業</th><th>品目</th>
      <th style="text-align:right;">作業者</th>
      <th style="text-align:right;">数量</th>
      <th style="text-align:right;">時間</th>
      <th style="text-align:right;">平均速度</th>
      <th style="text-align:right;">現在単価</th>
      <th style="text-align:right; background:#fff3e0;">人件費</th>
      <th style="text-align:right; background:#e8f4ee;">売上</th>
      <th style="text-align:right; background:#e8eaf6;">差益</th>
      <th style="text-align:center; background:#fff8e1;">損益分岐<br>単価</th>
      <th style="text-align:center;">判定</th>
    </tr></thead><tbody>`;
  for (const a of aggs) {
    const task = state.work_tasks.find(t => t.id === a.task_id);
    const product = state.work_products.find(p => p.id === a.product_id);
    const pColor = a.profit >= 0 ? 'var(--green)' : 'var(--red)';
    const pSign = a.profit >= 0 ? '+' : '';
    const priceGap = a.unit_price > 0 ? a.unit_price - a.breakEvenPrice : 0;
    const priceGapLabel = a.unit_price > 0 
      ? (priceGap >= 0 ? `<span style="color:var(--green); font-size:0.75rem;">＋${priceGap}円</span>` : `<span style="color:var(--red); font-size:0.75rem;">${priceGap}円</span>`)
      : '';
    html += `<tr style="background:${a.verdictBg};">
      <td><strong>${task ? `${task.icon} ${task.name}` : a.task_id}</strong></td>
      <td>${product ? `${product.emoji} ${product.name}` : a.product_id}</td>
      <td style="text-align:right;">${a.emp_count}名</td>
      <td style="text-align:right; font-weight:bold;">${a.quantity.toLocaleString()}${a.unit||''}</td>
      <td style="text-align:right; color:#666;">${formatHMin(a.totalMinutes)}</td>
      <td style="text-align:right; color:#444;">${a.perHour}${a.unit||''}/h</td>
      <td style="text-align:right;">${a.unit_price > 0 ? a.unit_price.toLocaleString()+'円' : '<span style="color:var(--orange);">未設定</span>'}</td>
      <td style="text-align:right; font-weight:bold; color:var(--orange);">${a.totalLaborCost.toLocaleString()}円</td>
      <td style="text-align:right; font-weight:bold; color:var(--green);">${a.revenue.toLocaleString()}円</td>
      <td style="text-align:right; font-weight:bold; color:${pColor};">${pSign}${a.profit.toLocaleString()}円<br><span style="font-size:0.72rem; font-weight:normal;">(${a.profitRate.toFixed(0)}%)</span></td>
      <td style="text-align:center;"><strong>${a.breakEvenPrice}円</strong>${priceGapLabel ? '<br>'+priceGapLabel : ''}</td>
      <td style="text-align:center; font-weight:bold; font-size:0.85rem;">${a.verdict}</td>
    </tr>`;
  }
  html += `</tbody>
  <tfoot><tr style="background:#fff8e0; font-weight:bold;">
    <td colspan="7" style="text-align:right;">月間合計</td>
    <td style="text-align:right; color:var(--orange);">${totalLaborCost.toLocaleString()}円</td>
    <td style="text-align:right; color:var(--green);">${totalRevenue.toLocaleString()}円</td>
    <td style="text-align:right; color:${profitColor};">${profitSign}${totalProfit.toLocaleString()}円</td>
    <td colspan="2"></td>
  </tr></tfoot></table>
  
  <div style="margin-top:14px; padding:12px 14px; background:#f5f5f5; border-radius:8px; font-size:0.88rem;">
    <div style="font-weight:bold; margin-bottom:6px;">💡 月度末の改善判断</div>
    <div style="line-height:1.7;">
      🔴 <strong>赤字の作業</strong>：単価交渉・作業見直し・機械化のターゲット<br>
      ⚠️ <strong>要改善の作業</strong>：来月までに改善策を検討<br>
      🚀 <strong>高利益の作業</strong>：受注量を増やせれば全体の利益が大きくなる
    </div>
  </div>`;
  return html;
}

// 月間 人を比較
function renderMonthlyCompare(ym) {
  const lastDay = new Date(ym.year, ym.month, 0).getDate();
  const startStr = `${ym.year}-${String(ym.month).padStart(2,'0')}-01`;
  const endStr = `${ym.year}-${String(ym.month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const records = state.work_records.filter(r => 
    r.work_started_at && r.work_started_at >= startStr && r.work_started_at <= endStr + 'T23:59:59'
  );
  if (records.length === 0) {
    return `<div class="empty-message" style="padding:30px;">この月の作業記録はありません</div>`;
  }
  // 作業×品目ごとに人別集計
  const byKey = {};
  for (const r of records) {
    const key = `${r.main_task_id}__${r.main_product_id}`;
    if (!byKey[key]) byKey[key] = [];
    byKey[key].push(r);
  }
  const compareGroups = [];
  for (const key of Object.keys(byKey)) {
    const empIds = new Set(byKey[key].map(r => r.employee_id));
    if (empIds.size >= 2) {
      compareGroups.push({ key, records: byKey[key] });
    }
  }
  
  if (compareGroups.length === 0) {
    return `<div class="empty-message" style="padding:30px;">
      🤝 この月は同じ作業を <strong>2人以上</strong> が行った組合せがありません
    </div>`;
  }
  
  let html = `<div style="margin-bottom:12px; padding:10px 14px; background:#e8f4ee; border-radius:8px; font-size:0.9rem;">
    🏆 ${ym.year}年${ym.month}月は <strong>${compareGroups.length}組</strong> の作業で複数人が実施。月間の生産速度を比較します。<br>
    <span style="font-size:0.85rem; color:#555;">月間データなのでサンプル数が多く、客観的な評価ができます。</span>
  </div>`;
  
  for (const grp of compareGroups) {
    const sampleRec = grp.records[0];
    const task = state.work_tasks.find(t => t.id === sampleRec.main_task_id);
    const product = state.work_products.find(p => p.id === sampleRec.main_product_id);
    const byEmp = {};
    for (const r of grp.records) {
      if (!byEmp[r.employee_id]) byEmp[r.employee_id] = { quantity: 0, totalMinutes: 0, totalLaborCost: 0, count: 0, dayCount: new Set() };
      const cost = calcRecordCost(r);
      byEmp[r.employee_id].quantity += r.quantity || 0;
      byEmp[r.employee_id].totalMinutes += cost.minutes;
      byEmp[r.employee_id].totalLaborCost += cost.laborCost;
      byEmp[r.employee_id].count += 1;
      byEmp[r.employee_id].dayCount.add(r.work_started_at.split('T')[0]);
    }
    const empStats = Object.keys(byEmp).map(empId => {
      const b = byEmp[empId];
      const perHour = b.totalMinutes > 0 ? Math.round(b.quantity / (b.totalMinutes / 60) * 10) / 10 : 0;
      return { empId, ...b, perHour, dayCount: b.dayCount.size };
    }).sort((a, b) => b.perHour - a.perHour);
    const maxSpeed = empStats[0].perHour;
    const minSpeed = empStats[empStats.length - 1].perHour;
    const avgSpeed = empStats.reduce((s, x) => s + x.perHour, 0) / empStats.length;
    
    html += `
      <div style="background:white; border:1px solid #e0e0e0; border-radius:8px; padding:14px; margin-bottom:12px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid #f0f0f0; flex-wrap:wrap;">
          <div>
            <div style="font-size:1.1rem; font-weight:bold;">${task ? task.icon : ''} ${task ? task.name : ''} × ${product ? product.emoji : ''} ${product ? product.name : ''}</div>
            <div style="font-size:0.85rem; color:#666;">${empStats.length}名 ／ 単価 ${sampleRec.unit_price || '未設定'}円/${sampleRec.unit||''} ／ 月間 ${grp.records.length}件</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:0.75rem; color:#888;">速度差</div>
            <div style="font-size:1.05rem; font-weight:bold; color:${maxSpeed > minSpeed * 1.5 ? 'var(--red)' : '#444'};">
              ${(maxSpeed - minSpeed).toFixed(1)} ${sampleRec.unit||''}/h
              <span style="font-size:0.85rem; color:#888;">（平均 ${avgSpeed.toFixed(1)}）</span>
            </div>
          </div>
        </div>
        <table style="width:100%; font-size:0.9rem;">
          <thead><tr style="background:#fafafa;">
            <th style="padding:6px 8px; text-align:left;">順位</th>
            <th style="padding:6px 8px; text-align:left;">名前</th>
            <th style="padding:6px 8px; text-align:right;">実施日数</th>
            <th style="padding:6px 8px; text-align:right;">数量計</th>
            <th style="padding:6px 8px; text-align:right;">時間計</th>
            <th style="padding:6px 8px; text-align:right;">平均速度</th>
            <th style="padding:6px 8px; text-align:right;">平均比</th>
            <th style="padding:6px 8px; text-align:center;">評価</th>
          </tr></thead><tbody>`;
    empStats.forEach((es, idx) => {
      const emp = state.employees.find(e => e.id === es.empId);
      const ratio = avgSpeed > 0 ? (es.perHour / avgSpeed * 100) : 100;
      let badge = '', badgeColor = '';
      if (idx === 0 && empStats.length >= 2) { badge = '🏆 最速'; badgeColor = '#c8e6c9'; }
      else if (idx === empStats.length - 1 && empStats.length >= 2) { badge = '🐌 最遅'; badgeColor = '#ffebee'; }
      else { badge = '─'; badgeColor = '#fafafa'; }
      html += `<tr>
        <td style="padding:6px 8px; font-weight:bold;">${idx + 1}位</td>
        <td style="padding:6px 8px;">${emp ? `${emp.emoji} ${emp.name}` : es.empId}</td>
        <td style="padding:6px 8px; text-align:right;">${es.dayCount}日</td>
        <td style="padding:6px 8px; text-align:right; font-weight:bold;">${es.quantity.toLocaleString()}${sampleRec.unit||''}</td>
        <td style="padding:6px 8px; text-align:right; color:#666;">${formatHMin(es.totalMinutes)}</td>
        <td style="padding:6px 8px; text-align:right; font-weight:bold;">${es.perHour}${sampleRec.unit||''}/h</td>
        <td style="padding:6px 8px; text-align:right; color:${ratio >= 110 ? 'var(--green)' : ratio >= 90 ? '#444' : 'var(--red)'};">${ratio.toFixed(0)}%</td>
        <td style="padding:6px 8px; text-align:center; background:${badgeColor}; border-radius:4px; font-weight:bold; font-size:0.85rem;">${badge}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    if (maxSpeed > minSpeed * 1.3) {
      html += `<div style="margin-top:10px; padding:8px 12px; background:#fff8e1; border-radius:6px; font-size:0.85rem;">
        💡 最速と最遅で <strong>${((maxSpeed/minSpeed - 1) * 100).toFixed(0)}%</strong> の差があります。
        速い人のやり方を共有・標準化することで全体の生産性が向上できる可能性があります。
      </div>`;
    }
    html += `</div>`;
  }
  
  html += `<div style="margin-top:14px; padding:12px 14px; background:#f5f5f5; border-radius:8px; font-size:0.88rem;">
    <div style="font-weight:bold; margin-bottom:6px;">💡 月間データの活かし方</div>
    <div style="line-height:1.7;">
      🏆 <strong>最速の人</strong>：何が違うのかを共有・標準化のターゲット<br>
      🐌 <strong>最遅の人</strong>：指導・配置転換・別作業への適性検討<br>
      📊 <strong>平均比</strong>：個人の評価・昇給判断の客観指標
    </div>
  </div>`;
  return html;
}



function renderWorkRegister() {
  const emp = state.employees.find(e => e.id === state.current_employee_id);
  if (!emp) { state.screen = 'home'; return ''; }
  
  // 直近のWORK_STARTから経過時間を計算
  const today = todayStr();
  const todayPunches = state.punches
    .filter(p => p.employee_id === emp.id && p.timestamp.startsWith(today))
    .sort((a, b) => a.timestamp.localeCompare(b.timestamp));
  // 最後のWORK_STARTを探す
  let workStartPunch = null;
  for (let i = todayPunches.length - 1; i >= 0; i--) {
    if (todayPunches[i].type === 'WORK_START') {
      workStartPunch = todayPunches[i];
      break;
    }
    if (['WORK_END', 'BREAK', 'END'].includes(todayPunches[i].type)) break;
  }
  if (!workStartPunch) {
    return `<div class="card"><h2>⚠️ 作業中ではありません</h2>
      <div class="empty-message">作業開始の打刻がないため登録できません。</div>
      <div style="text-align:center; margin-top:14px;">
        <button class="nav-btn" data-action="back-personal">← 個人画面へ戻る</button>
      </div></div>`;
  }
  const startTime = new Date(workStartPunch.timestamp);
  const now = new Date();
  const elapsedMin = Math.floor((now - startTime) / 60000);
  
  // 登録画面に入った時刻を記録（登録時間計測用）
  if (!state._registerEnteredAt) {
    state._registerEnteredAt = now.toISOString();
  }
  
  // バッファ初期化
  if (!state._registerBuf) {
    state._registerBuf = {
      main_task_id: '',
      main_product_id: '',
      quantity: '',
      sub_tasks: {},  // { 'TG01': 10, 'TG05': 15 } 形式
    };
  }
  const buf = state._registerBuf;
  
  const parentTasks = state.work_tasks.filter(t => t.type === 'parent');
  const globalTasks = state.work_tasks.filter(t => t.type === 'global');
  const products = state.work_products;
  
  // 選択された作業の単位
  const selectedTask = buf.main_task_id ? state.work_tasks.find(t => t.id === buf.main_task_id) : null;
  const unit = selectedTask ? selectedTask.unit : '';
  
  // 単価が設定されているか
  let priceInfo = '';
  if (buf.main_task_id && buf.main_product_id) {
    const price = state.work_prices.find(p => p.task_id === buf.main_task_id && p.product_id === buf.main_product_id);
    if (price) {
      priceInfo = `<span style="color:var(--green); font-weight:bold;">単価 ${price.unit_price}円/${price.unit}</span>`;
      if (buf.quantity) {
        const total = price.unit_price * Number(buf.quantity);
        priceInfo += ` ／ 売上 <strong style="color:var(--green); font-size:1.1rem;">${total.toLocaleString()}円</strong>`;
      }
    } else {
      priceInfo = '<span style="color:var(--orange);">⚠️ 単価未設定（後で集計に反映）</span>';
    }
  }
  
  const faceHtml = emp.photo 
    ? `<img src="${emp.photo}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;" alt=""/>`
    : `<span style="font-size:2rem;">${emp.emoji}</span>`;
  
  let html = `
    <div class="card">
      <h2>📝 作業の登録</h2>
      <div style="background:var(--green-bg); padding:12px 14px; border-radius:8px; margin-bottom:14px; display:flex; gap:14px; align-items:center;">
        ${faceHtml}
        <div>
          <div style="font-size:1.05rem; font-weight:bold;">${emp.name}さん</div>
          <div style="font-size:0.85rem; color:#555;">
            作業開始 ${formatTime(workStartPunch.timestamp)} ／ 経過 <strong>${formatMinutes(elapsedMin)}</strong>
          </div>
        </div>
      </div>
      
      <div class="emp-form">
        <div class="form-row">
          <label class="form-label">🌳 主作業（親）</label>
          <select id="reg-task" data-action="register-task-change">
            <option value="">-- 選択してください --</option>
  `;
  // 手作業をグループ化
  html += `<optgroup label="🟨 手作業">`;
  for (const t of parentTasks.filter(t => t.category === '手作業')) {
    const sel = (t.id === buf.main_task_id) ? ' selected' : '';
    html += `<option value="${t.id}"${sel}>${t.icon} ${t.name}（${t.unit}単位）</option>`;
  }
  html += `</optgroup><optgroup label="🤖 マシン作業">`;
  for (const t of parentTasks.filter(t => t.category === 'マシン作業')) {
    const sel = (t.id === buf.main_task_id) ? ' selected' : '';
    const status = t.machine_status === '将来' ? ' [将来]' : '';
    html += `<option value="${t.id}"${sel}>${t.icon} ${t.name}（${t.unit}単位）${status}</option>`;
  }
  html += `</optgroup></select>
        </div>
        <div class="form-row">
          <label class="form-label">🥬 品目</label>
          <select id="reg-product" data-action="register-product-change">
            <option value="">-- 選択してください --</option>
  `;
  for (const p of products) {
    const sel = (p.id === buf.main_product_id) ? ' selected' : '';
    html += `<option value="${p.id}"${sel}>${p.emoji} ${p.name}</option>`;
  }
  html += `</select>
        </div>
        <div class="form-row">
          <label class="form-label">📊 数量${unit ? `（${unit}）` : ''}</label>
          <input type="number" id="reg-quantity" value="${buf.quantity}" placeholder="例：80" min="0" step="1" data-action="register-quantity-change" />
          ${priceInfo ? `<div class="form-hint">${priceInfo}</div>` : ''}
        </div>
        
        <div class="form-row">
          <label class="form-label">🌍 全体寄与作業（任意・含まれていれば選択）</label>
          <div class="form-hint" style="margin-bottom:8px;">この作業時間に含まれていた間接作業を選んで分数を入力してください</div>
          <div style="display:flex; flex-direction:column; gap:6px;">
  `;
  for (const g of globalTasks) {
    const val = buf.sub_tasks[g.id];
    const isChecked = (val !== undefined);
    html += `<div style="display:flex; align-items:center; gap:10px; padding:6px 10px; background:${isChecked ? '#e8f4ee' : '#fafafa'}; border-radius:6px; border:1px solid ${isChecked ? 'var(--green-light)' : '#e0e0e0'};">
      <input type="checkbox" id="reg-sub-${g.id}" data-action="register-sub-toggle" data-task-id="${g.id}" ${isChecked ? 'checked' : ''} style="width:18px; height:18px;" />
      <label for="reg-sub-${g.id}" style="flex:1; cursor:pointer; margin:0;">${g.icon} ${g.name}</label>
      ${isChecked 
        ? `<input type="number" data-action="register-sub-duration" data-task-id="${g.id}" value="${val}" min="0" step="1" style="width:70px;" placeholder="分" /> 分`
        : '<span style="color:#bbb; font-size:0.85rem;">未選択</span>'}
    </div>`;
  }
  html += `</div>
        </div>
        
        <div class="form-actions" style="margin-top:18px;">
          <button class="primary-btn" data-action="save-work-register" ${!buf.main_task_id || !buf.main_product_id || !buf.quantity ? 'disabled' : ''}>

function exportMonthlyCSV() {
  const ym = state._reportYM;
  const activeEmps = state.employees.filter(e => (e.status || 'active') === 'active');
  const allSummaries = activeEmps.map(emp => {
    const labor = calcMonthlyLaborSummary(emp.id, ym.year, ym.month);
    const volume = calcMonthlyVolumeSum(emp.id, ym.year, ym.month);
    return { emp, ...labor, ...volume, profit: volume.totalRevenue - labor.totalWage };
  }).filter(x => x.workDays > 0 || x.recordCount > 0);
  allSummaries.sort((a, b) => a.emp.id.localeCompare(b.emp.id));
  
  const lines = [];
  lines.push(`味采市場 川口センター 一次人件費・差益レポート`);
  lines.push(`対象月,${ym.year}年${ym.month}月`);
  lines.push(`出力日,${formatYMD(new Date())}`);
  lines.push('');
  lines.push('NO,氏名,出勤日数,投入人時(分),投入人時(h:m),時給単価(円),投入時給=人件費(円),出来高=売上(円),月間差益(円),備考');
  let totalDays = 0, totalNetMin = 0, totalWage = 0, totalRevenue = 0;
  for (const x of allSummaries) {
    const emp = x.emp;
    const plan = state.work_plans.find(wp => wp.employee_id === emp.id && wp.year === ym.year && wp.month === ym.month);
    const contractH = plan ? (plan.contract_hours || 0) : 0;
    const actualH = x.totalNetMin / 60;
    let memo = '';
    if (contractH > 0) {
      const diff = actualH - contractH;
      if (diff > 0) memo = `契約${contractH}h／+${diff.toFixed(1)}h`;
      else if (diff < 0) memo = `契約${contractH}h／${diff.toFixed(1)}h`;
      else memo = `契約${contractH}h／達成`;
    }
    if (x.hourlyRate === 0) memo += (memo ? '・' : '') + '時給未設定';
    if (x.unpricedCount > 0) memo += (memo ? '・' : '') + `単価未設定${x.unpricedCount}件`;
    if (plan && plan.notes) memo += (memo ? ' ' : '') + plan.notes;
    
    const fields = [
      emp.id,
      `"${emp.name}"`,
      `${x.workDays}日`,
      x.totalNetMin,
      formatHMin(x.totalNetMin),
      x.hourlyRate,
      x.totalWage,
      x.totalRevenue,
      x.profit,
      `"${memo}"`,
    ];
    lines.push(fields.join(','));
    totalDays += x.workDays;
    totalNetMin += x.totalNetMin;
    totalWage += x.totalWage;
    totalRevenue += x.totalRevenue;
  }
  const totalProfit = totalRevenue - totalWage;
  const profitRate = totalRevenue > 0 ? (totalProfit / totalRevenue * 100).toFixed(1) : '0.0';
  lines.push('');
  lines.push(`合計,${allSummaries.length}名,${totalDays}日,${totalNetMin},${formatHMin(totalNetMin)},,${totalWage},${totalRevenue},${totalProfit},利益率${profitRate}%`);
  lines.push('');
  lines.push('計算根拠');
  lines.push('"投入時給（人件費） = 実労働時間（拘束時間−休憩時間） × 時給単価"');
  lines.push('"出来高（売上） = 各作業の数量 × 作業×品目別単価"');
  lines.push('"月間差益 = 出来高 − 投入時給（人件費）"');
  lines.push('"休憩時間：労基法準拠（実労働6時間超で45分以上、8時間45分超で60分以上）"');
  lines.push('"提出先：株式会社味采市場 本部 ／ 作成：川口センター"');
  
  const csv = '\ufeff' + lines.join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `一次人件費差益_${ym.year}年${String(ym.month).padStart(2,'0')}月.csv`;
  document.body.appendChild(a);

function nextEmpId() {
  // 既存IDから次の番号を計算
  let maxN = 0;
  for (const e of state.employees) {
    const m = (e.id || '').match(/^E(\d+)$/);
    if (m) maxN = Math.max(maxN, parseInt(m[1], 10));
  }
  return 'E' + String(maxN + 1).padStart(3, '0');
}

// 時刻 "HH:MM" を分数に変換
function parseTimeStr(timeStr) {
  if (!timeStr) return 0;
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + (m || 0);
}
// 分数を "HH:MM" に
function formatTimeStr(minutes) {
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}
// 労基法準拠の自動休憩計算
function calcLaborMinutes(start, end) {
  if (!start || !end) return { grossMin: 0, breakMin: 0, netMin: 0 };
  const grossMin = parseTimeStr(end) - parseTimeStr(start);
  if (grossMin <= 0) return { grossMin: 0, breakMin: 0, netMin: 0 };
  let breakMin = 0;
  if (grossMin > 8 * 60 + 45) breakMin = 60;
  else if (grossMin > 6 * 60) breakMin = 45;
  return { grossMin, breakMin, netMin: grossMin - breakMin };
}
function formatHMin(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  if (m === 0) return `${h}h`;
  return `${h}h${m}m`;
}

const WEEKDAY_KEYS = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

        💡 時刻を入力すると拘束時間・休憩・実労働が自動計算されます。休憩は労基法準拠（6h超→45分、8h45m超→60分）。
      </div>

}

// 月別計画画面
function renderDailyPlanMonth() {
  const empId = state._dailyPlanEmpId;
  const emp = state.employees.find(e => e.id === empId);
  if (!emp) { state.screen = 'daily_plan_list'; return renderDailyPlanList(); }
  if (!state._dailyPlanYM) state._dailyPlanYM = currentYM();
  const { year, month } = state._dailyPlanYM;
  // 月選択肢
  const monthOptions = [];
  for (let i = 3; i >= -6; i--) {
    const d = new Date(year, month - 1 - i, 1);
    const y = d.getFullYear(), m = d.getMonth() + 1;
    const sel = (y === year && m === month) ? ' selected' : '';
    monthOptions.push(`<option value="${y}-${m}"${sel}>${y}年${m}月</option>`);
  }
  const dailyPlan = getDailyPlan(empId, year, month);
  const days = (dailyPlan && dailyPlan.days) || {};
  const pattern = getPattern(empId);
  // 月の日数
  const lastDay = new Date(year, month, 0).getDate();
  const firstDow = new Date(year, month - 1, 1).getDay();  // 0=日
  // 月合計
  let monthGross = 0, monthNet = 0, workDays = 0;
  for (let d = 1; d <= lastDay; d++) {
    const dayData = days[d];
    if (dayData && dayData.start && dayData.end) {
      const c = calcLaborMinutes(dayData.start, dayData.end);
      monthGross += c.grossMin; monthNet += c.netMin; workDays++;
    }
  }
  // 当月の月間計画（時給・契約時間）
  const wp = findWorkPlan(empId, year, month);
  const contractHours = wp ? wp.contract_hours : (emp.monthly_contract_hours || 0);
  const netHours = monthNet / 60;
  const diff = contractHours > 0 ? (netHours - contractHours) : 0;
  let diffLabel = '';
  if (contractHours > 0) {
    if (Math.abs(diff) < 0.5) diffLabel = `<span style="color:var(--green);">契約通り</span>`;
    else if (diff > 0) diffLabel = `<span style="color:var(--orange);">+${diff.toFixed(1)}h 超過</span>`;
    else diffLabel = `<span style="color:var(--red);">${diff.toFixed(1)}h 不足</span>`;
  }
  const faceHtml = emp.photo 
    ? `<img src="${emp.photo}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;" alt=""/>`
    : `<span style="font-size:2rem;">${emp.emoji}</span>`;
  let html = `
    <div class="nav-row">
      <button class="nav-btn" data-action="back-daily-plan-list">← 一覧に戻る</button>
    </div>
    <div class="card">
      <h2>🗓️ ${year}年${month}月の勤務計画</h2>
      <div style="background:var(--green-bg); padding:12px 14px; border-radius:8px; margin-bottom:14px; display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
        ${faceHtml}
        <div>
          <div style="font-size:1.1rem; font-weight:bold;">${emp.name}</div>
          <div style="font-size:0.85rem; color:#555;">NO：${emp.id}</div>
        </div>
        <div style="margin-left:auto;">
          <label class="form-label" style="margin:0; display:inline;">対象月：</label>
          <select id="dpm-ym" data-action="change-dpm-ym">${monthOptions.join('')}</select>
        </div>
      </div>
      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:12px; margin-bottom:14px;">
        <div style="background:#fafafa; border-radius:8px; padding:10px;">
          <div style="font-size:0.8rem; color:#888;">出勤予定</div>
          <div style="font-size:1.4rem; font-weight:bold; color:var(--blue);">${workDays}日</div>
        </div>
        <div style="background:#fafafa; border-radius:8px; padding:10px;">
          <div style="font-size:0.8rem; color:#888;">合計拘束</div>
          <div style="font-size:1.4rem; font-weight:bold;">${formatHMin(monthGross)}</div>
        </div>
        <div style="background:#fafafa; border-radius:8px; padding:10px;">
          <div style="font-size:0.8rem; color:#888;">合計実労働</div>
          <div style="font-size:1.4rem; font-weight:bold; color:var(--green);">${formatHMin(monthNet)}</div>
        </div>
        <div style="background:#fafafa; border-radius:8px; padding:10px;">
          <div style="font-size:0.8rem; color:#888;">契約時間 ${contractHours > 0 ? contractHours + 'h' : '未設定'}</div>
          <div style="font-size:1rem; font-weight:bold;">${diffLabel || '-'}</div>
        </div>
      </div>
      <div style="margin-bottom:14px; display:flex; gap:10px; flex-wrap:wrap;">
        ${pattern 
          ? `<button class="primary-btn" data-action="apply-pattern" style="background:var(--blue);">🔄 標準パターンから${Object.keys(days).length > 0 ? '再' : ''}適用</button>`
          : '<span class="form-hint" style="padding:8px 0;">⚠️ 標準パターン未登録（先にパターンを登録してください）</span>'
        }
        <button class="nav-btn" data-action="clear-all-days" style="color:var(--red); border-color:var(--red);">全てクリア</button>
      </div>
      <table class="calendar-table">
        <thead>
          <tr>
            <th class="wd-sun">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th class="wd-sat">土</th>
          </tr>
        </thead>
        <tbody>
  `;
  // カレンダーレンダリング
  let dayNum = 1;
  let week = '<tr>';
  for (let i = 0; i < firstDow; i++) week += '<td class="cal-empty"></td>';
  let col = firstDow;
  while (dayNum <= lastDay) {
    const dayData = days[dayNum];
    const isOff = !dayData;
    const isWork = dayData && dayData.start && dayData.end;
    let cellContent = `<div class="cal-day-num">${dayNum}</div>`;
    if (isWork) {
      const c = calcLaborMinutes(dayData.start, dayData.end);
      cellContent += `<div class="cal-time">${dayData.start}<br>〜${dayData.end}</div>`;
      cellContent += `<div class="cal-hours">${formatHMin(c.netMin)}</div>`;
    } else if (Object.keys(days).length > 0 && (dayData === null || dayData === undefined && days[dayNum] !== undefined)) {
      cellContent += `<div class="cal-off">休</div>`;
    } else if (dayData === null) {
      cellContent += `<div class="cal-off">休</div>`;
    }
    const colorClass = (col === 0) ? 'wd-sun-cell' : (col === 6 ? 'wd-sat-cell' : '');
    const cellClass = isWork ? 'cal-cell cal-work' : (dayData === null ? 'cal-cell cal-off-cell' : 'cal-cell cal-blank');
    week += `<td class="${cellClass} ${colorClass}" data-action="edit-day" data-day="${dayNum}">${cellContent}</td>`;
    col++;
    if (col === 7) {
      week += '</tr>';
      html += week;
      week = '<tr>';
      col = 0;
    }
    dayNum++;
  }
  if (col > 0 && col < 7) {
    for (let i = col; i < 7; i++) week += '<td class="cal-empty"></td>';
    week += '</tr>';
    html += week;
  }
  html += `</tbody></table>
      <div class="form-hint" style="margin-top:10px;">
        💡 各日のセルをクリックして始業・終業を入力／休に切替できます。
      </div>
    </div>
  `;
  return html;
}

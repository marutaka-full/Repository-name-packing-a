<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トマト パッキングAI ver1.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#fdf5f2;color:#1a1a1a;min-height:100vh;padding:16px;}
.app{max-width:560px;margin:0 auto;}
.header{margin-bottom:16px;padding:16px 20px;background:#D85A30;border-radius:12px;}
.header h1{font-size:20px;font-weight:600;margin-bottom:2px;color:#fff;}
.header p{font-size:12px;color:#F5C4B3;}
.card{background:#fff;border:1px solid #e8ddd8;border-radius:12px;padding:16px 20px;margin-bottom:10px;}
label{font-size:12px;color:#666;display:block;margin-bottom:5px;}
select,input[type=number]{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none;}
select:focus,input:focus{border-color:#D85A30;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.type-btn{border:1px solid #ddd;border-radius:8px;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;background:#fdf5f2;color:#888;}
.type-btn.on{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;}
.mode-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:12px;}
.mb{border:1px solid #ddd;border-radius:8px;padding:7px 3px;text-align:center;cursor:pointer;font-size:11px;background:#fdf5f2;color:#333;}
.mb .pct{font-size:15px;font-weight:600;display:block;}
.mb .mnm{font-size:10px;color:#999;display:block;margin-top:1px;}
.mb.on10{background:#E6F1FB;border-color:#378ADD;color:#042C53;}
.mb.on20{background:#EAF3DE;border-color:#639922;color:#173404;}
.mb.on30{background:#FAEEDA;border-color:#BA7517;color:#412402;}
.mb.on40{background:#FAECE7;border-color:#D85A30;color:#4A1B0C;}
.mb.on50{background:#FCEBEB;border-color:#E24B4A;color:#501313;}
.worker-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;margin-bottom:8px;}
.worker-label{font-size:13px;font-weight:600;color:#4A1B0C;background:#FAECE7;border-radius:6px;padding:4px 10px;text-align:center;}
.worker-btn{width:32px;height:32px;border:1px solid #ddd;border-radius:8px;background:#fdf5f2;cursor:pointer;font-size:18px;font-weight:600;display:flex;align-items:center;justify-content:center;color:#555;}
.worker-val{text-align:center;font-size:16px;font-weight:600;}
.alert{border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;line-height:1.5;}
.alert-warn{background:#FAEEDA;border:1px solid #BA7517;color:#412402;}
.alert-danger{background:#FCEBEB;border:1px solid #E24B4A;color:#501313;}
.result-box{background:#FAECE7;border:1px solid #D85A30;border-radius:12px;padding:16px 20px;margin-bottom:10px;}
.price-big{font-size:40px;font-weight:700;text-align:center;margin:10px 0;letter-spacing:-1px;color:#4A1B0C;}
.mg4{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;}
.metric{background:#fff;border-radius:8px;padding:10px 12px;}
.metric-l{font-size:11px;color:#888;margin-bottom:3px;}
.metric-v{font-size:22px;font-weight:600;}
.metric-u{font-size:12px;color:#888;font-weight:400;}
.cost-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
.cost-table td{padding:4px 8px;}
.cost-table tr:last-child td{border-top:1px solid rgba(0,0,0,0.1);font-weight:600;}
.cost-table .lbl{color:#888;}
.cost-table .val{text-align:right;font-weight:500;}
.info-box{background:#FAEEDA;border:1px solid #BA7517;border-radius:8px;padding:10px 14px;font-size:12px;color:#412402;margin-bottom:10px;}
.act-btn{border:1px solid #ddd;border-radius:8px;padding:13px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;background:#D85A30;border-color:#D85A30;color:#fff;line-height:1.5;width:100%;margin-top:10px;}
.act-btn:active{transform:scale(0.98);}
.log-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0e8e4;}
.log-item:last-child{border-bottom:none;}
.log-date{font-size:11px;color:#aaa;margin-top:3px;}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;}
.badge-w{background:#FAECE7;color:#4A1B0C;}
.badge-n{background:#F5C4B3;color:#712B13;}
.del-btn{font-size:11px;color:#aaa;cursor:pointer;padding:3px 8px;border:1px solid #e8ddd8;border-radius:6px;white-space:nowrap;margin-left:8px;flex-shrink:0;}
.del-btn:hover{background:#fee;color:#E24B4A;border-color:#E24B4A;}
.tab-bar{display:grid;grid-template-columns:1fr 1fr;border:1px solid #e8ddd8;border-radius:10px;overflow:hidden;margin-bottom:12px;background:#fdf5f2;}
.tab{padding:10px;text-align:center;cursor:pointer;font-size:13px;color:#888;font-weight:500;}
.tab.on{background:#fff;color:#1a1a1a;}
.hidden{display:none;}
.divider{border:none;border-top:1px solid rgba(0,0,0,0.07);margin:10px 0;}
.toast{background:#D85A30;color:#fff;border-radius:8px;padding:11px 16px;font-size:13px;margin-bottom:10px;font-weight:500;animation:fadein 0.3s;}
@keyframes fadein{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.section-sub{font-size:12px;color:#888;margin:12px 0 6px;}
.empty{font-size:13px;color:#aaa;text-align:center;padding:20px 0;}
.tray-badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;background:#FAEEDA;color:#412402;border:1px solid #BA7517;}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <h1>🍅 トマト パッキングAI</h1>
  <p>まるたかフルーツ × 味采市場｜ver 1.0</p>
</div>

<div class="tab-bar">
  <div class="tab on" id="tab-main" onclick="showTab('main')">計算・作成</div>
  <div class="tab" id="tab-log" onclick="showTab('log')">作成記録</div>
</div>

<div id="view-main">
  <div class="card">
    <label>販売形態</label>
    <div class="type-toggle">
      <div class="type-btn on" id="btn-weight" onclick="setType('weight')">重量パック</div>
      <div class="type-btn" id="btn-count" onclick="setType('count')">個数パック</div>
    </div>

    <div class="row2">
      <div><label>仕入れ原価（円/kg）</label><input type="number" id="cost" value="200" min="1" oninput="calc()"/></div>
      <div><label>仕入れ量（kg）</label><input type="number" id="qty" value="4" min="1" step="0.1" oninput="calc()"/></div>
    </div>

    <div class="row2">
      <div><label>サイズ</label>
        <select id="size" onchange="calc()">
          <option value="S">S（約115g）</option>
          <option value="M">M（約145g）</option>
          <option value="L" selected>L（約180g）</option>
          <option value="2L">2L（約225g）</option>
          <option value="3L">3L（約275g）</option>
        </select>
      </div>
      <div><label>等級</label>
        <select id="grade" onchange="calc()">
          <option value="A">秀（A品）</option>
          <option value="B" selected>優（B品）</option>
          <option value="C">良（C品）</option>
        </select>
      </div>
    </div>

    <div id="weight-inputs">
      <label>重量規格</label>
      <div class="mode-grid" style="grid-template-columns:repeat(5,1fr);">
        <div class="mb on30" id="w300" onclick="setSpec('w',300)" style="font-size:12px;padding:8px 2px;"><span class="pct" style="font-size:14px;">300g</span></div>
        <div class="mb" id="w400" onclick="setSpec('w',400)" style="font-size:12px;padding:8px 2px;"><span class="pct" style="font-size:14px;">400g</span></div>
        <div class="mb" id="w500" onclick="setSpec('w',500)" style="font-size:12px;padding:8px 2px;"><span class="pct" style="font-size:14px;">500g</span></div>
        <div class="mb" id="w600" onclick="setSpec('w',600)" style="font-size:12px;padding:8px 2px;"><span class="pct" style="font-size:14px;">600g</span></div>
        <div class="mb" id="w800" onclick="setSpec('w',800)" style="font-size:12px;padding:8px 2px;"><span class="pct" style="font-size:14px;">800g</span></div>
      </div>
    </div>

    <div id="count-inputs" class="hidden">
      <label>個数規格</label>
      <div class="mode-grid" style="grid-template-columns:repeat(5,1fr);">
        <div class="mb on30" id="n2" onclick="setSpec('n',2)" style="padding:8px 2px;"><span class="pct">2個</span></div>
        <div class="mb" id="n3" onclick="setSpec('n',3)" style="padding:8px 2px;"><span class="pct">3個</span></div>
        <div class="mb" id="n4" onclick="setSpec('n',4)" style="padding:8px 2px;"><span class="pct">4個</span></div>
        <div class="mb" id="n5" onclick="setSpec('n',5)" style="padding:8px 2px;"><span class="pct">5個</span></div>
        <div class="mb" id="n6" onclick="setSpec('n',6)" style="padding:8px 2px;"><span class="pct">6個</span></div>
      </div>
    </div>

    <div class="divider"></div>

    <label>利益モード</label>
    <div class="mode-grid">
      <div class="mb" id="m10" onclick="setMode(10)"><span class="pct">10%</span><span class="mnm">超特価</span></div>
      <div class="mb" id="m20" onclick="setMode(20)"><span class="pct">20%</span><span class="mnm">安く売る</span></div>
      <div class="mb on30" id="m30" onclick="setMode(30)"><span class="pct">30%</span><span class="mnm">標準</span></div>
      <div class="mb" id="m40" onclick="setMode(40)"><span class="pct">40%</span><span class="mnm">しっかり</span></div>
      <div class="mb" id="m50" onclick="setMode(50)"><span class="pct">50%</span><span class="mnm">高利益</span></div>
    </div>

    <div class="divider"></div>

    <label style="margin-bottom:8px;">作業者（A:載せ役 B:載せ役 C:機械操作）</label>
    <div class="worker-row">
      <div class="worker-label">A</div>
      <input type="range" id="wA" min="0" max="5" value="2" oninput="updW('A');calc()"/>
      <div class="worker-val" id="vA">2名</div>
    </div>
    <div class="worker-row">
      <div class="worker-label">B</div>
      <input type="range" id="wB" min="0" max="5" value="1" oninput="updW('B');calc()"/>
      <div class="worker-val" id="vB">1名</div>
    </div>
    <div class="worker-row">
      <div class="worker-label">C</div>
      <input type="range" id="wC" min="0" max="3" value="1" oninput="updW('C');calc()"/>
      <div class="worker-val" id="vC">1名</div>
    </div>
  </div>

  <div id="alert-area"></div>
  <div id="result-area"></div>
</div>

<div id="view-log" class="hidden">
  <div class="card">
    <p style="font-size:15px;font-weight:600;margin-bottom:14px;">作成記録（過去7日間）</p>
    <div id="log-list"></div>
  </div>
</div>

</div>
<script>
const PRICES=[49,69,79,89,99,100,129,139,149,159,179,199,200,239,249,259,279,299,300,339,359,379,399,499,599,699,799,899,979,1000];
const AVG={S:115,M:145,L:180,'2L':225,'3L':275};
const WRAP=1,SEAL=1;
const TRAY_COST={small:5,mid:7,large:10};
function traySize(n){return n<=3?'small':n<=5?'mid':'large';}
function trayCost(n){return TRAY_COST[traySize(n)];}
function trayLabel(n){return n<=3?'小':n<=5?'中':'大';}
function laborCost(persons,packs){
  if(packs<=0||persons<=0)return 0;
  return Math.round(1303*persons*(packs*10/3600)/0.75/packs);
}
function nearestPrice(raw){return PRICES.reduce((p,c)=>Math.abs(c-raw)<Math.abs(p-raw)?c:p);}

const MS={10:{bg:'#E6F1FB',bd:'#378ADD',tx:'#042C53',nm:'超特価'},20:{bg:'#EAF3DE',bd:'#639922',tx:'#173404',nm:'安く売る'},30:{bg:'#FAEEDA',bd:'#BA7517',tx:'#412402',nm:'標準'},40:{bg:'#FAECE7',bd:'#D85A30',tx:'#4A1B0C',nm:'しっかり'},50:{bg:'#FCEBEB',bd:'#E24B4A',tx:'#501313',nm:'高利益'}};
const GC={A:{bg:'#EAF3DE',bd:'#639922',tx:'#173404',lb:'秀・A品'},B:{bg:'#FAEEDA',bd:'#BA7517',tx:'#412402',lb:'優・B品'},C:{bg:'#FAECE7',bd:'#D85A30',tx:'#4A1B0C',lb:'良・C品'}};

let type='weight',specW=300,specN=2,mode=30;

function updW(g){document.getElementById('v'+g).textContent=document.getElementById('w'+g).value+'名';}
function getWorkers(){return parseInt(document.getElementById('wA').value)+parseInt(document.getElementById('wB').value)+parseInt(document.getElementById('wC').value);}

function setType(t){
  type=t;
  document.getElementById('btn-weight').className='type-btn'+(t==='weight'?' on':'');
  document.getElementById('btn-count').className='type-btn'+(t==='count'?' on':'');
  document.getElementById('weight-inputs').className=t==='weight'?'':'hidden';
  document.getElementById('count-inputs').className=t==='count'?'':'hidden';
  calc();
}

function setSpec(g,v){
  if(g==='w'){
    specW=v;
    [300,400,500,600,800].forEach(x=>document.getElementById('w'+x).className='mb'+(x===v?' on30':''));
  } else {
    specN=v;
    [2,3,4,5,6].forEach(x=>document.getElementById('n'+x).className='mb'+(x===v?' on30':''));
  }
  calc();
}

function setMode(m){
  mode=m;
  [10,20,30,40,50].forEach(v=>document.getElementById('m'+v).className='mb'+(v===m?' on'+v:''));
  calc();
}

function getLog(){try{const r=localStorage.getItem('tomato_v1');if(!r)return[];return JSON.parse(r).filter(x=>x.ts>Date.now()-7*24*60*60*1000);}catch(e){return[];}}
function saveLog(e){try{const l=getLog();l.unshift({...e,ts:Date.now(),id:Date.now()});localStorage.setItem('tomato_v1',JSON.stringify(l));}catch(e){}}
function deleteLog(id){try{localStorage.setItem('tomato_v1',JSON.stringify(JSON.parse(localStorage.getItem('tomato_v1')||'[]').filter(x=>x.id!==id)));renderLog();}catch(e){}}
function fmtDate(d){return`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}

function checkAlerts(packSpec,packType){
  const log=getLog();const alerts=[];
  const sz=document.getElementById('size').value;
  const same=log.filter(r=>r.sz===sz&&r.packType===packType&&r.packSpec===packSpec);
  if(same.length)alerts.push({level:'warn',msg:`⚠ ${sz}・${packType==='weight'?packSpec+'g':packSpec+'個パック'} は ${fmtDate(new Date(same[0].ts))} に作成済みです。在庫を確認してください。`});
  return alerts;
}
function renderAlerts(a){document.getElementById('alert-area').innerHTML=a.map(x=>`<div class="alert alert-${x.level}">${x.msg}</div>`).join('');}

function calc(){
  const cpk=parseFloat(document.getElementById('cost').value)||0;
  const qty=parseFloat(document.getElementById('qty').value)||0;
  const sz=document.getElementById('size').value;
  const grade=document.getElementById('grade').value;
  const avg=AVG[sz];
  const workers=getWorkers();
  const area=document.getElementById('result-area');
  if(cpk<=0||qty<=0){area.innerHTML='';document.getElementById('alert-area').innerHTML='';return;}

  let packW,packN,specLabel;
  if(type==='weight'){
    packW=specW/1000;
    packN=Math.round(specW/avg);
    specLabel=specW+'g（約'+packN+'個入り）';
  } else {
    packN=specN;
    packW=(avg*specN)/1000;
    specLabel=specN+'個入り（約'+Math.round(avg*specN)+'g）';
  }

  const packs=Math.floor(qty/packW);
  const cpb=Math.round(cpk*packW);
  const tray=trayCost(packN);
  const labor=laborCost(workers,packs);
  const fixed=tray+WRAP+SEAL+labor;
  const tc=cpb+fixed;
  const price=nearestPrice(tc/(1-mode/100));
  const margin=Math.round((1-tc/price)*100);
  const pb=Math.round(price-tc);
  const pt=Math.round(pb*packs);
  const ms=MS[mode];
  const gc=GC[grade];

  renderAlerts(checkAlerts(type==='weight'?specW:specN,type));

  area.innerHTML=`
  <div class="result-box" style="background:${ms.bg};border-color:${ms.bd};">
    <p style="font-size:13px;color:${ms.tx};font-weight:600;margin-bottom:10px;">
      🍅 ${sz}サイズ　${specLabel}　${ms.nm}（${mode}%）
    </p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      <span class="badge" style="background:${gc.bg};border:1px solid ${gc.bd};color:${gc.tx};">${gc.lb}</span>
      <span class="tray-badge">トレー${trayLabel(packN)}（${tray}円）</span>
      <span class="badge" style="background:#f1f1ed;color:#888;">作業者 ${workers}名</span>
    </div>
    <div class="price-big" style="color:${ms.tx};">${price.toLocaleString()}円</div>
    <div class="mg4">
      <div class="metric"><p class="metric-l">値入率</p><p class="metric-v">${margin}<span class="metric-u">%</span></p></div>
      <div class="metric"><p class="metric-l">粗利／パック</p><p class="metric-v">${pb.toLocaleString()}<span class="metric-u">円</span></p></div>
      <div class="metric"><p class="metric-l">パック数</p><p class="metric-v">${packs}<span class="metric-u">パック</span></p></div>
      <div class="metric"><p class="metric-l">粗利合計</p><p class="metric-v">${pt.toLocaleString()}<span class="metric-u">円</span></p></div>
    </div>
    <div class="divider"></div>
    <p style="font-size:12px;color:${ms.tx};font-weight:600;margin-bottom:6px;">原価内訳</p>
    <table class="cost-table">
      <tr><td class="lbl">青果原価</td><td class="val" style="color:${ms.tx};">${cpb}円／パック</td></tr>
      <tr><td class="lbl">トレー代（${trayLabel(packN)}・${packN}個）</td><td class="val">${tray}円／パック</td></tr>
      <tr><td class="lbl">ラップ代</td><td class="val">${WRAP}円／パック</td></tr>
      <tr><td class="lbl">シール代</td><td class="val">${SEAL}円／パック</td></tr>
      <tr><td class="lbl">人件費（${workers}名・10秒/パック）</td><td class="val">${labor}円／パック</td></tr>
      <tr><td class="lbl" style="color:${ms.tx};font-weight:600;">原価合計</td><td class="val" style="color:${ms.tx};font-weight:600;">${tc}円／パック</td></tr>
    </table>
    <button class="act-btn" onclick="record(${price},${packs},${packN},'${type===`weight`?specW:specN}')">
      ✓ ${specLabel}・${price}円・${packs}パック を記録する
    </button>
  </div>`;
}

function record(price,packs,packN,spec){
  const cpk=parseFloat(document.getElementById('cost').value)||0;
  const qty=parseFloat(document.getElementById('qty').value)||0;
  const sz=document.getElementById('size').value;
  const grade=document.getElementById('grade').value;
  const workers=getWorkers();
  saveLog({price,packs,packN,sz,grade,cpk,qty,packType:type,packSpec:type==='weight'?specW:specN,workers,mode});
  const area=document.getElementById('result-area');
  const t=document.createElement('div');
  t.className='toast';
  t.textContent=`✓ ${sz}・${type==='weight'?spec+'g':spec+'個パック'}・${price}円・${packs}パック を記録しました`;
  area.prepend(t);
  setTimeout(()=>t.remove(),3000);
  calc();
}

function showTab(t){
  document.getElementById('view-main').className=t==='main'?'':'hidden';
  document.getElementById('view-log').className=t==='log'?'':'hidden';
  document.getElementById('tab-main').className='tab'+(t==='main'?' on':'');
  document.getElementById('tab-log').className='tab'+(t==='log'?' on':'');
  if(t==='log')renderLog();
}

function renderLog(){
  const log=getLog();
  const el=document.getElementById('log-list');
  if(!log.length){el.innerHTML='<p class="empty">記録がありません</p>';return;}
  el.innerHTML=log.map(r=>{
    const d=new Date(r.ts);
    const label=r.packType==='weight'?`${r.sz}・${r.packSpec}g・${r.packN}個入り`:`${r.sz}・${r.packSpec}個パック`;
    return`<div class="log-item">
      <div style="flex:1;">
        <span class="badge ${r.packType==='weight'?'badge-w':'badge-n'}">${label}</span>
        <span style="font-size:14px;margin-left:8px;font-weight:600;">${r.price}円</span>
        <span style="font-size:12px;color:#aaa;margin-left:6px;">${r.packs}パック</span>
        <p class="log-date">${fmtDate(d)}｜仕入 ${r.cpk}円/kg・${r.qty}kg・${r.workers}名</p>
      </div>
      <span class="del-btn" onclick="deleteLog(${r.id})">削除</span>
    </div>`;
  }).join('');
}

// 初期化
updW('A');updW('B');updW('C');
calc();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>まる労務 取扱説明書 — 経営者ガイド（イントロ章）</title>
<style>
  :root {
    --orange: #d97847;
    --orange-light: #fbe7d8;
    --green: #1a9170;
    --green-bg: #e8f4ee;
    --green-light: #c6e3d4;
    --blue: #3a8dca;
    --blue-light: #d6ebf7;
    --purple: #7a5fa3;
    --purple-bg: #ebe4f5;
    --red: #c84f3f;
    --red-bg: #fce8e4;
    --yellow: #e8b94a;
    --yellow-bg: #fbf3dc;
    --bg: #faf7f2;
    --text: #2c2c2c;
    --gray: #888;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0; padding: 0;
    line-height: 1.6;
  }
  .manual {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 3px solid var(--orange);
  }
  header h1 { font-size: 2.2rem; color: var(--orange); margin: 0 0 8px; }
  header .subtitle { color: var(--gray); font-size: 1rem; margin: 0; }
  header .version-badge {
    display: inline-block; background: var(--orange-light); color: var(--orange);
    padding: 4px 12px; border-radius: 12px; font-size: 0.8rem;
    margin-top: 8px; font-weight: bold;
  }
  .chapter {
    background: white; border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    overflow: hidden; margin-bottom: 28px;
  }
  .chapter-header {
    background: linear-gradient(135deg, #fbe7d8, #f7e4d0);
    padding: 22px 28px;
    border-bottom: 2px solid #f0d4be;
  }
  .chapter-header h2 { font-size: 1.5rem; color: var(--orange); margin: 0 0 8px; }
  .chapter-intro { color: #555; font-size: 0.95rem; margin: 0; }
  .scene-viewer { padding: 24px 28px 28px; }
  .scene-stage {
    background: linear-gradient(180deg, #f7f7f5, #ececea);
    border-radius: 12px;
    padding: 30px 24px;
    margin-bottom: 20px;
    position: relative;
    min-height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.35s ease;
  }
  .scene-stage.fade-out { opacity: 0; }
  .scene-counter {
    position: absolute; top: 14px; right: 18px;
    background: rgba(0,0,0,0.45); color: white;
    padding: 4px 12px; border-radius: 12px;
    font-size: 0.85rem; font-weight: bold;
  }
  .scene-visual { max-width: 100%; }
  .scene-info {
    background: var(--green-bg); border-left: 5px solid var(--green);
    padding: 16px 20px; border-radius: 8px;
    margin-bottom: 16px;
    transition: opacity 0.3s ease;
  }
  .scene-info.fade-out { opacity: 0; }
  .scene-title {
    font-size: 1.15rem; font-weight: bold;
    color: var(--green); margin-bottom: 6px;
  }
  .scene-description {
    font-size: 0.96rem; color: #444; margin-bottom: 12px;
  }
  .scene-business {
    background: white; border-left: 3px solid var(--purple);
    padding: 10px 14px; border-radius: 6px;
    font-size: 0.88rem; color: #555;
  }
  .scene-business::before { content: '💡 '; margin-right: 4px; }
  .scene-nav {
    display: flex; gap: 12px;
    justify-content: center; align-items: center;
    flex-wrap: wrap;
  }
  .nav-btn {
    background: white; border: 2px solid var(--orange);
    color: var(--orange); padding: 10px 22px;
    border-radius: 10px; cursor: pointer;
    font-size: 0.95rem; font-weight: bold;
    font-family: inherit; transition: all 0.2s ease;
  }
  .nav-btn:hover { background: var(--orange); color: white; }
  .nav-btn:disabled {
    border-color: #ccc; color: #ccc; cursor: not-allowed;
  }
  .nav-btn:disabled:hover { background: white; color: #ccc; }
  .play-btn { background: var(--orange); color: white; border-color: var(--orange); }
  .play-btn:hover { background: #b96538; border-color: #b96538; }
  .play-btn.playing { background: var(--red); border-color: var(--red); }
  .play-btn.playing:hover { background: #a93a2c; border-color: #a93a2c; }
  .progress-bar {
    background: #e0e0e0; height: 6px;
    border-radius: 3px; overflow: hidden; margin-bottom: 20px;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--orange), #f0a878);
    height: 100%; transition: width 0.45s ease; border-radius: 3px;
  }
  footer {
    text-align: center; color: var(--gray);
    font-size: 0.85rem; margin-top: 32px;
    padding-top: 18px; border-top: 1px solid #ddd;
  }

  /* シーン専用スタイル */
  .visual-cover {
    text-align: center; padding: 40px 20px;
  }
  .visual-cover .brand-icon { font-size: 5rem; margin-bottom: 16px; }
  .visual-cover h2 {
    font-size: 3rem; color: var(--orange);
    margin: 0 0 12px; letter-spacing: 0.05em;
  }
  .visual-cover .tagline {
    font-size: 1.3rem; color: #555;
    font-weight: 500; margin-bottom: 24px;
  }
  .visual-cover .credits {
    color: var(--gray); font-size: 0.9rem;
    border-top: 1px solid #ddd; padding-top: 16px;
    margin-top: 20px; display: inline-block;
    padding-left: 24px; padding-right: 24px;
  }

  /* 数字対比 */
  .compare-box {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 24px; align-items: center; max-width: 900px;
  }
  .compare-card {
    background: white; border-radius: 14px;
    padding: 26px 22px; box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    text-align: center;
  }
  .compare-card.bad { border: 3px solid var(--red); }
  .compare-card.good { border: 3px solid var(--green); }
  .compare-label {
    font-size: 0.9rem; color: #555; margin-bottom: 10px;
  }
  .compare-formula {
    font-size: 1.05rem; color: #444; margin-bottom: 12px;
  }
  .compare-result {
    font-size: 2.4rem; font-weight: bold; margin-bottom: 6px;
  }
  .compare-card.bad .compare-result { color: var(--red); }
  .compare-card.good .compare-result { color: var(--green); }
  .compare-tag {
    display: inline-block; padding: 4px 14px;
    border-radius: 12px; font-size: 0.85rem; font-weight: bold;
  }
  .compare-card.bad .compare-tag { background: var(--red-bg); color: var(--red); }
  .compare-card.good .compare-tag { background: var(--green-bg); color: var(--green); }
  .compare-vs {
    font-size: 1.5rem; color: var(--gray); font-weight: bold;
  }
  .compare-conclusion {
    grid-column: 1 / -1; text-align: center;
    background: var(--yellow-bg); border-left: 4px solid var(--yellow);
    padding: 14px 20px; border-radius: 8px;
    font-size: 1.05rem; color: #6e4e00; margin-top: 20px;
  }

  /* WinWin */
  .winwin-box {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 24px; align-items: center; max-width: 900px;
  }
  .winwin-side {
    background: white; border-radius: 14px;
    padding: 24px 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    text-align: center;
  }
  .winwin-side.emp { border: 3px solid var(--blue); }
  .winwin-side.co { border: 3px solid var(--purple); }
  .winwin-icon { font-size: 3rem; margin-bottom: 8px; }
  .winwin-title {
    font-size: 1.15rem; font-weight: bold; margin-bottom: 12px;
  }
  .winwin-side.emp .winwin-title { color: var(--blue); }
  .winwin-side.co .winwin-title { color: var(--purple); }
  .winwin-benefits {
    list-style: none; padding: 0; margin: 0;
    text-align: left; font-size: 0.92rem;
  }
  .winwin-benefits li { padding: 4px 0; }
  .winwin-benefits li::before { content: '✓ '; color: var(--green); font-weight: bold; }
  .winwin-arrow {
    font-size: 2.5rem; color: var(--orange);
  }

  /* 売上指数（棒グラフ） */
  .chart-frame { max-width: 920px; margin: 0 auto; }
  .chart-title { font-size: 1.15rem; font-weight: bold; color: #444; text-align: center; margin-bottom: 18px; }

  /* サイクル図 */
  .cycle-box {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px; align-items: stretch; max-width: 1000px;
  }
  .cycle-step {
    background: white; border-radius: 12px;
    padding: 14px 8px; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex; flex-direction: column;
    justify-content: center; min-height: 130px;
  }
  .cycle-num {
    display: inline-block; background: var(--orange);
    color: white; width: 28px; height: 28px;
    line-height: 28px; border-radius: 50%;
    font-weight: bold; margin: 0 auto 6px;
  }
  .cycle-label { font-weight: bold; color: #444; font-size: 0.92rem; margin-bottom: 4px; }
  .cycle-desc { font-size: 0.75rem; color: #777; line-height: 1.3; }
  .cycle-arrow { 
    display: flex; align-items: center; justify-content: center;
    color: var(--orange); font-size: 1.4rem;
  }

  /* 表紙のpathアニメーション */
  @keyframes drawIn {
    from { stroke-dashoffset: 1000; }
    to { stroke-dashoffset: 0; }
  }

  @media (max-width: 720px) {
    header h1 { font-size: 1.6rem; }
    .scene-stage { min-height: 360px; padding: 18px 14px; }
    .compare-box { grid-template-columns: 1fr; }
    .compare-vs { font-size: 1.1rem; }
    .winwin-box { grid-template-columns: 1fr; }
    .winwin-arrow { transform: rotate(90deg); }
    .cycle-box { grid-template-columns: repeat(2, 1fr); }
    .cycle-arrow { display: none; }
    .visual-cover h2 { font-size: 2rem; }
    .visual-cover .tagline { font-size: 1rem; }
  }
</style>
</head>

<div class="manual">

  <header>
    <h1>📖 まる労務 取扱説明書</h1>
    <p class="subtitle">経営者ガイド — このアプリは何を解決するのか</p>

        時給上昇時代に「現場を守り、計画で経営する」ための仕組みです。
      </p>
    </div>

    <div class="scene-viewer">
      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width:14%"></div>
      </div>

      <div class="scene-stage" id="stage">
        <div class="scene-counter" id="counter">1 / 7</div>
        <div id="visual" class="scene-visual"></div>
      </div>

      <div class="scene-info" id="scene-info">

        <div class="scene-description" id="description">説明</div>
        <div class="scene-business" id="business">経営的意味</div>
      </div>

      <div class="scene-nav">
        <button class="nav-btn" id="prev-btn" onclick="prevScene()">← 前のシーン</button>
        <button class="nav-btn play-btn" id="play-btn" onclick="togglePlay()">▶ 自動再生</button>
        <button class="nav-btn" id="next-btn" onclick="nextScene()">次のシーン →</button>
      </div>
    </div>
  </section>

  <footer>
    まる労務 取扱説明書 v0.1 ／ 経営者ガイド（イントロ章）<br>
    まるたかフルーツ × 味采市場 ／ 2026年6月
  </footer>
</div>

let currentScene = 0;
let playing = false;
let playInterval = null;
const PLAY_DURATION = 7000;

function showScene(idx) {
  if (idx < 0 || idx >= scenes.length) return;
  const stage = document.getElementById('stage');
  const info = document.getElementById('scene-info');
  stage.classList.add('fade-out');
  info.classList.add('fade-out');
  setTimeout(() => {
    const s = scenes[idx];
    document.getElementById('visual').innerHTML = s.html;
    document.getElementById('title').textContent = s.title;
    document.getElementById('description').textContent = s.description;
    document.getElementById('business').textContent = s.business;
    document.getElementById('counter').textContent = `${idx + 1} / ${scenes.length}`;
    document.getElementById('progress').style.width = `${((idx + 1) / scenes.length) * 100}%`;
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === scenes.length - 1;
    stage.classList.remove('fade-out');
    info.classList.remove('fade-out');
  }, 240);
  currentScene = idx;
}

function nextScene() {
  if (currentScene < scenes.length - 1) showScene(currentScene + 1);
  else if (playing) stopPlay();
}

function prevScene() {
  if (currentScene > 0) showScene(currentScene - 1);
}

function togglePlay() {
  if (playing) stopPlay();
  else startPlay();
}

function startPlay() {
  playing = true;
  const btn = document.getElementById('play-btn');
  btn.textContent = '■ 一時停止';
  btn.classList.add('playing');
  if (currentScene === scenes.length - 1) showScene(0);
  playInterval = setInterval(() => {
    if (currentScene < scenes.length - 1) nextScene();
    else stopPlay();
  }, PLAY_DURATION);
}

function stopPlay() {
  playing = false;
  const btn = document.getElementById('play-btn');
  btn.textContent = '▶ 自動再生';
  btn.classList.remove('playing');
  if (playInterval) { clearInterval(playInterval); playInterval = null; }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextScene();
  if (e.key === 'ArrowLeft') prevScene();
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});

showScene(0);
</script>
